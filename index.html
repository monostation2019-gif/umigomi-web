<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>海ゴミ探究ノート</title>
<meta name="description" content="伊勢志摩の海ゴミを記録・共有するPWAアプリ「海ゴミ探究ノート」">
<meta name="theme-color" content="#1B3A6B">

<!-- PWA設定ファイル -->
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="icons/Icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="うみごみ">

<style>
  /* =========================================================
     全体のスタイル定義
     Material Design風のシンプルな配色・角丸・影を使用。
     後から機能追加してもデザインが崩れにくいよう、
     色や余白は CSS変数(:root) にまとめている。
     ========================================================= */
  :root {
    --color-primary: #2E7D6B;      /* 海藻・波打ち際をイメージした落ち着いたティール */
    --color-primary-light: #E3EFE9;
    --color-surface: #FCFBF7;      /* 純白を避けたやわらかいオフホワイト */
    --color-bg: #F1F0E8;           /* 目に優しい、砂浜のようなウォームグレー */
    --color-text: #2B2E2C;         /* 純黒を避けた深いグレー */
    --color-text-sub: #6E7570;
    --color-outline: #DEDDD2;
    --color-indigo: #1B3A6B;       /* 藍色: ヘッダー・フッターの背景 */
    --color-indigo-icon: rgba(255, 255, 255, 0.65); /* 藍色背景上の非アクティブなアイコン */
    --nav-height: 64px;
    --header-height: 56px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    /* iPhoneのノッチ・ホームバー対応（Safe Area） */
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ---------- ヘッダー ---------- */
  header.app-bar {
    position: sticky;
    top: 0;
    z-index: 10;
    height: var(--header-height);
    background: var(--color-indigo);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 16px;
    border-bottom: 1px solid var(--color-indigo);
    padding-top: env(safe-area-inset-top);
  }

  /* ---------- 画面(タブ)の切り替え ---------- */
  /* .screen は基本非表示。.screen.active のときだけ表示する。 */
  main {
    max-width: 600px; /* レスポンシブ: 大画面でも横幅を制限して読みやすくする */
    margin: 0 auto;
    padding: 24px 16px calc(var(--nav-height) + 24px);
    min-height: calc(100vh - var(--header-height));
  }
  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ---------- ホーム画面 ---------- */
  .hero {
    text-align: center;
    padding: 48px 16px;
  }
  .hero .material-emoji { font-size: 48px; }
  .hero h1 { font-size: 20px; margin: 12px 0 4px; }
  .hero p { color: var(--color-text-sub); margin: 0; }

  /* ---------- ホーム: 記録サマリーカード ---------- */
  .home-stats-card {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }
  .stat-item { text-align: center; }
  .stat-value { font-size: 32px; font-weight: bold; color: var(--color-primary); line-height: 1.1; }
  .stat-label { font-size: 12px; color: var(--color-text-sub); margin-top: 4px; }

  /* ---------- ホーム: ショートカットカード ---------- */
  .shortcut-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .shortcut-card {
    background: var(--color-surface);
    border: 1px solid var(--color-outline);
    border-radius: 16px;
    padding: 20px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-family: inherit;
  }
  .shortcut-card:active { background: var(--color-primary-light); }
  .shortcut-icon { font-size: 28px; }
  .shortcut-label { font-size: 13px; font-weight: bold; color: var(--color-text); }

  /* ---------- ホーム: 使い方カード ---------- */
  .section-title { font-size: 15px; margin: 0 0 12px; }
  .howto-list {
    margin: 0;
    padding-left: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .howto-list li { font-size: 14px; line-height: 1.5; }
  .badge-soon {
    display: inline-block;
    margin-left: 8px;
    font-size: 10px;
    color: var(--color-text-sub);
    background: var(--color-bg);
    border: 1px solid var(--color-outline);
    border-radius: 10px;
    padding: 1px 8px;
    vertical-align: middle;
  }

  /* ---------- プレースホルダー画面(地図・記録一覧) ---------- */
  .placeholder {
    text-align: center;
    padding: 64px 16px;
    color: var(--color-text-sub);
  }
  .placeholder .icon { font-size: 48px; opacity: 0.5; }

  /* ---------- カード共通 ---------- */
  .card {
    background: var(--color-surface);
    border: 1px solid var(--color-outline);
    border-radius: 16px;
    padding: 16px;
  }

  /* ---------- プロフィール画面 ---------- */
  .profile-avatar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 24px;
  }
  .avatar-inner {
    position: relative;
    width: 96px;
    height: 96px;
  }
  .profile-avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--color-primary-light);
    border: 2px solid var(--color-primary);
    cursor: pointer;
  }
  .avatar-edit-badge {
    position: absolute;
    right: -2px;
    bottom: -2px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--color-primary);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    border: 2px solid var(--color-surface);
    cursor: pointer;
  }
  .avatar-status {
    margin-top: 8px;
    font-size: 12px;
    color: var(--color-text-sub);
    min-height: 16px;
  }
  .avatar-status.error { color: #B00020; }
  .info-row { padding: 10px 0; border-bottom: 1px solid var(--color-outline); }
  .info-row:last-child { border-bottom: none; }
  .info-row .label { font-size: 12px; color: var(--color-text-sub); }
  .info-row .value { font-size: 15px; margin-top: 2px; word-break: break-all; }
  .edit-form input, .edit-form textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--color-outline);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    margin-top: 4px;
    margin-bottom: 12px;
  }
  .btn {
    display: inline-block;
    background: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: 24px;
    padding: 10px 24px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
  }
  .btn:active { opacity: 0.8; }
  .btn-text {
    background: none;
    border: none;
    color: var(--color-primary);
    font-size: 14px;
    cursor: pointer;
    padding: 8px;
  }

  /* ---------- ボトムナビゲーション ---------- */
  nav.bottom-nav {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: calc(var(--nav-height) + env(safe-area-inset-bottom));
    padding-bottom: env(safe-area-inset-bottom);
    background: var(--color-indigo);
    border-top: 1px solid var(--color-indigo);
    display: flex;
    z-index: 10;
  }
  nav.bottom-nav button {
    flex: 1;
    background: none;
    border: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    font-size: 11px;
    color: var(--color-indigo-icon);
    cursor: pointer;
    padding: 4px 0;
  }
  nav.bottom-nav button .nav-icon { font-size: 20px; }
  nav.bottom-nav button.active { color: #fff; font-weight: bold; }

  /* ---------- ローディング/エラー(スプラッシュ) ---------- */
  #splash {
    position: fixed;
    inset: 0;
    background: var(--color-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    z-index: 100;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--color-outline);
    border-top-color: var(--color-primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #splash.hidden { display: none; }
  #splash .error-box { text-align: center; color: #B00020; padding: 0 24px; }

  /* ---------- ログイン画面 ---------- */
  #loginScreen {
    position: fixed;
    inset: 0;
    background: var(--color-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 90;
  }
  #loginScreen.hidden { display: none; }
  .login-box {
    width: 100%;
    max-width: 340px;
    padding: 32px 24px;
    text-align: center;
  }
  .login-box .material-emoji { font-size: 48px; }
  .login-box h1 { font-size: 20px; margin: 12px 0 4px; }
  .login-box p { color: var(--color-text-sub); font-size: 13px; margin: 0 0 28px; }
  .login-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 12px 16px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 12px;
    border: 1px solid var(--color-outline);
  }
  .login-btn:active { opacity: 0.8; }
  .login-btn.google { background: var(--color-surface); color: var(--color-text); }
  .login-btn.google svg { width: 18px; height: 18px; }
  .login-btn.guest { background: none; color: var(--color-primary); border: 1px solid var(--color-primary); }
  .login-btn.guest .nav-icon { font-size: 18px; }
  #loginError {
    color: #B00020;
    font-size: 12px;
    margin-top: 8px;
    display: none;
    white-space: pre-line;
  }
</style>
</head>
<body>

<!-- ============================================================
     起動時のスプラッシュ（ログイン処理が終わるまで表示）
     ============================================================ -->
<div id="splash">
  <div class="spinner"></div>
  <div>準備中…</div>
  <div class="error-box" id="splashError" style="display:none;"></div>
</div>

<!-- ============================================================
     ログイン画面（未ログイン時に表示）
     ============================================================ -->
<div id="loginScreen" class="hidden">
  <div class="login-box">
    <div class="material-emoji">🌊</div>
    <h1>海ゴミ探究ノート</h1>
    <p>伊勢志摩の海ゴミを記録・共有するアプリです。<br>ログインして始めましょう。</p>

    <button class="login-btn google" onclick="loginWithGoogle()">
      <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.1 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.9 1.1 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4c-7.7 0-14.3 4.3-17.7 10.7z"/><path fill="#4CAF50" d="M24 44c5.4 0 10.3-1.9 14-5.1l-6.5-5.4c-2 1.4-4.6 2.3-7.5 2.3-5.3 0-9.7-3.1-11.3-7.5l-6.6 5.1C9.6 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.7l6.5 5.4C41.4 36.6 44 30.9 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
      Googleでログイン
    </button>

    <button class="login-btn guest" onclick="loginAsGuest()">
      <span class="nav-icon">👤</span>
      ゲストとして利用する（お試し）
    </button>

    <div id="loginError"></div>
  </div>
</div>

<!-- ============================================================
     ヘッダー
     ============================================================ -->
<header class="app-bar" id="appHeader">海ゴミ探究ノート</header>

<!-- ============================================================
     各画面（タブ）
     ============================================================ -->
<main>

  <!-- ホーム -->
  <section class="screen active" id="screen-home">
    <div class="hero">
      <div class="material-emoji">🌊</div>
      <h1 id="homeGreeting">ようこそ！</h1>
      <p>伊勢志摩の海ゴミを記録・共有するアプリです。</p>
    </div>

    <!-- 記録サマリー（今はプレースホルダー。記録機能ができたら実際の件数に差し替え予定） -->
    <div class="card home-stats-card">
      <div class="stat-item">
        <div class="stat-value" id="statRecordCount">0</div>
        <div class="stat-label">これまでの記録</div>
      </div>
    </div>

    <!-- 他のタブへのショートカット -->
    <div class="shortcut-grid">
      <button class="shortcut-card" onclick="switchScreen('map')">
        <span class="shortcut-icon">🗺️</span>
        <span class="shortcut-label">地図を見る</span>
      </button>
      <button class="shortcut-card" onclick="switchScreen('records')">
        <span class="shortcut-icon">📋</span>
        <span class="shortcut-label">記録一覧を見る</span>
      </button>
    </div>

    <!-- 使い方 -->
    <div class="card home-howto-card">
      <h2 class="section-title">使い方</h2>
      <ol class="howto-list">
        <li>海岸で見つけたゴミを記録する<span class="badge-soon">準備中</span></li>
        <li>地図でみんなの記録を確認する<span class="badge-soon">準備中</span></li>
        <li>プロフィールで自分の活動をふりかえる</li>
      </ol>
    </div>
  </section>

  <!-- 地図（プレースホルダー） -->
  <section class="screen" id="screen-map">
    <div class="placeholder">
      <div class="icon">🗺️</div>
      <p>地図機能は今後実装予定です</p>
    </div>
  </section>

  <!-- 記録一覧（プレースホルダー） -->
  <section class="screen" id="screen-records">
    <div class="placeholder">
      <div class="icon">📋</div>
      <p>記録一覧機能は今後実装予定です</p>
    </div>
  </section>

  <!-- プロフィール -->
  <section class="screen" id="screen-profile">
    <div class="profile-avatar-wrap">
      <div class="avatar-inner">
        <img class="profile-avatar" id="profileAvatarImg" src="icons/default_avatar.png" alt="プロフィール画像"
             onclick="document.getElementById('avatarFileInput').click();">
        <div class="avatar-edit-badge" onclick="document.getElementById('avatarFileInput').click();">📷</div>
      </div>
      <!-- 実際に画面には表示せず、タップ時にOSの写真選択(アルバム/カメラ)を開くための入力欄 -->
      <input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="onAvatarFileSelected(event)">
      <div id="avatarStatus" class="avatar-status"></div>
    </div>

    <!-- 表示モード -->
    <div class="card" id="profileViewCard">
      <div class="info-row">
        <div class="label">ニックネーム</div>
        <div class="value" id="viewNickname">-</div>
      </div>
      <div class="info-row">
        <div class="label">ひとこと</div>
        <div class="value" id="viewComment">-</div>
      </div>
      <div class="info-row">
        <div class="label">作成日時</div>
        <div class="value" id="viewCreatedAt">-</div>
      </div>
      <div class="info-row">
        <div class="label">更新日時</div>
        <div class="value" id="viewUpdatedAt">-</div>
      </div>
      <div class="info-row">
        <div class="label">ログイン方法</div>
        <div class="value" id="viewAuthMethod">-</div>
      </div>
      <div style="text-align:right; margin-top:12px;">
        <button class="btn-text" onclick="logout()">ログアウト</button>
        <button class="btn" onclick="enterEditMode()">編集する</button>
      </div>
    </div>

    <!-- 編集モード（普段は非表示） -->
    <div class="card edit-form" id="profileEditCard" style="display:none;">
      <label>ニックネーム</label>
      <input type="text" id="editNickname" maxlength="20">
      <label>ひとこと</label>
      <textarea id="editComment" rows="3" maxlength="100"></textarea>
      <div style="text-align:right;">
        <button class="btn-text" onclick="cancelEditMode()">キャンセル</button>
        <button class="btn" onclick="saveProfile()">保存する</button>
      </div>
    </div>
  </section>

</main>

<!-- ============================================================
     ボトムナビゲーション
     ============================================================ -->
<nav class="bottom-nav">
  <button class="nav-btn active" data-screen="home" onclick="switchScreen('home')">
    <span class="nav-icon">🏠</span><span>ホーム</span>
  </button>
  <button class="nav-btn" data-screen="map" onclick="switchScreen('map')">
    <span class="nav-icon">🗺️</span><span>地図</span>
  </button>
  <button class="nav-btn" data-screen="records" onclick="switchScreen('records')">
    <span class="nav-icon">📋</span><span>記録一覧</span>
  </button>
  <button class="nav-btn" data-screen="profile" onclick="switchScreen('profile')">
    <span class="nav-icon">👤</span><span>プロフィール</span>
  </button>
</nav>

<!-- ============================================================
     Firebase SDK（compat版=グローバル変数方式）
     ES Modules(import文)を使わないため、file://で直接開いても
     CORSエラーが出にくく、初心者でも動作確認しやすい。
     ============================================================ -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js" onerror="window.__sdkLoadFailed=true;"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js" onerror="window.__sdkLoadFailed=true;"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js" onerror="window.__sdkLoadFailed=true;"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js" onerror="window.__sdkLoadFailed=true;"></script>

<script>
/* =============================================================
   起動時の安全装置:
   ・Firebase SDKの読み込みに失敗した場合
   ・script内でエラーが起きて処理が止まった場合
   ・何らかの理由で一定時間たっても画面が切り替わらない場合
   これらすべてで「準備中…」のまま固まらず、原因をエラー表示する。
   ============================================================= */
window.addEventListener("error", function (e) {
  showSplashError("エラーが発生しました: " + (e.message || e));
});
window.addEventListener("unhandledrejection", function (e) {
  const msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason);
  showSplashError("エラーが発生しました: " + msg);
});
setTimeout(function () {
  const splash = document.getElementById("splash");
  if (splash && !splash.classList.contains("hidden") && document.getElementById("splashError").style.display === "none") {
    if (window.__sdkLoadFailed) {
      showSplashError("Firebaseの読み込みに失敗しました。ネット接続、広告ブロッカー/セキュリティソフト、または https://www.gstatic.com へのアクセス制限をご確認ください。");
    } else if (typeof firebase === "undefined") {
      showSplashError("Firebase SDKが読み込めていません。ネット接続をご確認のうえ再読み込みしてください。");
    } else {
      showSplashError("初期化がタイムアウトしました。ネット接続、またはFirebaseプロジェクトの設定（APIキー等）をご確認ください。");
    }
  }
}, 8000);
</script>

<script>

/* =============================================================
   ★★★ ここを自分のFirebaseプロジェクトの値に書き換えてください ★★★
   取得場所: Firebaseコンソール →（歯車アイコン）プロジェクトの設定
            → 「全般」タブ → 「マイアプリ」→ 該当のWebアプリ
            → 「SDK の設定と構成」に表示されるオブジェクトをコピー
   ============================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyDB_SCHBUHACDJSjmn6bY2rR8vc2Sabjpg",
  authDomain: "umigomi-web.firebaseapp.com",
  projectId: "umigomi-web",
  storageBucket: "umigomi-web.firebasestorage.app",
  messagingSenderId: "104498907704",
  appId: "1:104498907704:web:eab43b09887d7d3fed34cd"
};

let auth, db, storage, googleProvider;
try {
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db = firebase.firestore();
  storage = firebase.storage();
  googleProvider = new firebase.auth.GoogleAuthProvider();

  // 永続化方式を試す。IndexedDBがブロックされている環境では
  // LOCALが失敗することがあるため、SESSION→NONEの順にフォールバックする。
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(function () {
    return auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
  }).catch(function () {
    return auth.setPersistence(firebase.auth.Auth.Persistence.NONE);
  }).catch(function (e) {
    console.warn("永続化方式の設定に失敗:", e);
  });
} catch (e) {
  showSplashError("Firebaseの初期化に失敗しました: " + e.message);
  throw e;
}

/* =============================================================
   定数（Firestoreのコレクション名・フィールド名を1箇所に集約）
   ============================================================= */
const USERS_COLLECTION = "users";
const DEFAULT_NICKNAME = "ゲスト";
const DEFAULT_COMMENT = "";
const DEFAULT_ICON = "icons/default_avatar.png";

/* 現在のプロフィールをメモリ上にも保持しておく（編集フォームの初期値等に使う） */
let currentProfile = null;

/* =============================================================
   1. 認証
   起動時に自動ログインはしない。ログイン済みならそのまま画面へ、
   未ログインならログイン画面（Google / ゲスト）を表示する。

   注意: 環境によっては（ブラウザのプライバシー設定・拡張機能等で
   IndexedDBがブロックされている場合など）onAuthStateChangedが
   永久に発火しないことがある。その場合でも操作不能にならないよう、
   一定時間で強制的にログイン画面へ進める。
   ============================================================= */
let authStateResolved = false;

auth.onAuthStateChanged(async (user) => {
  authStateResolved = true;
  if (user) {
    // ログイン済み
    try {
      await loadOrCreateProfile(user);
      hideSplash();
      hideLoginScreen();
    } catch (e) {
      if (e.code === "unavailable" || /offline/i.test(e.message)) {
        showSplashError("Firestoreデータベースに接続できません。\nFirebaseコンソール → Firestore Database で「データベースの作成」が完了しているかご確認ください（Authenticationとは別に作成が必要です）。");
      } else if (e.code === "permission-denied") {
        showSplashError("Firestoreへのアクセスが拒否されました。\nFirebaseコンソール → Firestore Database → ルール で読み書きが許可されているかご確認ください。");
      } else {
        showSplashError("データの取得に失敗しました: " + e.message);
      }
    }
  } else {
    // 未ログイン → ログイン画面を表示
    hideSplash();
    showLoginScreen();
  }
});

// onAuthStateChangedが一定時間たっても発火しない場合、強制的にログイン画面へ
setTimeout(function () {
  if (!authStateResolved) {
    hideSplash();
    showLoginScreen();
    showLoginError("初期状態の確認がタイムアウトしました。ログインは試せますが、うまくいかない場合はブラウザのプライバシー設定（IndexedDB/Cookieのブロック）や拡張機能をご確認ください。");
  }
}, 4000);

function hideSplash() {
  document.getElementById("splash").classList.add("hidden");
}
function showSplashError(message) {
  const errBox = document.getElementById("splashError");
  errBox.textContent = message + "\n（画面下部の手順でFirebase設定を確認してください）";
  errBox.style.display = "block";
  document.querySelector("#splash .spinner").style.display = "none";
  document.querySelector("#splash div:nth-child(2)").style.display = "none";
}

function showLoginScreen() {
  document.getElementById("loginScreen").classList.remove("hidden");
}
function hideLoginScreen() {
  document.getElementById("loginScreen").classList.add("hidden");
}
function showLoginError(message) {
  const errBox = document.getElementById("loginError");
  errBox.textContent = message;
  errBox.style.display = "block";
}
function clearLoginError() {
  const errBox = document.getElementById("loginError");
  errBox.style.display = "none";
  errBox.textContent = "";
}

/* Googleでログイン（ポップアップ方式） */
async function loginWithGoogle() {
  clearLoginError();
  try {
    await auth.signInWithPopup(googleProvider);
    // 成功すると onAuthStateChanged が呼ばれて画面が切り替わる
  } catch (e) {
    if (e.code === "auth/popup-closed-by-user" || e.code === "auth/cancelled-popup-request") {
      return; // ユーザーがポップアップを閉じただけなのでエラー表示不要
    }
    if (e.code === "auth/popup-blocked") {
      showLoginError("ポップアップがブロックされました。ブラウザの設定を確認してください。");
      return;
    }
    if (e.code === "auth/operation-not-allowed") {
      showLoginError("Googleログインが有効になっていません。\nFirebaseコンソール → Authentication → Sign-in method でGoogleを有効にしてください。");
      return;
    }
    showLoginError("ログインに失敗しました: " + e.message);
  }
}

/* ゲスト（匿名）としてログイン */
async function loginAsGuest() {
  clearLoginError();
  try {
    await auth.signInAnonymously();
  } catch (e) {
    if (e.code === "auth/operation-not-allowed") {
      showLoginError("匿名ログインが無効になっています。\nGoogleログインをご利用ください。");
      return;
    }
    showLoginError("ログインに失敗しました: " + e.message);
  }
}

/* ログアウト */
async function logout() {
  await auth.signOut();
  currentProfile = null;
  switchScreen("home");
}

/* =============================================================
   2. Firestore: プロフィールの取得 or 初期作成
   ============================================================= */
async function loadOrCreateProfile(user) {
  const uid = user.uid;
  const docRef = db.collection(USERS_COLLECTION).doc(uid);
  const snapshot = await docRef.get();

  // ログイン方法（Google / ゲスト）を判定
  const providerId = user.providerData[0] ? user.providerData[0].providerId : "anonymous";
  const authMethod = providerId === "google.com" ? "Google" : "ゲスト（匿名）";

  if (snapshot.exists) {
    currentProfile = snapshot.data();
    currentProfile.authMethod = authMethod;
  } else {
    // 初回ログイン: 初期プロフィールを作成
    // Googleログインの場合はアカウントの表示名・写真を初期値として使う
    const now = firebase.firestore.Timestamp.now();
    currentProfile = {
      uid: uid,
      nickname: (providerId === "google.com" && user.displayName) ? user.displayName : DEFAULT_NICKNAME,
      iconUrl: (providerId === "google.com" && user.photoURL) ? user.photoURL : DEFAULT_ICON,
      comment: DEFAULT_COMMENT,
      createdAt: now,
      updatedAt: now,
    };
    await docRef.set(currentProfile);
    currentProfile.authMethod = authMethod;
  }
  renderProfile();
}

/* =============================================================
   3. プロフィール画面への反映
   ============================================================= */
function renderProfile() {
  if (!currentProfile) return;
  document.getElementById("viewNickname").textContent = currentProfile.nickname;
  document.getElementById("viewComment").textContent = currentProfile.comment || "（未設定）";
  document.getElementById("viewCreatedAt").textContent = formatTimestamp(currentProfile.createdAt);
  document.getElementById("viewUpdatedAt").textContent = formatTimestamp(currentProfile.updatedAt);
  document.getElementById("profileAvatarImg").src = currentProfile.iconUrl || DEFAULT_ICON;
  document.getElementById("viewAuthMethod").textContent = currentProfile.authMethod || "-";

  // ホーム画面の歓迎メッセージにもニックネームを反映
  const greetingEl = document.getElementById("homeGreeting");
  if (greetingEl) {
    greetingEl.textContent = "ようこそ、" + currentProfile.nickname + "さん！";
  }
}

function formatTimestamp(ts) {
  if (!ts) return "-";
  const date = ts.toDate ? ts.toDate() : new Date(ts);
  return date.toLocaleString("ja-JP");
}

/* =============================================================
   4. プロフィール画像の変更
   選んだ画像はそのままアップロードすると容量が大きいことがあるため、
   canvasで一辺400px程度に縮小・JPEG圧縮してからFirebase Storageへ送る。
   ============================================================= */
function setAvatarStatus(message, isError) {
  const el = document.getElementById("avatarStatus");
  el.textContent = message || "";
  el.classList.toggle("error", !!isError);
}

async function onAvatarFileSelected(event) {
  const file = event.target.files && event.target.files[0];
  event.target.value = ""; // 同じファイルを連続で選んでもchangeが発火するようにリセット
  if (!file) return;

  if (!file.type.startsWith("image/")) {
    setAvatarStatus("画像ファイルを選んでください", true);
    return;
  }
  // 極端に大きい元ファイル(20MB超)は読み込み負荷が高いため事前に弾く
  if (file.size > 20 * 1024 * 1024) {
    setAvatarStatus("ファイルサイズが大きすぎます（20MBまで）", true);
    return;
  }

  const imgEl = document.getElementById("profileAvatarImg");
  const previousSrc = imgEl.src; // アップロード失敗時に元へ戻すために保持
  const previousIconUrl = currentProfile ? currentProfile.iconUrl : DEFAULT_ICON;

  try {
    setAvatarStatus("画像を処理中…", false);
    const canvas = await loadResizedCanvas(file, 400);

    // ★体感速度の改善ポイント:
    // アップロード(通信)の完了を待たず、リサイズ済みの画像をこの時点で
    // 画面にすぐ反映する。通信は裏側で並行して進める。
    const previewDataUrl = canvas.toDataURL("image/jpeg", 0.85);
    imgEl.src = previewDataUrl;
    setAvatarStatus("アップロード中…", false);

    // ★バグ修正ポイント:
    // ここで currentProfile.iconUrl もプレビュー画像に更新しておく。
    // こうしておかないと、アップロード完了前に「プロフィールを保存する」等の
    // 別の操作でrenderProfile()が呼ばれた際、まだ古いiconUrlのまま
    // 画面が再描画され、画像が一瞬で元に戻ってしまう不具合が起きる。
    currentProfile = { ...currentProfile, iconUrl: previewDataUrl };

    const blob = await canvasToBlob(canvas, 0.85);
    const uid = auth.currentUser.uid;
    const storageRef = storage.ref().child("avatars/" + uid + "/avatar.jpg");
    await storageRef.put(blob, { contentType: "image/jpeg" });
    const downloadUrl = await storageRef.getDownloadURL();

    const updateData = {
      iconUrl: downloadUrl,
      updatedAt: firebase.firestore.Timestamp.now(),
    };
    await db.collection(USERS_COLLECTION).doc(uid).update(updateData);

    currentProfile = { ...currentProfile, ...updateData };
    document.getElementById("viewUpdatedAt").textContent = formatTimestamp(updateData.updatedAt);
    // 正式な保存先URLに差し替え（見た目はプレビューとほぼ同じなので切り替わりは分からない）
    imgEl.src = downloadUrl;
    setAvatarStatus("画像を更新しました", false);
    setTimeout(() => setAvatarStatus("", false), 2500);
  } catch (e) {
    imgEl.src = previousSrc; // 失敗時はプレビューを元に戻す
    currentProfile = { ...currentProfile, iconUrl: previousIconUrl }; // 裏側のデータも元に戻す
    if (e.code === "storage/unauthorized") {
      setAvatarStatus("アップロード権限がありません。Firebaseコンソール→Storage→Rulesの設定をご確認ください。", true);
    } else if (e.code === "storage/unknown" || /CORS/i.test(e.message || "")) {
      setAvatarStatus("Storageへの接続に失敗しました。Firebaseコンソールで Storage が有効化されているかご確認ください。", true);
    } else {
      setAvatarStatus("画像の更新に失敗しました: " + e.message, true);
    }
  }
}

/* 画像ファイルを読み込み、指定した最大辺(maxSize)に収まるようcanvasで縮小する */
function loadResizedCanvas(file, maxSize) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("ファイルの読み込みに失敗しました"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("画像の読み込みに失敗しました"));
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxSize) {
          height = Math.round(height * (maxSize / width));
          width = maxSize;
        } else if (height > maxSize) {
          width = Math.round(width * (maxSize / height));
          height = maxSize;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* canvasをJPEG Blobに変換する（Storageへのアップロード用） */
function canvasToBlob(canvas, quality) {
  return new Promise((resolve, reject) => {
    canvas.toBlob(
      (blob) => (blob ? resolve(blob) : reject(new Error("画像の変換に失敗しました"))),
      "image/jpeg",
      quality
    );
  });
}

/* =============================================================
   5. プロフィール編集（ニックネーム・ひとこと）
   ============================================================= */
function enterEditMode() {
  document.getElementById("editNickname").value = currentProfile.nickname;
  document.getElementById("editComment").value = currentProfile.comment || "";
  document.getElementById("profileViewCard").style.display = "none";
  document.getElementById("profileEditCard").style.display = "block";
}
function cancelEditMode() {
  document.getElementById("profileViewCard").style.display = "block";
  document.getElementById("profileEditCard").style.display = "none";
}
async function saveProfile() {
  const uid = auth.currentUser.uid;
  const nickname = document.getElementById("editNickname").value.trim() || DEFAULT_NICKNAME;
  const comment = document.getElementById("editComment").value.trim();

  const updateData = {
    nickname: nickname,
    comment: comment,
    updatedAt: firebase.firestore.Timestamp.now(),
  };

  await db.collection(USERS_COLLECTION).doc(uid).update(updateData);

  // ローカルの表示も即時反映
  currentProfile = { ...currentProfile, ...updateData };
  renderProfile();
  cancelEditMode();
}

/* =============================================================
   6. 画面(タブ)切り替え
   ============================================================= */
function switchScreen(name) {
  document.querySelectorAll(".screen").forEach((el) => el.classList.remove("active"));
  document.getElementById("screen-" + name).classList.add("active");

  document.querySelectorAll(".nav-btn").forEach((btn) => btn.classList.remove("active"));
  document.querySelector('.nav-btn[data-screen="' + name + '"]').classList.add("active");
}

/* =============================================================
   7. PWA用のService Worker登録
   file://で開いた場合は登録できないため、その場合は静かにスキップする
   （httpsで公開(Vercel等)した後は自動的に有効になる）
   ============================================================= */
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {
      // 失敗してもアプリ自体は問題なく動くので何もしない
    });
  });
}
