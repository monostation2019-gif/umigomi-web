<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>まちみっけ｜ホーム</title>
<meta name="theme-color" content="#FAF7F0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-dark:#1F5A3D;
    --green:#2E7D52;
    --green-soft:#E8F3EC;
    --amber:#E8871E;
    --amber-soft:#FDEEDB;
    --cream:#FAF7F0;
    --ink:#2B2B26;
    --ink-soft:#6B6A62;
    --white:#FFFFFF;
    --line:#EFECE2;
    --shadow: 0 10px 24px rgba(31,90,61,0.14);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Noto Sans JP", sans-serif;
    background:var(--cream);
    color:var(--ink);
    height:100dvh;
    display:flex;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
    overflow:hidden; /* the whole app is one screen, no page-level scroll */
  }
  html.auth-checking #app{ visibility:hidden; }

  #boot-error{
    display:none;
    position:fixed;
    top:14px; left:14px; right:14px;
    max-width:432px;
    margin:0 auto;
    background:#FDECEA;
    border:1px solid #F3B8B0;
    color:#8A2E22;
    border-radius:12px;
    padding:12px 14px;
    font-size:12.5px;
    line-height:1.7;
    z-index:999;
  }
  #boot-error.visible{ display:block; }

  /* ===== App shell: header + scrollable middle + fixed bottom nav =====
     This 3-row flex layout is what actually guarantees everything fits
     a single phone screen. Only ".scroll-area" is allowed to scroll,
     and only as a safety net on unusually short screens — on normal
     phones nothing scrolls at all. */
  #app{
    width:100%;
    max-width:460px;
    height:100dvh;
    background:var(--cream);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  .top-header{
    flex-shrink:0;
    padding:calc(10px + env(safe-area-inset-top)) 20px 6px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .logo-group{ display:flex; flex-direction:column; gap:5px; }
  .logo{
    font-family:"Zen Maru Gothic", sans-serif;
    font-weight:900;
    font-size:22px;
    line-height:1;
    display:flex; align-items:center; gap:2px;
  }
  .logo .machi{ color:var(--green-dark); }
  .logo .mikke{ color:var(--amber); }
  .logo .dot-icon{ display:inline-flex; margin-left:2px; transform:rotate(-8deg) translateY(-3px); }
  .pref-badge{
    align-self:flex-start;
    background:var(--green);
    color:var(--white);
    font-size:10.5px;
    font-weight:700;
    padding:3px 11px;
    border-radius:999px;
    letter-spacing:.04em;
  }

  .account-chip{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--white);
    border:1px solid var(--line);
    border-radius:999px;
    padding:5px 12px 5px 5px;
    flex-shrink:0;
  }
  .account-chip .avatar{
    width:26px; height:26px;
    border-radius:50%;
    background:var(--amber-soft);
    color:var(--green-dark);
    font-family:"Zen Maru Gothic", sans-serif;
    font-weight:700;
    font-size:12px;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .account-chip .avatar img{ width:100%; height:100%; object-fit:cover; }
  .account-chip .uname{ font-size:11px; font-weight:700; color:var(--ink); max-width:70px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .account-chip .logout-x{
    border:none; background:none; color:var(--ink-soft); font-size:14px; cursor:pointer; line-height:1;
    padding:2px;
  }

  /* ===== Scrollable middle (fills all leftover space) ===== */
  .scroll-area{
    flex:1 1 auto;
    min-height:0;
    display:flex;
    flex-direction:column;
    overflow-y:auto;
  }

  .hero-card{
    margin:4px 20px 0;
    border-radius:18px;
    overflow:hidden;
    box-shadow:var(--shadow);
    flex:1 1 auto;
    min-height:120px;
    max-height:230px;
    position:relative;
  }
  .hero-card img{
    width:100%; height:100%;
    object-fit:cover;
    object-position:center 38%;
    display:block;
  }

  .tagline{ padding:14px 22px 0; text-align:center; flex-shrink:0; }
  .tagline h1{
    font-family:"Zen Maru Gothic", sans-serif;
    font-size:15px;
    font-weight:700;
    color:var(--green-dark);
    line-height:1.5;
  }
  .tagline p{
    margin-top:5px;
    font-size:11.5px;
    line-height:1.6;
    color:var(--ink-soft);
  }

  /* Feature strip — explains what the app does. Purely informational
     (not links), so it no longer duplicates the bottom navigation. */
  .feature-row{
    display:flex;
    padding:12px 18px 2px;
    justify-content:space-between;
    gap:4px;
    flex-shrink:0;
  }
  .feature-item{
    flex:1;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    text-align:center;
  }
  .feature-item .fi-circle{
    width:34px; height:34px;
    border-radius:50%;
    background:var(--green-soft);
    display:flex; align-items:center; justify-content:center;
    font-size:15px;
  }
  .feature-item .fi-label{ font-size:9.5px; font-weight:700; color:var(--ink-soft); line-height:1.3; }

  .cta-area{ padding:12px 22px 0; flex-shrink:0; }
  .btn{
    width:100%;
    border:none;
    border-radius:14px;
    padding:13px 16px;
    font-size:15.5px;
    font-weight:700;
    font-family:"Noto Sans JP", sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    cursor:pointer;
    transition:transform .12s ease, background .12s ease;
  }
  .btn:active{ transform:scale(0.98); }
  .btn-discover{ background:var(--green); color:var(--white); box-shadow:var(--shadow); }
  .btn-discover:hover{ background:var(--green-dark); }

  /* Single, compact ranking teaser — replaces the old icon row so map /
     ranking / mypage aren't offered twice on the same screen. */
  .ranking-link{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    margin:10px 22px 8px;
    padding:9px 14px;
    background:var(--amber-soft);
    color:var(--amber);
    border:none;
    border-radius:12px;
    font-size:11.5px;
    font-weight:700;
    cursor:pointer;
    flex-shrink:0;
  }
  .ranking-link .arrow{ color:var(--amber); }

  .bottom-nav{
    flex-shrink:0;
    display:flex;
    align-items:flex-end;
    justify-content:space-around;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    background:var(--white);
    border-top:1px solid var(--line);
  }
  .nav-item{
    display:flex; flex-direction:column; align-items:center; gap:3px;
    font-size:10px;
    color:var(--ink-soft);
    font-weight:700;
    background:none; border:none; cursor:pointer;
    padding:4px 6px;
  }
  .nav-item.active{ color:var(--green); }
  .nav-item .nav-icon{ font-size:18px; }
  .nav-item.center{ position:relative; top:-14px; }
  .nav-item.center .nav-icon{
    width:48px; height:48px; border-radius:50%;
    background:var(--green); color:var(--white);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; box-shadow:var(--shadow);
  }

  @media (min-width:768px){
    body{ padding:24px 0; overflow:auto; height:auto; min-height:100dvh; }
    #app{ border-radius:28px; box-shadow:0 0 60px rgba(0,0,0,0.08); height:820px; }
  }
</style>
</head>
<body>

<div id="boot-error">
  ページの読み込みに問題が発生しました。<br>
  ・Firebaseの設定（assets/firebase-init.js の firebaseConfig）が正しいか<br>
  ・このページを http(s):// 経由で開いているか（file:// で直接開くと動作しません）<br>
  をご確認ください。詳細はブラウザの開発者ツール（コンソール）にも表示されています。
</div>

<div id="app">
  <header class="top-header">
    <div class="logo-group">
      <div class="logo">
        <span class="machi">まち</span><span class="mikke">みっけ</span>
        <span class="dot-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <circle cx="10" cy="10" r="7" stroke="#E8871E" stroke-width="2.6"/>
            <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="#E8871E" stroke-width="2.6" stroke-linecap="round"/>
          </svg>
        </span>
      </div>
      <span class="pref-badge">伊勢市限定版</span>
    </div>

    <div class="account-chip">
      <span class="avatar" id="header-avatar">見</span>
      <span class="uname" id="header-username">-</span>
      <button class="logout-x" id="btn-logout" title="ログアウト">✕</button>
    </div>
  </header>

  <div class="scroll-area">
    <div class="hero-card">
      <img src="assets/hero-street.png" alt="伊勢のまちを歩く・走る・自転車で巡る人々のイラスト">
    </div>

    <div class="tagline">
      <h1>歩いて、走って、見つけよう。<br>みんなでつくる、伊勢の図鑑。</h1>
      <p>まちで見つけたものを写真で記録。AIが判定して、みんなの図鑑になります。</p>
    </div>

    <div class="feature-row">
      <div class="feature-item">
        <span class="fi-circle">📷</span><span class="fi-label">見つけて</span>
      </div>
      <div class="feature-item">
        <span class="fi-circle">🔍</span><span class="fi-label">AIで判定</span>
      </div>
      <div class="feature-item">
        <span class="fi-circle">📖</span><span class="fi-label">図鑑に登録</span>
      </div>
      <div class="feature-item">
        <span class="fi-circle">📍</span><span class="fi-label">伊勢を知る</span>
      </div>
    </div>

    <div class="cta-area">
      <button id="btn-discover" class="btn btn-discover">📷　発見する</button>
    </div>

    <button id="btn-ranking" class="ranking-link">🏆　今週の町別ランキングを見る　<span class="arrow">›</span></button>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" data-nav="home.html"><span class="nav-icon">🏠</span>ホーム</button>
    <button class="nav-item" data-nav="zukan.html"><span class="nav-icon">📖</span>図鑑</button>
    <button class="nav-item center" data-nav="discover.html"><span class="nav-icon">📷</span></button>
    <button class="nav-item" data-nav="map.html"><span class="nav-icon">🗺️</span>マップ</button>
    <button class="nav-item" data-nav="mypage.html"><span class="nav-icon">👤</span>マイページ</button>
  </nav>
</div>

<!-- ===================== Firebase ===================== -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="assets/firebase-init.js"></script>
<script>
  document.documentElement.classList.add("auth-checking");

  const $ = (id) => document.getElementById(id);

  // ----- Navigation (previously missing: buttons had no click handlers) -----
  // Adjust the filenames below to match the actual page names in your project.
  $("btn-discover").addEventListener("click", () => { window.location.href = "discover.html"; });
  $("btn-ranking").addEventListener("click", () => { window.location.href = "ranking.html"; });
  document.querySelectorAll(".nav-item[data-nav]").forEach((btn) => {
    btn.addEventListener("click", () => {
      const dest = btn.dataset.nav;
      if (dest && dest !== "home.html") window.location.href = dest;
    });
  });

  $("btn-logout").addEventListener("click", async () => {
    await auth.signOut();
    window.location.href = "login.html";
  });

  function showBootError(){
    document.getElementById("boot-error").classList.add("visible");
    document.documentElement.classList.remove("auth-checking");
  }

  // Firebaseの読み込み・通信に失敗しても画面が白紙のまま止まらないよう、
  // 一定時間内に認証状態が確定しない場合はエラーを表示する
  const bootTimeout = setTimeout(showBootError, 6000);

  try{
    // 未ログインならログイン画面へ即リダイレクト
    auth.onAuthStateChanged(async (user) => {
      clearTimeout(bootTimeout);
      if (!user){
        window.location.href = "login.html";
        return;
      }
      try{
        const data = await fetchUserProfile(user.uid);
        const name = data.displayName || (user.isAnonymous ? "ゲスト" : "伊勢の探検家");

        $("header-username").textContent = name;
        const avatar = $("header-avatar");
        if (data.photoURL){
          avatar.innerHTML = '<img src="' + data.photoURL + '" alt="">';
        } else {
          avatar.textContent = name.charAt(name.length - 1) || "見";
        }

        document.documentElement.classList.remove("auth-checking");
      }catch(err){
        console.error(err);
        document.documentElement.classList.remove("auth-checking");
      }
    }, (err) => {
      clearTimeout(bootTimeout);
      console.error(err);
      showBootError();
    });
  }catch(err){
    clearTimeout(bootTimeout);
    console.error(err);
    showBootError();
  }
</script>
</body>
</html>
