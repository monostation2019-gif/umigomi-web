<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>まちみっけ｜ホーム</title>
<meta name="theme-color" content="#FAF7F0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-dark:#1F5A3D;
    --green:#2E7D52;
    --green-soft:#E8F3EC;
    --amber:#E8871E;
    --amber-soft:#FDEEDB;
    --cream:#FAF7F0;
    --ink:#2B2B26;
    --ink-soft:#6B6A62;
    --white:#FFFFFF;
    --line:#EFECE2;
    --shadow: 0 10px 24px rgba(31,90,61,0.14);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Noto Sans JP", sans-serif;
    background:var(--cream);
    color:var(--ink);
    min-height:100dvh;
    display:flex;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
  }
  html.auth-checking #app{ visibility:hidden; }

  #app{
    width:100%;
    max-width:460px;
    min-height:100dvh;
    background:var(--cream);
    display:flex;
    flex-direction:column;
  }

  .top-header{
    padding:18px 20px 4px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .logo-group{ display:flex; flex-direction:column; gap:6px; }
  .logo{
    font-family:"Zen Maru Gothic", sans-serif;
    font-weight:900;
    font-size:26px;
    line-height:1;
    display:flex; align-items:center; gap:2px;
  }
  .logo .machi{ color:var(--green-dark); }
  .logo .mikke{ color:var(--amber); }
  .logo .dot-icon{ display:inline-flex; margin-left:2px; transform:rotate(-8deg) translateY(-3px); }
  .pref-badge{
    align-self:flex-start;
    background:var(--green);
    color:var(--white);
    font-size:11px;
    font-weight:700;
    padding:4px 12px;
    border-radius:999px;
    letter-spacing:.04em;
  }

  .account-chip{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--white);
    border:1px solid var(--line);
    border-radius:999px;
    padding:5px 12px 5px 5px;
    flex-shrink:0;
  }
  .account-chip .avatar{
    width:26px; height:26px;
    border-radius:50%;
    background:var(--amber-soft);
    color:var(--green-dark);
    font-family:"Zen Maru Gothic", sans-serif;
    font-weight:700;
    font-size:12px;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .account-chip .avatar img{ width:100%; height:100%; object-fit:cover; }
  .account-chip .uname{ font-size:11px; font-weight:700; color:var(--ink); max-width:70px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .account-chip .logout-x{
    border:none; background:none; color:var(--ink-soft); font-size:14px; cursor:pointer; line-height:1;
    padding:2px;
  }

  .hero-card{
    margin:12px 20px 0;
    border-radius:18px;
    overflow:hidden;
    box-shadow:var(--shadow);
    aspect-ratio: 4 / 3;
    position:relative;
  }
  .hero-card img{
    width:100%; height:100%;
    object-fit:cover;
    object-position:center 42%;
    display:block;
  }

  .tagline{ padding:16px 22px 4px; text-align:center; }
  .tagline h1{
    font-family:"Zen Maru Gothic", sans-serif;
    font-size:16px;
    font-weight:700;
    color:var(--green-dark);
    line-height:1.6;
  }
  .tagline p{
    margin-top:6px;
    font-size:12px;
    line-height:1.7;
    color:var(--ink-soft);
  }

  .cta-area{ padding:16px 22px 6px; }
  .btn{
    width:100%;
    border:none;
    border-radius:14px;
    padding:14px 16px;
    font-size:16px;
    font-weight:700;
    font-family:"Noto Sans JP", sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    cursor:pointer;
    transition:transform .12s ease, background .12s ease;
  }
  .btn:active{ transform:scale(0.98); }
  .btn-discover{ background:var(--green); color:var(--white); box-shadow:var(--shadow); }
  .btn-discover:hover{ background:var(--green-dark); }

  .quick-icons{
    display:flex;
    padding:14px 22px 6px;
    justify-content:space-around;
    gap:8px;
  }
  .quick-icon{
    flex:1;
    background:none; border:none; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    padding:8px 4px;
    border-radius:12px;
    color:var(--ink);
  }
  .quick-icon:hover{ background:var(--green-soft); }
  .quick-icon .qi-circle{
    width:44px; height:44px;
    border-radius:50%;
    background:var(--green-soft);
    display:flex; align-items:center; justify-content:center;
    font-size:19px;
  }
  .quick-icon .qi-label{ font-size:10.5px; font-weight:700; color:var(--ink-soft); }

  .spacer{ flex:1; }

  .bottom-nav{
    display:flex;
    align-items:flex-end;
    justify-content:space-around;
    padding:10px 6px calc(10px + env(safe-area-inset-bottom));
    background:var(--white);
    border-top:1px solid var(--line);
    position:sticky;
    bottom:0;
  }
  .nav-item{
    display:flex; flex-direction:column; align-items:center; gap:3px;
    font-size:10px;
    color:var(--ink-soft);
    font-weight:700;
    background:none; border:none; cursor:pointer;
    padding:4px 6px;
  }
  .nav-item.active{ color:var(--green); }
  .nav-item .nav-icon{ font-size:19px; }
  .nav-item.center{ position:relative; top:-16px; }
  .nav-item.center .nav-icon{
    width:52px; height:52px; border-radius:50%;
    background:var(--green); color:var(--white);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; box-shadow:var(--shadow);
  }

  @media (min-width:768px){
    body{ padding:24px 0; }
    #app{ border-radius:28px; box-shadow:0 0 60px rgba(0,0,0,0.08); min-height:820px; height:820px; overflow-y:auto; }
  }
</style>
</head>
<body>

<div id="app">
  <header class="top-header">
    <div class="logo-group">
      <div class="logo">
        <span class="machi">まち</span><span class="mikke">みっけ</span>
        <span class="dot-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <circle cx="10" cy="10" r="7" stroke="#E8871E" stroke-width="2.6"/>
            <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="#E8871E" stroke-width="2.6" stroke-linecap="round"/>
          </svg>
        </span>
      </div>
      <span class="pref-badge">伊勢市限定版</span>
    </div>

    <div class="account-chip">
      <span class="avatar" id="header-avatar">見</span>
      <span class="uname" id="header-username">-</span>
      <button class="logout-x" id="btn-logout" title="ログアウト">✕</button>
    </div>
  </header>

  <div class="hero-card">
    <img src="assets/hero-street.png" alt="伊勢のまちを歩く・走る・自転車で巡る人々のイラスト">
  </div>

  <div class="tagline">
    <h1>歩いて、走って、見つけよう。<br>みんなでつくる、伊勢の図鑑。</h1>
    <p>まちで見つけたものを写真で記録。AIが判定して、みんなの図鑑になります。</p>
  </div>

  <div class="cta-area">
    <button id="btn-discover" class="btn btn-discover">📷　発見する</button>
  </div>

  <div class="quick-icons">
    <button class="quick-icon" data-nav="map">
      <span class="qi-circle">🗺️</span><span class="qi-label">マップ</span>
    </button>
    <button class="quick-icon" data-nav="ranking">
      <span class="qi-circle">🏆</span><span class="qi-label">ランキング</span>
    </button>
    <button class="quick-icon" data-nav="mypage">
      <span class="qi-circle">👤</span><span class="qi-label">マイページ</span>
    </button>
  </div>

  <div class="spacer"></div>

  <nav class="bottom-nav">
    <button class="nav-item active"><span class="nav-icon">🏠</span>ホーム</button>
    <button class="nav-item"><span class="nav-icon">📖</span>図鑑</button>
    <button class="nav-item center"><span class="nav-icon">📷</span></button>
    <button class="nav-item"><span class="nav-icon">🗺️</span>マップ</button>
    <button class="nav-item"><span class="nav-icon">👤</span>マイページ</button>
  </nav>
</div>

<!-- ===================== Firebase ===================== -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="assets/firebase-init.js"></script>
<script>
  document.documentElement.classList.add("auth-checking");

  const $ = (id) => document.getElementById(id);

  $("btn-logout").addEventListener("click", async () => {
    await auth.signOut();
    window.location.href = "login.html";
  });

  // 未ログインならログイン画面へ即リダイレクト
  auth.onAuthStateChanged(async (user) => {
    if (!user){
      window.location.href = "login.html";
      return;
    }
    try{
      const data = await fetchUserProfile(user.uid);
      const name = data.displayName || (user.isAnonymous ? "ゲスト" : "伊勢の探検家");

      $("header-username").textContent = name;
      const avatar = $("header-avatar");
      if (data.photoURL){
        avatar.innerHTML = '<img src="' + data.photoURL + '" alt="">';
      } else {
        avatar.textContent = name.charAt(name.length - 1) || "見";
      }

      document.documentElement.classList.remove("auth-checking");
    }catch(err){
      console.error(err);
      document.documentElement.classList.remove("auth-checking");
    }
  });
</script>
</body>
</html>
