
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>伊勢まちみっけ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --kinari: #F1EBDD;      /* 生成り: 背景 */
    --kinari-deep: #E8DFC9; /* 生成りの濃淡 */
    --sumi: #2B2B28;        /* 墨: 本文文字 */
    --indigo: #253A50;      /* 藍: ヘッダー・主要UI */
    --indigo-deep: #1B2C3C;
    --vermillion: #B23A2E;  /* 朱: アクセント・ピン */
    --vermillion-deep: #8F2C22;
    --moss: #6E7B52;        /* 苔: 副アクセント */
    --line: #D8CFBB;        /* 罫線 */
    --white: #FFFDF8;
  }
  *{ box-sizing: border-box; }
  html, body{
    margin:0; padding:0; height:100%;
    background: var(--kinari);
    color: var(--sumi);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    overflow:hidden;
  }
  #app{
    display:flex; flex-direction:column;
    height:100vh; height:100dvh;
    width:100%;
  }

  /* ---------- header ---------- */
  header{
    position:relative;
    flex: 0 0 auto;
    background: var(--indigo);
    color: var(--white);
    padding: 14px 18px 12px;
    display:flex; align-items:baseline; gap:10px;
    border-bottom: 3px solid var(--vermillion);
  }
  header h1{
    font-family:'Shippori Mincho', serif;
    font-weight:700;
    font-size: 20px;
    margin:0;
    letter-spacing: 0.04em;
  }
  header .sub{
    font-size: 11px;
    opacity: 0.75;
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  /* ---------- map area ---------- */
  #map-wrap{ position:relative; flex:1 1 auto; min-height:0; }
  #map{ position:absolute; inset:0; background: var(--kinari-deep); }

  /* leaflet popup theming */
  .leaflet-popup-content-wrapper{
    background: var(--white);
    border-radius: 10px;
    box-shadow: 0 6px 20px rgba(43,43,40,0.18);
  }
  .leaflet-popup-tip{ background: var(--white); }
  .leaflet-container{ font-family:'Zen Kaku Gothic New', sans-serif; }

  /* ---------- layer toggle (satellite/standard) ---------- */
  .layer-toggle{
    position:absolute; top:14px; right:14px; z-index:500;
    display:flex; background: var(--white);
    border-radius: 999px; padding:3px;
    box-shadow: 0 3px 12px rgba(43,43,40,0.22);
  }
  .layer-toggle button{
    border:none; background:transparent; cursor:pointer;
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size: 12.5px; font-weight:500;
    padding: 7px 14px; border-radius: 999px;
    color: var(--indigo); transition: background .15s, color .15s;
    white-space:nowrap;
  }
  .layer-toggle button.active{
    background: var(--indigo); color: var(--white);
  }

  .locate-btn{
    position:absolute; top:54px; right:14px; z-index:500;
    width:34px; height:34px; border-radius:50%; border:none;
    background: var(--white); color: var(--indigo); cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 3px 12px rgba(43,43,40,0.22);
  }
  .locate-btn.active{ color: var(--vermillion); }
  .locate-btn.loading{ opacity:0.6; }

  .my-location-dot{
    width:16px; height:16px; border-radius:50%;
    background:#4285F4; border:3px solid #fff;
    box-shadow:0 0 0 2px rgba(66,133,244,0.5), 0 2px 6px rgba(0,0,0,0.35);
  }
  .my-location-pulse{
    width:16px; height:16px; border-radius:50%;
    background:#4285F4; opacity:0.35;
    animation: myLocPulse 1.8s ease-out infinite;
  }
  @keyframes myLocPulse{
    0%{ transform:scale(1); opacity:0.45; }
    100%{ transform:scale(2.8); opacity:0; }
  }

  /* ---------- hint pill ---------- */
  .hint-pill{
    position:absolute; left:50%; bottom:16px; transform:translateX(-50%);
    z-index:500;
    background: rgba(37,58,80,0.92); color: var(--white);
    font-size: 12.5px; padding: 8px 16px; border-radius: 999px;
    box-shadow: 0 3px 12px rgba(43,43,40,0.25);
    pointer-events:none;
    transition: opacity .3s;
  }
  .pin-count{
    position:absolute; left:14px; top:14px; z-index:500;
    background: var(--white); color: var(--indigo);
    font-size:12px; font-weight:500; padding:6px 12px;
    border-radius: 999px; box-shadow: 0 3px 12px rgba(43,43,40,0.18);
  }
  .pin-count b{ color: var(--vermillion); font-size:13px; }

  .legend-btn{
    position:absolute; left:14px; top:52px; z-index:500;
    width:26px; height:26px; border-radius:50%; border:none;
    background: var(--white); color: var(--indigo); font-weight:700; font-size:13px;
    box-shadow: 0 3px 12px rgba(43,43,40,0.18); cursor:pointer;
  }
  .legend-card{
    position:absolute; left:14px; top:84px; z-index:500; display:none;
    background: var(--white); border-radius:12px; padding:10px 14px;
    box-shadow: 0 4px 16px rgba(43,43,40,0.22); min-width:150px;
  }
  .legend-card.open{ display:block; }
  .legend-title{
    font-size:11px; color:#9a9184; margin-bottom:6px; font-weight:500;
  }
  .legend-row{
    display:flex; align-items:center; gap:8px; font-size:12px;
    color: var(--sumi); padding:3px 0;
  }
  .legend-dot{
    width:20px; height:20px; border-radius:50%; border:2px solid;
    display:flex; align-items:center; justify-content:center;
    font-family:'Shippori Mincho', serif; font-weight:700; font-size:10.5px;
    flex:0 0 auto; background: var(--white);
  }

  /* ---------- hanko marker (signature pin) ---------- */
  .hanko-icon{
    width:34px; height:34px;
    display:flex; align-items:center; justify-content:center;
    background: var(--white);
    border: 2.5px solid var(--vermillion);
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(43,43,40,0.35);
    font-family:'Shippori Mincho', serif;
    font-weight:700; font-size:15px; color: var(--vermillion);
    transform: translate(-50%,-50%);
  }
  .hanko-icon.draft{
    border-style: dashed;
    opacity:0.75;
  }

  /* ---------- popup content ---------- */
  .pop{ min-width:170px; max-width:230px; }
  .pop-photo{
    width: calc(100% + 26px); margin: -13px -13px 8px -13px;
    max-height:130px; object-fit:cover; display:block;
    border-radius: 10px 10px 0 0;
  }
  .pop-photo-loading{
    width: calc(100% + 26px); margin: -13px -13px 8px -13px;
    height:70px; border-radius:10px 10px 0 0;
    background: var(--kinari-deep);
    color: var(--sumi); opacity:0.6;
    font-size:11.5px; display:flex; align-items:center; justify-content:center;
  }
  .pop .cat{
    display:inline-block; font-size:10.5px; color:var(--moss);
    border:1px solid var(--moss); border-radius:999px;
    padding:1px 8px; margin-bottom:6px;
  }
  .pop .cat.machi-tag{ color:var(--indigo); border-color:var(--indigo); }
  .pop h3{
    font-family:'Shippori Mincho', serif; font-size:15px;
    margin: 0 0 4px; color: var(--indigo); font-weight:700;
  }
  .pop p{ font-size:12.5px; line-height:1.5; margin:0 0 8px; color:var(--sumi); }
  .pop p.range-note{ font-size:10.5px; color:var(--vermillion-deep); margin:-2px 0 8px; }
  .pop .meta{ font-size:10.5px; color:#9a9184; margin-bottom:8px;}
  .pop-actions{ display:flex; align-items:center; gap:10px; }
  .pop .nav-btn{
    border:none; background: var(--indigo); color:#fff;
    font-size:11.5px; font-weight:500; cursor:pointer;
    padding:6px 12px; border-radius:999px;
  }
  .pop .edit{
    border:1px solid var(--indigo); background:none; color:var(--indigo);
    font-size:11px; font-weight:500; cursor:pointer;
    padding:5px 11px; border-radius:999px;
  }
  .pop .del{
    border:none; background:none; color:var(--vermillion-deep);
    font-size:11px; cursor:pointer; padding:0; text-decoration:underline;
    flex:0 0 auto; margin-left:auto;
  }

  /* ---------- bottom sheet form ---------- */
  #sheet-overlay, #profile-overlay{
    position:fixed; inset:0; background: rgba(27,44,60,0.35);
    z-index:900; display:none;
  }
  #profile-overlay{ z-index:950; }
  #sheet, #profile-sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:901;
    background: var(--white);
    border-radius: 18px 18px 0 0;
    box-shadow: 0 -8px 30px rgba(43,43,40,0.3);
    padding: 18px 20px calc(20px + env(safe-area-inset-bottom));
    transform: translateY(110%);
    transition: transform .28s ease;
    max-height: 78vh; overflow-y:auto;
  }
  #profile-sheet{ z-index:951; }
  #sheet.open, #profile-sheet.open{ transform: translateY(0); }
  #sheet h2, #profile-sheet h2{
    font-family:'Shippori Mincho', serif; font-size:17px;
    color: var(--indigo); margin:0 0 3px; font-weight:700;
  }
  #sheet .coord{ font-size:11px; color:#9a9184; margin-bottom:14px; }
  .machi-status{ font-size:11px; color:var(--moss); margin-top:5px; min-height:14px; }
  .machi-status.err{ color:var(--vermillion-deep); }
  #sheet label, #profile-sheet label{
    display:block; font-size:12px; color: var(--indigo); font-weight:500;
    margin: 12px 0 5px;
  }
  #sheet input[type=text], #sheet textarea, #sheet select,
  #profile-sheet input[type=text]{
    width:100%; border:1px solid var(--line); border-radius:8px;
    padding: 9px 11px; font-size:14px; font-family:'Zen Kaku Gothic New', sans-serif;
    background: var(--kinari); color: var(--sumi);
  }
  #sheet textarea{ resize:vertical; min-height:56px; }
  #sheet .cat-row{ display:flex; flex-wrap:wrap; gap:7px; margin-top:6px; }
  #sheet .cat-chip{
    border:1px solid var(--line); background:var(--kinari);
    border-radius:999px; padding:6px 13px; font-size:12.5px;
    cursor:pointer; color:var(--sumi);
  }
  #sheet .cat-chip.selected{
    background: var(--moss); border-color:var(--moss); color:var(--white);
  }
  #sheet .btn-row, #profile-sheet .btn-row{ display:flex; gap:10px; margin-top:20px; }
  #sheet button.primary, #sheet button.secondary,
  #profile-sheet button.primary, #profile-sheet button.secondary{
    flex:1; padding:12px; border-radius:10px; font-size:14.5px;
    font-weight:500; cursor:pointer; border:none;
    font-family:'Zen Kaku Gothic New', sans-serif;
  }
  #sheet button.primary, #profile-sheet button.primary{ background: var(--vermillion); color:var(--white); }
  #sheet button.primary:active, #profile-sheet button.primary:active{ background: var(--vermillion-deep); }
  #sheet button.secondary, #profile-sheet button.secondary{ background: var(--kinari); color:var(--sumi); border:1px solid var(--line); }

  /* ---------- profile sheet specifics ---------- */
  .profile-view{ text-align:center; padding-top:4px; }
  .profile-avatar-wrap{ display:flex; justify-content:center; margin-bottom:12px; }
  .profile-avatar{
    width:76px; height:76px; border-radius:50%;
    background: var(--vermillion); color:var(--white);
    display:flex; align-items:center; justify-content:center;
    font-family:'Shippori Mincho', serif; font-size:28px; font-weight:700;
    border:3px solid var(--kinari); box-shadow:0 3px 10px rgba(43,43,40,0.25);
    background-size:cover; background-position:center; overflow:hidden;
    flex:0 0 auto;
  }
  .profile-view h2{ font-size:18px; margin:2px 0 4px; }
  .profile-bio{
    font-size:12.5px; color:#7c7266; margin:0 0 6px;
    min-height:16px; line-height:1.5;
  }
  .profile-avatar-edit-wrap{ display:flex; align-items:center; gap:14px; margin-bottom:6px; }
  .avatar-actions{ display:flex; flex-direction:column; gap:6px; flex:1; }
  .avatar-btn{
    border:1px solid var(--line); background:var(--kinari); color:var(--sumi);
    border-radius:8px; padding:8px 10px; font-size:12.5px; cursor:pointer;
    font-family:'Zen Kaku Gothic New', sans-serif; text-align:center;
  }
  .avatar-redo{
    border:none; background:none; color:var(--vermillion-deep);
    font-size:11.5px; text-decoration:underline; cursor:pointer; padding:2px 0;
    font-family:'Zen Kaku Gothic New', sans-serif; align-self:flex-start;
  }

  /* ---------- pin photo (registration sheet) ---------- */
  .photo-actions{ display:flex; gap:8px; margin-top:6px; }
  .photo-actions .avatar-btn{ flex:1; }
  .photo-preview-wrap{ margin-top:10px; }
  .photo-preview-img{
    width:100%; max-height:170px; object-fit:cover;
    border-radius:10px; border:1px solid var(--line); display:block;
  }

  #toast{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background: var(--indigo); color:var(--white); font-size:13px;
    padding:10px 18px; border-radius:999px; z-index:1000;
    opacity:0; pointer-events:none; transition: all .25s;
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* ---------- header layout (title + user badge) ---------- */
  header{ justify-content:space-between; }
  .header-title{ display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .user-badge{
    display:none; align-items:center; gap:9px;
    font-size:11.5px; color: rgba(255,255,255,0.88); white-space:nowrap;
    cursor:pointer;
  }
  .user-badge-avatar{
    width:26px; height:26px; border-radius:50%; flex:0 0 auto;
    background: var(--vermillion); color:var(--white);
    display:flex; align-items:center; justify-content:center;
    font-family:'Shippori Mincho', serif; font-size:12px; font-weight:700;
    border:1.5px solid rgba(255,255,255,0.6);
    background-size:cover; background-position:center; overflow:hidden;
  }
  .user-badge button{
    background:none; border:none; color: rgba(255,255,255,0.65);
    font-size:10.5px; text-decoration:underline; cursor:pointer; padding:0;
    font-family:'Zen Kaku Gothic New', sans-serif;
  }

  /* ---------- full screen panel (heatmap / ranking) ---------- */
  .full-panel{
    position:fixed; inset:0; z-index:1500;
    background: var(--kinari);
    display:none; flex-direction:column;
  }
  .full-panel.open{ display:flex; }
  .full-panel-header{
    flex:0 0 auto; background: var(--indigo); color: var(--white);
    padding: 14px 16px calc(12px + env(safe-area-inset-top)) 16px;
    padding-top: calc(14px + env(safe-area-inset-top));
    display:flex; align-items:center; justify-content:space-between;
    border-bottom: 3px solid var(--vermillion);
  }
  .full-panel-header h2{
    font-family:'Shippori Mincho', serif; font-size:17px; margin:0;
    font-weight:700;
  }
  .full-panel-header .sub{ font-size:10.5px; opacity:0.75; margin-top:2px; }
  .full-panel-close{
    border:none; background: rgba(255,255,255,0.15); color:var(--white);
    width:32px; height:32px; border-radius:50%; font-size:16px;
    cursor:pointer; flex:0 0 auto;
  }
  .full-panel-body{ flex:1 1 auto; min-height:0; overflow-y:auto; position:relative; }

  /* month switcher */
  .month-switcher{
    display:flex; align-items:center; justify-content:center; gap:14px;
    padding:12px 16px; background: var(--white); border-bottom:1px solid var(--line);
  }
  .month-switcher button{
    border:none; background: var(--kinari-deep); color:var(--indigo);
    width:30px; height:30px; border-radius:50%; font-size:14px; cursor:pointer;
  }
  .month-switcher button:disabled{ opacity:0.35; cursor:default; }
  .month-switcher .label{
    font-family:'Shippori Mincho', serif; font-weight:700; font-size:14.5px;
    color: var(--indigo); min-width:110px; text-align:center;
  }

  /* heatmap page */
  #heatmap-map-wrap{ position:absolute; inset:0; }
  #heatmap-map{ position:absolute; inset:0; }
  .heat-legend{
    position:absolute; right:12px; bottom:16px; z-index:500;
    background: rgba(255,253,248,0.95); border-radius:10px;
    padding:9px 12px; box-shadow: 0 3px 12px rgba(43,43,40,0.22);
    font-size:10.5px; color: var(--sumi);
  }
  .heat-legend .row{ display:flex; align-items:center; gap:6px; margin-top:3px; }
  .heat-legend .sw{ width:13px; height:13px; border-radius:3px; flex:0 0 auto; }
  .heat-legend .ttl{ font-weight:700; color:var(--indigo); margin-bottom:2px; }
  .heat-empty-note{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    z-index:500; background: rgba(255,253,248,0.95); padding:14px 20px;
    border-radius:12px; font-size:12.5px; color:#9a9184; text-align:center;
    box-shadow: 0 3px 12px rgba(43,43,40,0.18); display:none; max-width:220px;
  }

  /* ranking page */
  .rank-tabs{
    display:flex; gap:8px; padding:12px 16px 0;
    background: var(--white);
  }
  .rank-tab{
    flex:1; text-align:center; padding:9px 6px; font-size:12.5px; font-weight:500;
    border-radius:8px 8px 0 0; cursor:pointer; color:var(--indigo);
    background: var(--kinari-deep);
  }
  .rank-tab.active{ background: var(--indigo); color: var(--white); }
  .rank-cat-row{
    display:flex; flex-wrap:nowrap; gap:8px; padding:14px 16px;
    background: var(--white); border-bottom:1px solid var(--line);
    overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none;
  }
  .rank-cat-row::-webkit-scrollbar{ display:none; }
  .rank-cat-chip{
    flex:0 0 auto; white-space:nowrap;
    border:1px solid var(--line); background:var(--kinari);
    border-radius:999px; padding:7px 15px; font-size:12.5px;
    cursor:pointer; color:var(--sumi);
  }
  .rank-cat-chip.selected{ background: var(--moss); border-color:var(--moss); color:var(--white); }
  .rank-sub-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px 8px; background: var(--white);
  }
  .rank-scope-label{
    font-family:'Shippori Mincho', serif; font-weight:700;
    color: var(--indigo); font-size:14.5px;
  }
  .rank-sub-row .rank-tabs{ padding:0; gap:6px; }
  .rank-sub-row .rank-tab{
    flex:0 0 auto; border-radius:999px; padding:6px 14px;
  }
  .rank-list{ padding: 4px 16px 30px; }
  .rank-item{
    display:flex; align-items:center; gap:11px;
    background: var(--white); border-radius:10px;
    padding:10px 12px; margin-bottom:8px;
    box-shadow: 0 2px 8px rgba(43,43,40,0.08);
  }
  .rank-num{
    flex:0 0 auto; width:26px; height:26px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; background: var(--kinari-deep); color: var(--indigo);
  }
  .rank-item.top1 .rank-num{ background:#D4AF37; color:#fff; }
  .rank-item.top2 .rank-num{ background:#A9A9A9; color:#fff; }
  .rank-item.top3 .rank-num{ background:#B87333; color:#fff; }
  .rank-main{ flex:1 1 auto; min-width:0; }
  .rank-name{ font-size:13.5px; font-weight:500; color:var(--sumi); }
  .rank-bar-wrap{ background:var(--kinari-deep); border-radius:999px; height:6px; margin-top:5px; overflow:hidden; }
  .rank-bar{ height:100%; background: var(--vermillion); border-radius:999px; }
  .rank-count{ flex:0 0 auto; font-size:13.5px; font-weight:700; color: var(--vermillion-deep); }
  .rank-count span{ font-size:10.5px; font-weight:400; color:#9a9184; margin-left:1px; }
  .rank-empty{ text-align:center; color:#9a9184; font-size:12.5px; padding:40px 20px; }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="header-title">
      <h1>伊勢まちみっけ</h1>
      <div class="sub">伊勢市の"発見"を地図に残そう</div>
    </div>
    <div class="user-badge" id="user-badge">
      <span class="user-badge-avatar" id="user-badge-avatar"></span>
      <span id="user-badge-name"></span>
      <button id="btn-logout">ログアウト</button>
    </div>
  </header>

  <div class="quick-actions">
    <button class="qa-btn qa-heat" id="btn-open-heatmap"><span class="ic">🔥</span>ゴミMAP</button>
    <button class="qa-btn" id="btn-open-ranking"><span class="ic">🏆</span>ランキング</button>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
    <div class="pin-count">見つけた数 <b id="pin-count-num">0</b></div>
    <button class="legend-btn" id="btn-legend">?</button>
    <div class="legend-card" id="legend-card">
      <div class="legend-title">アイコンの意味</div>
      <div class="legend-row"><span class="legend-dot" style="border-color:#B23A2E;color:#B23A2E;">ゴ</span>ゴミ</div>
      <div class="legend-row"><span class="legend-dot" style="border-color:#D9642F;color:#D9642F;">食</span>グルメ</div>
      <div class="legend-row"><span class="legend-dot" style="border-color:#5C7A45;color:#5C7A45;">緑</span>自然</div>

<script type="module">
  // ---------------- Firebase Authentication ----------------
  // v9+ モジュラーSDK: 使う関数だけが読み込まれるので軽量(数千ユーザー規模でも起動が重くならない)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    OAuthProvider,
    signInWithPopup,
    signInAnonymously,
    onAuthStateChanged,
    updateProfile,
    signOut,
    setPersistence,
    browserLocalPersistence
  } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
  import {
    getFirestore,
    collection,
    doc,
    setDoc,
    getDoc,
    getDocs,
    deleteDoc
  } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

  var firebaseConfig = {
    apiKey: "AIzaSyAPoFjQ4RTIYByTuu35J93kwlLfYBEkpKY",
    authDomain: "machimikke.firebaseapp.com",
    projectId: "machimikke",
    storageBucket: "machimikke.firebasestorage.app",
    messagingSenderId: "497845237336",
    appId: "1:497845237336:web:a39e12428d2943fdf43c2d"
  };

  var app = initializeApp(firebaseConfig);
  var auth = getAuth(app);
  var db = getFirestore(app);
  setPersistence(auth, browserLocalPersistence).catch(function(e){ console.error('persistence設定エラー', e); });

  // ---------------- Firestore: ピン(見つけたもの)の永続化 ----------------
  // window.storageはClaudeのプレビュー環境専用APIで本番(Vercel等)には存在しないため、
  // 実際に動かすデータはすべてFirestoreに保存する。
  var PINS_COLLECTION = 'reports';
  var PHOTOS_COLLECTION = 'reportPhotos'; // 写真(base64)だけを別コレクションに分離
  var PROFILES_COLLECTION = 'users';

  // ピンが増えるほど、また写真付き投稿が増えるほど、
  // 「一覧取得のたびに全ピン分の写真(base64、数百KB級)をまとめてダウンロード」
  // していると端末のメモリ/通信を大量消費し、モバイルSafariがクラッシュを
  // 繰り返す原因になり得る。そこで写真本体は別コレクションに切り離し、
  // 地図の一覧表示では取得しない(ポップアップを開いた時だけ個別取得する)。
  async function listPins(){
    var snap = await getDocs(collection(db, PINS_COLLECTION));
    var arr = [];
    snap.forEach(function(d){ arr.push(d.data()); });
    return arr;
  }

  async function savePinDoc(pin){
    var hasPhoto = !!pin.photo;
    var mainDoc = {};
    for(var k in pin){
      if(k === 'photo') continue;
      mainDoc[k] = pin[k];
    }
    mainDoc.hasPhoto = hasPhoto;
    await setDoc(doc(db, PINS_COLLECTION, pin.id), mainDoc);
    if(hasPhoto){
      await setDoc(doc(db, PHOTOS_COLLECTION, pin.id), { photo: pin.photo });
    }else{
      // 編集で写真が削除された場合は、写真ドキュメントも削除しておく
      try{ await deleteDoc(doc(db, PHOTOS_COLLECTION, pin.id)); }catch(e){ /* 元々存在しない場合は無視 */ }
    }
  }

  async function getPinPhotoDoc(id){
    var snap = await getDoc(doc(db, PHOTOS_COLLECTION, id));
    if(snap.exists()) return snap.data().photo || null;
    return null;
  }

  async function deletePinDoc(id){
    await deleteDoc(doc(db, PINS_COLLECTION, id));
    try{ await deleteDoc(doc(db, PHOTOS_COLLECTION, id)); }catch(e){ /* 無視 */ }
  }

  async function loadProfileExtraDoc(uid){
    var snap = await getDoc(doc(db, PROFILES_COLLECTION, uid));
    if(snap.exists()) return snap.data();
    return { bio: '', customIcon: null };
  }

  async function saveProfileExtraDoc(uid, extra){
    await setDoc(doc(db, PROFILES_COLLECTION, uid), extra, { merge: true });
  }

  window.PinsAPI = {
    list: listPins,
    save: savePinDoc,
    remove: deletePinDoc,
    getPhoto: getPinPhotoDoc
  };
  window.ProfileAPI = {
    load: loadProfileExtraDoc,
    save: saveProfileExtraDoc
  };

  var googleProvider = new GoogleAuthProvider();
  var appleProvider = new OAuthProvider('apple.com');

  function randomGuestName(){
    return 'ゲスト' + Math.floor(1000 + Math.random() * 9000);
  }

  function providerKeyFromFirebaseUser(fbUser){
    var pid = (fbUser.providerData[0] && fbUser.providerData[0].providerId) || '';
    if(pid.indexOf('google') !== -1) return 'google';
    if(pid.indexOf('apple') !== -1) return 'apple';
    return 'guest';
  }

  function toUserObject(fbUser){
    return {
      id: fbUser.uid,
      name: fbUser.displayName || randomGuestName(),
      provider: providerKeyFromFirebaseUser(fbUser),
      icon: fbUser.photoURL || null,
      createdAt: (fbUser.metadata && fbUser.metadata.creationTime) ? new Date(fbUser.metadata.creationTime).getTime() : Date.now()
    };
  }

  async function signInGoogle(){
    var result = await signInWithPopup(auth, googleProvider);
    return toUserObject(result.user);
  }

  async function signInApple(){
    var result = await signInWithPopup(auth, appleProvider);
    return toUserObject(result.user);
  }

  async function signInGuest(){
    var result = await signInAnonymously(auth);
    if(!result.user.displayName){
      await updateProfile(result.user, { displayName: randomGuestName() });
    }
    return toUserObject(auth.currentUser);
  }

  async function signOutUser(){
    await signOut(auth);
  }

  // プロフィール編集で名前を変更した際、実アカウント側(Firebase)にも反映する
  async function updateDisplayName(name){
    if(!auth.currentUser) return;
    await updateProfile(auth.currentUser, { displayName: name });
  }

  onAuthStateChanged(auth, function(fbUser){
    if(fbUser){
      if(window.__applyLoggedInUser) window.__applyLoggedInUser(toUserObject(fbUser));
    }else{
      if(window.__showLoginScreen) window.__showLoginScreen();
    }
  });

  window.AuthAPI = {
    signInGoogle: signInGoogle,
    signInApple: signInApple,
    signInGuest: signInGuest,
    signOutUser: signOutUser,
    updateDisplayName: updateDisplayName
  };

  // main script(IIFE)はこのモジュールより先に同期実行され、Firestore/Auth関数を
  // 呼び出そうとする可能性があるため、準備完了をPromiseで知らせる。
  if(window.__resolveFirebaseReady) window.__resolveFirebaseReady();
</script>

<script>
(function(){
  // Firebase(Auth/Firestore)はtype="module"側で非同期に初期化される。
  // このIIFEはそれより先に同期実行されるため、Firestore関連の関数は
  // 呼び出し時にこのPromiseを待ってから実処理を行う。
  window.__firebaseReady = new Promise(function(resolve){
    window.__resolveFirebaseReady = resolve;
  });

  // ---- 伊勢市 大まかな範囲 ----
  var ISE_CENTER = [34.489, 136.709];
  var ISE_BOUNDS = L.latLngBounds([34.34, 136.60], [34.60, 136.86]);

  var map = L.map('map', {
    center: ISE_CENTER,
    zoom: 13,
    minZoom: 11,
    maxZoom: 19,
    maxBounds: ISE_BOUNDS.pad(0.05),
    maxBoundsViscosity: 0.9,
    zoomControl: false
  });
  L.control.zoom({ position:'bottomright' }).addTo(map);

  var standardLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);

  var satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri',
    maxZoom: 19
  });

  document.getElementById('btn-standard').addEventListener('click', function(){
    if(map.hasLayer(satelliteLayer)) map.removeLayer(satelliteLayer);
    if(!map.hasLayer(standardLayer)) map.addLayer(standardLayer);
    this.classList.add('active');
    document.getElementById('btn-satellite').classList.remove('active');
  });
  document.getElementById('btn-satellite').addEventListener('click', function(){
    if(map.hasLayer(standardLayer)) map.removeLayer(standardLayer);
    if(!map.hasLayer(satelliteLayer)) map.addLayer(satelliteLayer);
    this.classList.add('active');
    document.getElementById('btn-standard').classList.remove('active');
  });

  document.getElementById('btn-legend').addEventListener('click', function(e){
    e.stopPropagation();
    document.getElementById('legend-card').classList.toggle('open');
  });
  document.addEventListener('click', function(e){
    var card = document.getElementById('legend-card');
    if(card.classList.contains('open') && !card.contains(e.target) && e.target.id !== 'btn-legend'){
      card.classList.remove('open');
    }
  });

  // ---- 現在地取得(GPS) ----
  var locateBtn = document.getElementById('btn-locate');
  locateBtn.addEventListener('click', function(){
    if(!navigator.geolocation){
      showToast('この端末では現在地を取得できません');
      return;
    }
    locateBtn.classList.add('loading');
    navigator.geolocation.getCurrentPosition(function(pos){
      locateBtn.classList.remove('loading');
      locateBtn.classList.add('active');
      myLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      if(myLocationMarker) map.removeLayer(myLocationMarker);
      myLocationMarker = L.marker([myLocation.lat, myLocation.lng], {
        icon: L.divIcon({
          className: '',
          html: '<div style="position:relative; width:16px; height:16px;">' +
            '<div class="my-location-pulse" style="position:absolute;"></div>' +
            '<div class="my-location-dot" style="position:absolute;"></div>' +
            '</div>',
          iconSize: [16,16],
          iconAnchor: [8,8]
        }),
        zIndexOffset: 1000,
        interactive: false
      }).addTo(map);
      map.setView([myLocation.lat, myLocation.lng], 16);
      showToast('現在地を取得しました');
    }, function(err){
      locateBtn.classList.remove('loading');
      showToast('現在地を取得できませんでした。位置情報の利用を許可してください');
    }, { enableHighAccuracy: true, timeout: 8000, maximumAge: 30000 });
  });

  // ---- state ----
  var markers = {};       // id -> L.marker
  var pinStore = {};      // id -> pin data (生データ、ヒートマップ/ランキング集計用)
  var draftMarker = null;
  var draftLatLng = null;
  var selectedCat = null;
  var currentUser = null;
  var draftPinPhoto = null;
  var gomiRangeCircle = null; // ゴミピンタップ時の5m角の範囲表示用
  var myLocation = null;      // 現在地(GPS)
  var myLocationMarker = null;

  // ---------------- ログイン処理・ピン読み込み(最優先で実行) ----------------
  // これらは他の機能の初期化コードより前に実行することで、後続コードに
  // 不具合が発生してもログイン復元とピン表示だけは必ず動くようにしている。
  // ログイン本体はFirebase Authentication(Google/Apple/匿名)で行う。
  // UIの反映はwindow.__applyLoggedInUser / window.__showLoginScreen 経由で、
  // ページ上部のtype="module"スクリプト(Firebase Auth)から呼び出される。
  var loginScreen = document.getElementById('login-screen');
  var loginLoading = document.getElementById('login-loading');
  var userBadge = document.getElementById('user-badge');
  var userBadgeAvatar = document.getElementById('user-badge-avatar');
  var userBadgeName = document.getElementById('user-badge-name');

  // 端末をまたいで同期できるよう、Firestoreに保存する。
  // (Firebase Authのdisplayname/photoURLは文字数・データ量の制約があるため、
  //  名前は実アカウント側(Firebase Auth)に、ひとこと/独自アイコンはFirestoreに保存する)
  async function loadProfileExtra(uid){
    try{
      await window.__firebaseReady;
      return await window.ProfileAPI.load(uid);
    }catch(e){
      console.error('プロフィール読み込みエラー', e);
      return { bio: '', customIcon: null };
    }
  }

  async function saveProfileExtra(uid, extra){
    await window.__firebaseReady;
    await window.ProfileAPI.save(uid, extra);
  }

  function renderAvatarEl(el, user){
    if(user && user.icon){
      el.style.backgroundImage = 'url(' + user.icon + ')';
      el.textContent = '';
    }else{
      el.style.backgroundImage = 'none';
      el.textContent = (user && user.name) ? user.name.charAt(0) : '?';
    }
  }

  // window.AuthAPI (Firebase Auth)側のonAuthStateChangedから呼ばれる。
  // fbUser: { id, name, provider, icon, createdAt } (Firebaseの実アカウント情報)
  async function applyLoggedInUser(fbUser){
    loginLoading.style.display = 'none';
    var extra = await loadProfileExtra(fbUser.id);
    currentUser = {
      id: fbUser.id,
      name: fbUser.name,
      provider: fbUser.provider,
      icon: extra.customIcon || fbUser.icon,
      bio: extra.bio || '',
      createdAt: fbUser.createdAt
    };
    loginScreen.style.display = 'none';
    userBadge.style.display = 'flex';
    userBadgeName.textContent = currentUser.name;
    renderAvatarEl(userBadgeAvatar, currentUser);
  }

  function showLoginScreen(){
    loginLoading.style.display = 'none';
    currentUser = null;
    userBadge.style.display = 'none';
    loginScreen.style.display = 'flex';
    closeProfileSheet();
  }

  // main scriptはIIFE内なので、type="module"側のFirebase Authコードから
  // 呼び出せるようwindowに橋渡しする。
  window.__applyLoggedInUser = applyLoggedInUser;
  window.__showLoginScreen = showLoginScreen;

  function authErrorMessage(err){
    var code = err && err.code;
    if(code === 'auth/popup-closed-by-user' || code === 'auth/cancelled-popup-request') return null; // 自分でポップアップを閉じただけ
    if(code === 'auth/popup-blocked') return 'ポップアップがブロックされました。ブラウザの設定を確認してください';
    if(code === 'auth/operation-not-allowed') return 'この方法でのログインは現在準備中です';
    if(code === 'auth/account-exists-with-different-credential') return 'このメールアドレスは別のログイン方法で登録済みです';
    if(code === 'auth/network-request-failed') return '通信エラーが発生しました。電波状況を確認してください';
    return 'ログインに失敗しました。もう一度お試しください';
  }

  async function runLogin(signInFn){
    if(!window.AuthAPI){
      showToast('ログイン機能の読み込み中です。数秒後にもう一度お試しください');
      return;
    }
    loginLoading.style.display = 'flex';
    try{
      await signInFn();
      // 成功時のUI反映はonAuthStateChanged経由のapplyLoggedInUserで行われる

  function addMarkerToMap(pin){
    var m = L.marker([pin.lat, pin.lng], { icon: hankoIcon(false, pin.category) }).addTo(map);
    m.bindPopup(popupHtml(pin));
    m.on('popupopen', function(){
      if(pin.hasPhoto && !pin.photo){
        ensurePinPhoto(pin).then(function(){
          // 開いている間にピン自体が消えている可能性があるのでガードする
          if(markers[pin.id] === m) m.setPopupContent(popupHtml(pin));
        });

    if(pin.category === 'ゴミ'){
      m.on('popupopen', function(){ showGomiRangeCircle(pin); });

    markers[pin.id] = m;

  var pinSyncInFlight = false;
  async function syncPinsFromStorage(){
    if(pinSyncInFlight) return;
    pinSyncInFlight = true;
    var changed = false;
    try{
      await window.__firebaseReady;
      var pins = await window.PinsAPI.list();
      var remoteIds = {};
      for(var i=0; i<pins.length; i++){
        var pin = pins[i];
        remoteIds[pin.id] = true;
        var existing = pinStore[pin.id];
        if(!existing){
          // 他のユーザーが新しく登録したピン
          addMarkerToMap(pin);
          changed = true;
        }else if(
          existing.title !== pin.title ||
          existing.memo !== pin.memo ||
          existing.category !== pin.category ||
          existing.machi !== pin.machi ||
          existing.hasPhoto !== pin.hasPhoto ||
          existing.updatedAt !== pin.updatedAt
        ){
          // 内容が更新されたピン(自分の編集も含む)。
          // 写真が変わっている可能性があるのでキャッシュ済みの写真はクリアし、
          // 次にポップアップを開いた時に最新のものを取り直す。
          pin.photo = (existing.updatedAt === pin.updatedAt) ? existing.photo : null;
          pinStore[pin.id] = pin;
          var mk = markers[pin.id];
          if(mk){
            mk.setIcon(hankoIcon(false, pin.category));
            mk.setPopupContent(popupHtml(pin));
          }
          changed = true;
        }
      }
      // 他のユーザーが削除したピンをこちらの地図からも消す
      Object.keys(pinStore).forEach(function(id){
        if(!remoteIds[id]){
          if(markers[id]){ map.removeLayer(markers[id]); delete markers[id]; }
          delete pinStore[id];
          changed = true;
        }
      });
    }catch(e){
      console.error('ピンの同期に失敗しました', e);
    }finally{
      pinSyncInFlight = false;
    }
    if(changed){
      updateCount();
      if(document.getElementById('ranking-panel').classList.contains('open')) renderRanking();
      if(document.getElementById('heatmap-panel').classList.contains('open')) renderHeatmap();
    }
  }

  // ---- 町の自動判定(国土地理院 逆ジオコーディングAPI・失敗時はランキング表示時に再取得) ----
  function normalizeTownBase(name){
    if(!name) return '';
    return name.replace(/[0-9０-９一二三四五六七八九十]+丁目$/, '').trim();
  }

  function withTimeout(promise, ms){
    return Promise.race([
      promise,
      new Promise(function(resolve){ setTimeout(function(){ resolve(null); }, ms); })
    ]);
  }

  async function reverseGeocodeTown(lat, lng){
    try{
      var url = 'https://mreversegeocoder.gsi.go.jp/reverse-geocoder/LonLatToAddress?lat=' + lat + '&lon=' + lng;
      var res = await withTimeout(fetch(url), 4000);
      if(!res || !res.ok) return null;
      var data = await res.json();
      if(data && data.results && data.results.lv01Nm){
        return data.results.lv01Nm;
      }
    }catch(e){ /* 通信エラー・ブロック時は自動判定なしにフォールバック */ }
    return null;
  }

  var autoDetectToken = 0;
  async function attemptAutoDetectMachi(latlng){
    var myToken = ++autoDetectToken;
    var statusEl = document.getElementById('machi-status');
    statusEl.className = 'machi-status';
    statusEl.textContent = '町を自動判定中…';
    var raw = await reverseGeocodeTown(latlng.lat, latlng.lng);
    if(myToken !== autoDetectToken) return; // シート再オープン等で無効化
    var base = normalizeTownBase(raw);
    var matched = null;
    for(var i=0; i<ISE_TOWNS.length; i++){
      if(ISE_TOWNS[i] === base){ matched = ISE_TOWNS[i]; break; }
    }
    draftMachi = matched;
    if(matched){
      statusEl.className = 'machi-status';
      statusEl.textContent = '「' + matched + '」と自動判定しました';
    }else{
      statusEl.className = 'machi-status err';
      statusEl.textContent = '町を自動判定できませんでした(あとで自動的に再取得されます)';
    }
  }

  function resizeImageToDataUrl(file, maxSize, quality){
    quality = quality || 0.85;
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      reader.onerror = function(){ reject(new Error('読み込み失敗')); };
      reader.onload = function(){
        var img = new Image();
        img.onerror = function(){ reject(new Error('画像の読み込み失敗')); };
        img.onload = function(){
          var scale = Math.min(1, maxSize / Math.max(img.width, img.height));
          var w = Math.round(img.width * scale);
          var h = Math.round(img.height * scale);
          var canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          var ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

    renderAvatarEl(profileAvatarEdit, currentUser);
    btnAvatarRedo.style.display = 'none';
    showToast('元の写真に戻しました');
  });

  document.getElementById('profile-save').addEventListener('click', async function(){
    var name = editNickname.value.trim();
    if(!name){
      showToast('ニックネームを入力してください');
      return;
    }
    var nameChanged = name !== currentUser.name;
    currentUser.name = name;
    currentUser.bio = editBio.value.trim();
    currentUser.icon = draftIcon;
    try{
      // 名前は実アカウント(Firebase)側にも反映し、他端末・再ログイン時も引き継がれるようにする
      if(nameChanged && window.AuthAPI) await window.AuthAPI.updateDisplayName(name);
      // ひとこと・独自アイコンは端末ローカルに保存(現状Firestore未導入のため端末単位)
      await saveProfileExtra(currentUser.id, { bio: currentUser.bio, customIcon: currentUser.icon });
    }catch(err){
      console.error(err);
      showToast('プロフィールの保存に失敗しました');
      return;
    }
    userBadgeName.textContent = currentUser.name;
    renderAvatarEl(userBadgeAvatar, currentUser);
    showToast('プロフィールを保存しました');
    showProfileView();
  });

  // ================================================================
  //  ゴミヒートマップ ＆ 町別ランキング
  // ================================================================

  // ---- 伊勢市 町名一覧(日本郵便の公式町域データを元に集約) ----
  var ISE_TOWNS = ["一之木","一宇田町","一志町","一色町","上地町","上野町","下野町","中之町","中島","中村町","中須町","久世戸町","二俣","二俣町","二見町三津","二見町今一色","二見町光の街","二見町山田原","二見町松下","二見町江","二見町溝口","二見町茶屋","二見町荘","二見町西","佐八町","倭町","八日市場町","円座町","前山町","勢田町","古市町","吹上","大世古","大倉町","大湊町","宇治中之切町","宇治今在家町","宇治浦田","宇治館町","宮川","宮後","宮町","小俣町元町","小俣町宮前","小俣町新村","小俣町明野","小俣町本町","小俣町湯田","小俣町相合","小木町","尾上町","岡本","岩渕","岩渕町","川端町","常磐","常磐町","御薗町上條","御薗町王中島","御薗町小林","御薗町新開","御薗町高向","御薗町長屋","旭町","曽祢","有滝町","朝熊町","本町","村松町","東大淀町","東豊浜町","柏町","桜木町","植山町","楠部町","横輪町","樫原町","河崎","津村町","浦口","浦口町","田尻町","矢持町","磯町","神久","神田久志本町","神社港","神薗町","竹ケ鼻町","粟野町","船江","藤里町","西豊浜町","豊川町","辻久留","辻久留町","通町","野村町","馬瀬町","鹿海町","黒瀬町"];
  ISE_TOWNS.sort(function(a, b){ return a.localeCompare(b, 'ja'); });

  function allPins(){
    return Object.keys(pinStore).map(function(k){ return pinStore[k]; });
  }

  // ---- 町別ランキング用: machi未設定ピンの自動補完(GSI逆ジオコーディング) ----
  var machiAutoCache = {}; // pinId -> '町名' | null(判定失敗/リスト外)

  async function resolveMachiForPin(p){
    if(p.machi) return p.machi;
    if(Object.prototype.hasOwnProperty.call(machiAutoCache, p.id)){
      return machiAutoCache[p.id];
    }
    var raw = await reverseGeocodeTown(p.lat, p.lng);
    var base = normalizeTownBase(raw);
    var matched = null;
    for(var i=0; i<ISE_TOWNS.length; i++){
      if(ISE_TOWNS[i] === base){ matched = ISE_TOWNS[i]; break; }
    }
    machiAutoCache[p.id] = matched;
    if(matched){
      // 次回以降は再判定不要なようピン自体にも書き戻す(失敗時はキャッシュのみ)
      p.machi = matched;
      pinStore[p.id] = p;
      savePin(p).catch(function(e){ console.error('machi自動補完の保存に失敗', e); });
    }
    return matched;
  }

  // 並列数を制限しつつ非同期処理をまとめて実行する簡易ヘルパー
  async function mapWithLimit(items, limit, fn){
    var results = new Array(items.length);
    var idx = 0;
    async function worker(){
      while(idx < items.length){
        var cur = idx++;
        results[cur] = await fn(items[cur], cur);
      }
    }
    var workers = [];
    for(var i = 0; i < Math.min(limit, items.length); i++){ workers.push(worker()); }
    await Promise.all(workers);
    return results;
  }

  // ---------------- ゴミヒートマップ ----------------
  var heatMap = null, heatLayerGroup = null;
  var heatNow0 = new Date();
  var heatYear = heatNow0.getFullYear();
  var heatMonth = heatNow0.getMonth() + 1; // 1-12
  var GRID_LAT_STEP = 0.004;
  var GRID_LNG_STEP = 0.005;

  function heatBucketColor(count){
    if(count >= 8) return '#B23A2E';
    if(count >= 5) return '#D9642F';
    if(count >= 3) return '#EE9B4F';
    if(count >= 2) return '#F7CB84';
    return '#FDECC8';
  }

  function ensureHeatMap(){
    if(heatMap) return;
    heatMap = L.map('heatmap-map', {
      center: ISE_CENTER, zoom: 13, minZoom: 11, maxZoom: 18,
      maxBounds: ISE_BOUNDS.pad(0.05), maxBoundsViscosity: 0.9, zoomControl: false
    });
    L.control.zoom({ position:'bottomright' }).addTo(heatMap);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors', maxZoom: 19
    }).addTo(heatMap);
    heatLayerGroup = L.layerGroup().addTo(heatMap);
  }

  function renderHeatmap(){
    ensureHeatMap();
    heatLayerGroup.clearLayers();
    var pins = allPins().filter(function(p){
      if(p.category !== 'ゴミ') return false;
      var d = new Date(p.createdAt);
      return d.getFullYear() === heatYear && (d.getMonth() + 1) === heatMonth;
    });
    var south = ISE_BOUNDS.getSouth(), west = ISE_BOUNDS.getWest();
    var grid = {};
    pins.forEach(function(p){
      var row = Math.floor((p.lat - south) / GRID_LAT_STEP);
      var col = Math.floor((p.lng - west) / GRID_LNG_STEP);
      var key = row + '_' + col;
      if(!grid[key]) grid[key] = { row: row, col: col, count: 0 };
      grid[key].count++;
    });
    var keys = Object.keys(grid);
    keys.forEach(function(key){
      var c = grid[key];
      var b = [
        [south + c.row * GRID_LAT_STEP, west + c.col * GRID_LNG_STEP],
        [south + (c.row + 1) * GRID_LAT_STEP, west + (c.col + 1) * GRID_LNG_STEP]
      ];
      var rect = L.rectangle(b, {
        color: '#8F2C22', weight: 1, opacity: 0.35,
        fillColor: heatBucketColor(c.count), fillOpacity: 0.6
      }).addTo(heatLayerGroup);
      rect.bindTooltip(c.count + '件', { direction: 'center' });
    });
    document.getElementById('heat-empty-note').style.display = (keys.length === 0) ? 'block' : 'none';
    document.getElementById('heat-month-label').textContent = heatYear + '年' + heatMonth + '月';
    var now = new Date();
    var isCurrentMonth = (heatYear === now.getFullYear() && heatMonth === (now.getMonth() + 1));
    document.getElementById('heat-next-month').disabled = isCurrentMonth;
  }

  document.getElementById('btn-open-heatmap').addEventListener('click', function(){
    document.getElementById('heatmap-panel').classList.add('open');
    setTimeout(function(){
      ensureHeatMap();
      heatMap.invalidateSize();
      renderHeatmap();
    }, 50);
  });
  document.getElementById('heatmap-close').addEventListener('click', function(){
    document.getElementById('heatmap-panel').classList.remove('open');
  });
  document.getElementById('heat-prev-month').addEventListener('click', function(){
    heatMonth--; if(heatMonth < 1){ heatMonth = 12; heatYear--; }
    renderHeatmap();
  });
  document.getElementById('heat-next-month').addEventListener('click', function(){
    var now = new Date();
    if(heatYear === now.getFullYear() && heatMonth === (now.getMonth() + 1)) return;
    heatMonth++; if(heatMonth > 12){ heatMonth = 1; heatYear++; }
    renderHeatmap();
  });

  // ---------------- 町別ランキング ----------------
  var rankPeriod = 'month'; // 'month' | 'all'
  var rankCat = 'ゴミ';

  var rankRenderToken = 0;
  async function renderRanking(){
    var myToken = ++rankRenderToken;
    var listEl = document.getElementById('rank-list');
    var pins = allPins().filter(function(p){ return p.category === rankCat; });
    if(rankPeriod === 'month'){
      var now = new Date();
      pins = pins.filter(function(p){
        var d = new Date(p.createdAt);
        return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
      });
    }

    listEl.innerHTML = '<div class="rank-empty">町別に集計中…</div>';

    // machi未設定のピンは位置情報から自動取得して補完
    var resolvedMachi = await mapWithLimit(pins, 5, function(p){ return resolveMachiForPin(p); });
    if(myToken !== rankRenderToken) return; // タブ/カテゴリ切替等で古い集計を破棄

    var counts = {};
    pins.forEach(function(p, i){
      var m = resolvedMachi[i];
      if(!m) return;
      counts[m] = (counts[m] || 0) + 1;
    });
    var entries = Object.keys(counts).map(function(k){ return { name: k, count: counts[k] }; });
    entries.sort(function(a, b){ return b.count - a.count; });
    listEl.innerHTML = '';
    if(entries.length === 0){
      listEl.innerHTML = '<div class="rank-empty">まだデータがありません(位置情報から町を自動取得しています)</div>';
      return;
    }
    var max = entries[0].count;
    entries.slice(0, 30).forEach(function(e, i){
      var rankClass = i === 0 ? 'top1' : (i === 1 ? 'top2' : (i === 2 ? 'top3' : ''));
      var pct = Math.max(6, Math.round(e.count / max * 100));
      var div = document.createElement('div');
      div.className = 'rank-item ' + rankClass;
      div.innerHTML =
        '<div class="rank-num">' + (i + 1) + '</div>' +
        '<div class="rank-main">' +
          '<div class="rank-name">' + escapeHtml(e.name) + '</div>' +
          '<div class="rank-bar-wrap"><div class="rank-bar" style="width:' + pct + '%"></div></div>' +
        '</div>' +
        '<div class="rank-count">' + e.count + '<span>件</span></div>';
      listEl.appendChild(div);
    });
  }

  document.getElementById('btn-open-ranking').addEventListener('click', function(){
    document.getElementById('ranking-panel').classList.add('open');
    renderRanking();
  });
  document.getElementById('ranking-close').addEventListener('click', function(){
    document.getElementById('ranking-panel').classList.remove('open');
  });
  document.querySelectorAll('.rank-tab[data-period]').forEach(function(tab){
    tab.addEventListener('click', function(){
      document.querySelectorAll('.rank-tab[data-period]').forEach(function(t){ t.classList.remove('active'); });
      tab.classList.add('active');
      rankPeriod = tab.dataset.period;
      renderRanking();
    });
  });
  document.querySelectorAll('.rank-cat-chip').forEach(function(chip){
    chip.addEventListener('click', function(){
      document.querySelectorAll('.rank-cat-chip').forEach(function(c){ c.classList.remove('selected'); });
      chip.classList.add('selected');
      rankCat = chip.dataset.rcat;
      renderRanking();
    });
  });
})();
</script>
