<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0EA5A0">
<title>海ゴミ探究ノート 2.0</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0A1628;--navy2:#112240;--navy3:#1a2f52;
  --teal:#0EA5A0;--teal2:#14B8B3;
  --amber:#F59E0B;--green:#10B981;--red:#EF4444;--blue:#3B82F6;
  --white:#F0F8FF;--gray:#8BA3BC;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;height:-webkit-fill-available;overflow:hidden;}
body{
  font-family:'Noto Sans JP',sans-serif;background:var(--navy);color:var(--white);
  display:flex;flex-direction:column;position:fixed;inset:0;
  overscroll-behavior:none;touch-action:manipulation;
}
input,select,textarea{font-size:16px!important;}
button{touch-action:manipulation;cursor:pointer;font-family:inherit;}
header{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);
  border-bottom:2px solid var(--teal);padding:10px 14px;
  padding-top:max(10px,env(safe-area-inset-top,10px));
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:200;gap:8px;
}
.hdr-l{display:flex;align-items:center;gap:10px;min-width:0;}
.avatar{width:38px;height:38px;min-width:38px;border-radius:10px;overflow:hidden;border:2px solid var(--teal);
  display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--navy3);cursor:pointer;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.hdr-titles{min-width:0;}
h1{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;line-height:1.1;}
h1 small{display:block;font-size:8px;font-weight:400;letter-spacing:2px;color:var(--teal);}
.hdr-user{font-size:10px;color:var(--gray);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hdr-r{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.iconbtn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(14,165,160,.4);background:rgba(14,165,160,.1);color:var(--white);font-size:16px;display:flex;align-items:center;justify-content:center;}

.tabs{display:flex;background:var(--navy2);border-bottom:1px solid rgba(14,165,160,.2);flex-shrink:0;}
.tab{flex:1;padding:7px 1px;background:none;border:none;color:var(--gray);font-size:10px;display:flex;flex-direction:column;align-items:center;gap:1px;border-bottom:3px solid transparent;}
.tab .ti{font-size:15px;}
.tab.on{color:var(--teal);border-bottom-color:var(--teal);background:rgba(14,165,160,.08);}

.scr{display:none;flex-direction:column;flex:1;min-height:0;}
.scr.on{display:flex;}

/* ---- map screen ---- */
#mapWrap{position:relative;flex:1;min-height:0;}
#map{position:absolute;inset:0;}
.map-controls{position:absolute;top:10px;right:10px;z-index:500;display:flex;flex-direction:column;gap:8px;}
.mc-btn{width:42px;height:42px;border-radius:12px;background:rgba(10,22,40,.9);border:1px solid rgba(14,165,160,.4);color:var(--white);font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.4);}
.mc-btn.active{background:var(--teal);color:var(--navy);}
.maptype-panel{position:absolute;top:10px;right:60px;z-index:500;background:rgba(10,22,40,.95);border:1px solid rgba(14,165,160,.4);border-radius:12px;padding:8px;display:none;flex-direction:column;gap:6px;min-width:110px;box-shadow:0 4px 16px rgba(0,0,0,.5);}
.maptype-panel.open{display:flex;}
.mt-opt{padding:8px 10px;border-radius:8px;background:var(--navy3);border:1px solid transparent;color:var(--white);font-size:12px;text-align:left;}
.mt-opt.on{border-color:var(--teal);color:var(--teal);background:rgba(14,165,160,.15);}
.add-fab{position:absolute;bottom:16px;right:16px;z-index:500;width:58px;height:58px;border-radius:50%;background:var(--teal);color:var(--navy);font-size:26px;border:none;box-shadow:0 4px 14px rgba(14,165,160,.5);display:flex;align-items:center;justify-content:center;}
.add-fab.pinmode{background:var(--amber);}
.pin-hint{position:absolute;top:10px;left:10px;right:60px;z-index:500;background:rgba(245,158,11,.95);color:var(--navy);font-size:12px;font-weight:700;padding:8px 12px;border-radius:10px;display:none;text-align:center;}
.pin-hint.on{display:block;}
.legend{position:absolute;bottom:16px;left:10px;z-index:400;background:rgba(10,22,40,.9);border:1px solid rgba(14,165,160,.3);border-radius:10px;padding:8px 10px;font-size:10px;display:flex;flex-direction:column;gap:4px;}
.legend .row{display:flex;align-items:center;gap:6px;}
.dot{width:10px;height:10px;border-radius:50%;}

/* ---- generic ---- */
.scroll{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.inner{padding:14px;padding-bottom:max(14px,env(safe-area-inset-bottom,14px));display:flex;flex-direction:column;gap:12px;}
.card{background:var(--navy2);border:1px solid rgba(14,165,160,.2);border-radius:14px;padding:14px;}
.btn{background:var(--teal);color:var(--navy);border:none;border-radius:10px;padding:12px;font-weight:700;font-size:14px;}
.btn.outline{background:none;border:1px solid var(--teal);color:var(--teal);}
.btn.full{width:100%;}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.field label{font-size:11px;color:var(--gray);}
.field input,.field textarea{background:var(--navy3);border:1px solid rgba(14,165,160,.3);color:var(--white);border-radius:8px;padding:10px;}
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.emoji-grid button{aspect-ratio:1;border-radius:10px;background:var(--navy3);border:2px solid transparent;font-size:20px;}
.emoji-grid button.on{border-color:var(--teal);}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.on{display:flex;}
.modal{background:var(--navy2);border-radius:18px 18px 0 0;padding:18px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;border-top:2px solid var(--teal);}
.modal h2{font-size:16px;margin-bottom:12px;color:var(--teal);}
.close-x{float:right;background:none;border:none;color:var(--gray);font-size:20px;}

.login-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;text-align:center;}
.login-screen h1{font-size:22px;}
.login-screen p{color:var(--gray);font-size:13px;}
.login-btn{width:100%;max-width:320px;padding:14px;border-radius:12px;font-weight:700;font-size:14px;border:none;display:flex;align-items:center;justify-content:center;gap:10px;}
.lb-google{background:#fff;color:#222;}
.lb-apple{background:#000;color:#fff;}
.lb-guest{background:var(--navy3);color:var(--white);border:1px solid var(--teal);}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--navy3);border:1px solid var(--teal);color:var(--white);padding:10px 18px;border-radius:30px;font-size:13px;z-index:2000;display:none;box-shadow:0 4px 14px rgba(0,0,0,.4);}
.toast.on{display:block;}
.gomi-chip{display:inline-block;padding:4px 10px;border-radius:20px;background:var(--navy3);font-size:11px;margin:2px;border:1px solid rgba(14,165,160,.3);}
.gomi-chip.on{background:var(--teal);color:var(--navy);}

.mini-avatar{display:inline-block;width:20px;height:20px;border-radius:50%;overflow:hidden;vertical-align:middle;background:var(--navy3);text-align:center;line-height:20px;font-size:13px;}
.mini-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
.icon-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.icon-row .avatar{cursor:default;}
.icon-pickbtn{background:var(--navy3);border:1px solid var(--teal);color:var(--teal);border-radius:8px;padding:8px 12px;font-size:12px;}
.log-actions{display:flex;gap:8px;margin-top:10px;}
.log-actions button{flex:1;background:var(--navy3);border:1px solid rgba(14,165,160,.3);color:var(--white);border-radius:8px;padding:8px;font-size:11px;display:flex;align-items:center;justify-content:center;gap:4px;}
.log-actions button.danger{border-color:rgba(239,68,68,.5);color:#FCA5A5;}

.thanks-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.7);z-index:3000;
  background:linear-gradient(135deg,var(--teal) 0%,var(--teal2) 100%);color:var(--navy);
  padding:22px 36px;border-radius:20px;font-size:20px;font-weight:700;box-shadow:0 8px 30px rgba(0,0,0,.5);
  opacity:0;pointer-events:none;text-align:center;}
.thanks-popup.show{animation:thanksPop 2.2s ease forwards;}
@keyframes thanksPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.7);}
  15%{opacity:1;transform:translate(-50%,-50%) scale(1.05);}
  25%{transform:translate(-50%,-50%) scale(1);}
  75%{opacity:1;transform:translate(-50%,-50%) scale(1);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(.95);}
}
</style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="loginScreen" class="login-screen">
  <img id="oyakataMascot" alt="親方" style="width:140px;border-radius:14px;box-shadow:0 6px 20px rgba(0,0,0,.4);">
  <h1>海ゴミ探究ノート</h1>
  <p>伊勢・伊勢志摩エリアの海洋ごみを記録して、<br>みんなで海をきれいにしよう。<br>親方が応援しとるで、任しとき！</p>
  <button class="login-btn lb-google" onclick="loginGoogle()">Googleでログイン</button>
  <button class="login-btn lb-apple" onclick="loginApple()">Appleでログイン</button>
  <button class="login-btn lb-guest" onclick="loginGuest()">ゲストとして始める（ログイン不要）</button>
  <p style="font-size:10px;color:var(--gray);margin-top:8px;">ゲストは端末ごとの匿名アカウントです。他のユーザーと記録が重なることはありません。</p>
</div>

<!-- ===== メインアプリ ===== -->
<div id="app" style="display:none;flex-direction:column;height:100%;">
  <header>
    <div class="hdr-l">
      <div class="avatar" id="hdrAvatar" onclick="openProfile()">👤</div>
      <div class="hdr-titles">
        <h1>海ゴミ探究ノート<small>UMIGOMI NOTE</small></h1>
        <div class="hdr-user" id="hdrUser">ゲスト</div>
      </div>
    </div>
    <div class="hdr-r">
      <button class="iconbtn" onclick="openProfile()">⚙️</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab on" data-scr="mapScr" onclick="showScreen('mapScr',this)"><span class="ti">🗺️</span>マップ</button>
    <button class="tab" data-scr="logScr" onclick="showScreen('logScr',this)"><span class="ti">📒</span>記録</button>
    <button class="tab" data-scr="profScr" onclick="showScreen('profScr',this)"><span class="ti">👤</span>プロフィール</button>
  </div>

  <!-- マップ画面 -->
  <div class="scr on" id="mapScr">
    <div id="mapWrap">
      <div id="map"></div>
      <div class="pin-hint" id="pinHint">📍 地図をタップしてピンを打ってください</div>
      <div class="map-controls">
        <button class="mc-btn" id="mapTypeBtn" onclick="toggleMapTypePanel()">🗂️</button>
        <button class="mc-btn" id="gpsBtn" onclick="goToMyLocation()">🎯</button>
      </div>
      <div class="maptype-panel" id="maptypePanel">
        <button class="mt-opt on" data-type="normal" onclick="setMapType('normal')">通常</button>
        <button class="mt-opt" data-type="gray" onclick="setMapType('gray')">グレー</button>
        <button class="mt-opt" data-type="dark" onclick="setMapType('dark')">ダーク</button>
        <button class="mt-opt" data-type="sat" onclick="setMapType('sat')">衛星</button>
      </div>
      <div class="legend">
        <div class="row"><span class="dot" style="background:var(--blue)"></span>1〜3個</div>
        <div class="row"><span class="dot" style="background:var(--amber)"></span>4〜9個</div>
        <div class="row"><span class="dot" style="background:var(--red)"></span>10個以上</div>
      </div>
      <button class="add-fab" id="addFab" onclick="togglePinMode()">＋</button>
    </div>
  </div>

  <!-- 記録一覧画面 -->
  <div class="scr" id="logScr">
    <div class="scroll"><div class="inner" id="logList">
      <div class="card" style="text-align:center;color:var(--gray);">まだ記録がありません</div>
    </div></div>
  </div>

  <!-- プロフィール画面 -->
  <div class="scr" id="profScr">
    <div class="scroll"><div class="inner">
      <div class="card" style="text-align:center;">
        <div class="avatar" style="width:72px;height:72px;font-size:32px;margin:0 auto 10px;" id="profAvatarBig">👤</div>
        <div style="font-weight:700;font-size:16px;" id="profNickBig">ニックネーム未設定</div>
        <div style="font-size:12px;color:var(--gray);margin-top:4px;" id="profMsgBig">ひとこと未設定</div>
        <button class="btn outline full" style="margin-top:14px;" onclick="openProfile()">プロフィールを編集</button>
      </div>
      <div class="card">
        <div style="font-size:12px;color:var(--gray);">アカウント種別</div>
        <div style="font-weight:700;margin-top:4px;" id="profAccType">-</div>
      </div>
      <button class="btn outline full" onclick="logout()">ログアウト</button>
    </div></div>
  </div>
</div>

<!-- ===== プロフィール編集モーダル ===== -->
<div class="modal-bg" id="profileModal">
  <div class="modal">
    <button class="close-x" onclick="closeModal('profileModal')">✕</button>
    <h2>プロフィール編集</h2>
    <div class="field">
      <label>アイコンを選ぶ</label>
      <div class="icon-row">
        <div class="avatar" id="iconPreview" style="width:54px;height:54px;font-size:26px;">👤</div>
        <button type="button" class="icon-pickbtn" onclick="pickAlbumIcon()">📷 アルバムから選ぶ</button>
        <input type="file" id="iconFileInput" accept="image/*" style="display:none" onchange="onIconFileSelected(event)">
      </div>
      <div style="font-size:10px;color:var(--gray);margin-bottom:6px;">親方アイコンか、絵文字から選べます</div>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>
    <div class="field">
      <label>ニックネーム</label>
      <input type="text" id="inputNick" maxlength="16" placeholder="例：イセくん">
    </div>
    <div class="field">
      <label>ひとこと</label>
      <input type="text" id="inputMsg" maxlength="30" placeholder="例：海をきれいにしたい！">
    </div>
    <button class="btn full" onclick="saveProfile()">保存する</button>
  </div>
</div>

<!-- ===== ピン登録モーダル ===== -->
<div class="modal-bg" id="pinModal">
  <div class="modal">
    <button class="close-x" onclick="closeModal('pinModal')">✕</button>
    <h2 id="pinModalTitle">ごみを記録する</h2>
    <div class="field">
      <label>ごみの種類（複数選択可）</label>
      <div id="gomiTypes"></div>
    </div>
    <div class="field">
      <label>個数</label>
      <input type="number" id="inputCount" min="1" value="1">
    </div>
    <div class="field">
      <label>メモ（任意）</label>
      <input type="text" id="inputNote" maxlength="60" placeholder="気づいたことなど">
    </div>
    <button class="btn full" onclick="savePin()">記録する</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="thanks-popup" id="thanksPopup">🙏 ありがとう！<br><span style="font-size:13px;font-weight:400;">記録してくれて感謝です</span></div>

/* ===================== 認証 ===================== */
function loginGoogle(){
  const p = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(p).catch(e=>{
    if(e.code==='auth/popup-blocked'||e.code==='auth/cancelled-popup-request') auth.signInWithRedirect(p);
    else showToast('ログインに失敗しました: '+e.message);
  });
}
function loginApple(){
  const p = new firebase.auth.OAuthProvider('apple.com');
  auth.signInWithPopup(p).catch(e=>{
    if(e.code==='auth/popup-blocked'||e.code==='auth/cancelled-popup-request') auth.signInWithRedirect(p);
    else showToast('ログインに失敗しました: '+e.message);
  });
}
function loginGuest(){
  // 匿名認証: Firebaseが自動的にユニークなUIDを発行するため、
  // 他のユーザーのデータと衝突することはない
  auth.signInAnonymously().catch(e=>showToast('ゲスト参加に失敗しました: '+e.message));
}
function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(async (user)=>{
  if(user){
    currentUser = user;
    await loadProfile();
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='flex';
    updateHeaderUI();
    initMapIfNeeded();
    listenRecords();
  } else {
    currentUser = null;
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('app').style.display='none';
    if(unsubRecords) unsubRecords();
  }
});

async function loadProfile(){
  try{
    const doc = await db.collection('users').doc(currentUser.uid).get();
    if(doc.exists){
      userProfile = Object.assign({nickname:'',message:'',icon:'👤'}, doc.data());
    } else {
      userProfile = { nickname: currentUser.isAnonymous ? 'ゲスト'+currentUser.uid.slice(0,4) : (currentUser.displayName||'名無し'), message:'', icon:OYAKATA_ICON_DATA };
      await db.collection('users').doc(currentUser.uid).set(userProfile, {merge:true});
    }
    profilesCache[currentUser.uid] = { nickname:userProfile.nickname, icon:userProfile.icon };
  }catch(e){ console.warn('profile load failed', e); }
}

/* アイコンは絵文字 or 画像data URLのどちらにも対応 */
function avatarContent(icon){
  if(icon && typeof icon==='string' && icon.startsWith('data:image')) return `<img src="${icon}">`;
  return icon || '👤';
}
function renderAvatar(elId, icon){
  const el = document.getElementById(elId);
  if(el) el.innerHTML = avatarContent(icon);
}

function updateHeaderUI(){
  renderAvatar('hdrAvatar', userProfile.icon);
  document.getElementById('hdrUser').textContent = userProfile.nickname || (currentUser.isAnonymous?'ゲスト':'ユーザー');
  renderAvatar('profAvatarBig', userProfile.icon);
  document.getElementById('profNickBig').textContent = userProfile.nickname || 'ニックネーム未設定';
  document.getElementById('profMsgBig').textContent = userProfile.message || 'ひとこと未設定';
  document.getElementById('profAccType').textContent = currentUser.isAnonymous ? 'ゲストアカウント（端末固有）' : (currentUser.providerData[0]?.providerId==='google.com'?'Googleアカウント連携':'Appleアカウント連携');
}

/* ===================== プロフィール編集 ===================== */
function openProfile(){
  const grid = document.getElementById('emojiGrid');
  const oyakataOn = userProfile.icon===OYAKATA_ICON_DATA ? 'on' : '';
  const oyakataTile = `<button class="${oyakataOn}" data-token="OYAKATA" onclick="selectIcon('OYAKATA')" title="親方"><img src="${OYAKATA_ICON_DATA}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;"></button>`;
  const emojiTiles = EMOJIS.map(e=>`<button class="${e===userProfile.icon?'on':''}" data-token="${e}" onclick="selectIcon('${e}')">${e}</button>`).join('');
  grid.innerHTML = oyakataTile + emojiTiles;
  document.getElementById('inputNick').value = userProfile.nickname || '';
  document.getElementById('inputMsg').value = userProfile.message || '';
  renderAvatar('iconPreview', userProfile.icon);
  document.getElementById('profileModal').classList.add('on');
}
function selectIcon(token){
  const value = token==='OYAKATA' ? OYAKATA_ICON_DATA : token;
  userProfile._tmpIcon = value;
  document.querySelectorAll('#emojiGrid button').forEach(b=>b.classList.toggle('on', b.dataset.token===token));
  renderAvatar('iconPreview', value);
}
function pickAlbumIcon(){
  document.getElementById('iconFileInput').click();
}
function onIconFileSelected(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){ showToast('画像ファイルを選んでください'); return; }
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      // 正方形にトリミング＆縮小してFirestoreの容量を節約
      const size = 160;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(size/img.width, size/img.height);
      const w = img.width*scale, h = img.height*scale;
      ctx.drawImage(img, (size-w)/2, (size-h)/2, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      userProfile._tmpIcon = dataUrl;
      document.querySelectorAll('#emojiGrid button').forEach(b=>b.classList.remove('on'));
      renderAvatar('iconPreview', dataUrl);
    };
    img.onerror = function(){ showToast('画像の読み込みに失敗しました'); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  ev.target.value = '';
}
async function saveProfile(){
  const nick = document.getElementById('inputNick').value.trim();
  const msg = document.getElementById('inputMsg').value.trim();
  userProfile.nickname = nick || userProfile.nickname || 'ゲスト';
  userProfile.message = msg;
  if(userProfile._tmpIcon) userProfile.icon = userProfile._tmpIcon;
  delete userProfile._tmpIcon;
  try{
    await db.collection('users').doc(currentUser.uid).set({
      nickname: userProfile.nickname, message: userProfile.message, icon: userProfile.icon
    }, {merge:true});
    // 変更を即座に関連箇所へ反映（ヘッダー・プロフィール画面・記録一覧）
    profilesCache[currentUser.uid] = { nickname:userProfile.nickname, icon:userProfile.icon };
    updateHeaderUI();
    renderLogList();
    closeModal('profileModal');
    showToast('プロフィールを保存しました');
  }catch(e){ showToast('保存に失敗しました: '+e.message); }
}

/* ===================== タブ切替 ===================== */
function showScreen(id, btn){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  if(id==='mapScr' && map) setTimeout(()=>map.invalidateSize(),100);
}

const TILE_LAYERS = {
  normal: { url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', attr:'&copy; OpenStreetMap contributors' },
  gray:   { url:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', attr:'&copy; CARTO' },
  dark:   { url:'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', attr:'&copy; CARTO' },
  sat:    { url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', attr:'Esri' }
};
function initMapIfNeeded(){
  if(map) return;
  map = L.map('map', { zoomControl:false }).setView(ISE_CENTER, 14);
  setMapType('normal'); // 参加時は通常バージョンから
  pinLayerGroup = L.layerGroup().addTo(map);
  gridLayerGroup = L.layerGroup().addTo(map);
  map.on('click', onMapClick);
  setTimeout(()=>map.invalidateSize(), 200);
  goToMyLocation(true);
}
function setMapType(type){
  if(currentTileLayer) map.removeLayer(currentTileLayer);
  const t = TILE_LAYERS[type] || TILE_LAYERS.normal;
  currentTileLayer = L.tileLayer(t.url, { attribution:t.attr, maxZoom:19, subdomains: type==='sat'?'':'abc' }).addTo(map);
  document.querySelectorAll('.mt-opt').forEach(b=>b.classList.toggle('on', b.dataset.type===type));
  document.getElementById('maptypePanel').classList.remove('open');
}
function toggleMapTypePanel(){
  document.getElementById('maptypePanel').classList.toggle('open');
}
function goToMyLocation(silent){
  if(!navigator.geolocation){ if(!silent) showToast('この端末はGPSに対応していません'); return; }
  navigator.geolocation.getCurrentPosition(pos=>{
    const ll = [pos.coords.latitude, pos.coords.longitude];
    if(gpsMarker) map.removeLayer(gpsMarker);
    gpsMarker = L.circleMarker(ll, { radius:8, color:'#0EA5A0', fillColor:'#14B8B3', fillOpacity:.9, weight:2 }).addTo(map);
    map.setView(ll, 16);
  }, err=>{
    if(!silent) showToast('現在地を取得できませんでした');
  }, { enableHighAccuracy:true, timeout:8000 });
}

/* ---- ピン打ちモード ---- */
function togglePinMode(){
  pinMode = !pinMode;
  document.getElementById('addFab').classList.toggle('pinmode', pinMode);
  document.getElementById('pinHint').classList.toggle('on', pinMode);
}
function onMapClick(e){
  if(!pinMode) return;
  pendingLatLng = e.latlng;
  pinMode = false;
  document.getElementById('addFab').classList.remove('pinmode');
  document.getElementById('pinHint').classList.remove('on');
  openPinModal();
}
function openPinModal(existing){
  editingRecordId = existing ? existing.id : null;
  selectedGomiTypes = existing ? [...(existing.types||[])] : [];
  const wrap = document.getElementById('gomiTypes');
  wrap.innerHTML = GOMI_TYPES.map(t=>`<span class="gomi-chip ${selectedGomiTypes.includes(t)?'on':''}" data-t="${t}" onclick="toggleGomiType('${t}',this)">${t}</span>`).join('');
  document.getElementById('inputCount').value = existing ? (existing.count||1) : 1;
  document.getElementById('inputNote').value = existing ? (existing.note||'') : '';
  document.getElementById('pinModalTitle').textContent = existing ? 'ごみの記録をやり直す' : 'ごみを記録する';
  document.getElementById('pinModal').classList.add('on');
}
function toggleGomiType(t, el){
  const i = selectedGomiTypes.indexOf(t);
  if(i>-1){ selectedGomiTypes.splice(i,1); el.classList.remove('on'); }
  else { selectedGomiTypes.push(t); el.classList.add('on'); }
}
async function savePin(){
  if(!editingRecordId && !pendingLatLng){ closeModal('pinModal'); return; }
  if(selectedGomiTypes.length===0){ showToast('ごみの種類を選んでください'); return; }
  const count = Math.max(1, parseInt(document.getElementById('inputCount').value)||1);
  const note = document.getElementById('inputNote').value.trim();
  try{
    if(editingRecordId){
      await db.collection('recs').doc(editingRecordId).update({
        types: selectedGomiTypes, count: count, note: note
      });
      closeModal('pinModal');
      showThanksEffect('修正しました！ありがとうございます');
    } else {
      await db.collection('recs').add({
        uid: currentUser.uid,
        nickname: userProfile.nickname || 'ゲスト',
        icon: userProfile.icon || '👤',
        lat: pendingLatLng.lat,
        lng: pendingLatLng.lng,
        types: selectedGomiTypes,
        count: count,
        note: note,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      closeModal('pinModal');
      showThanksEffect('ありがとう！記録できました');
    }
  }catch(e){
    showToast('記録に失敗しました: '+e.message);
  }
  pendingLatLng = null;
  editingRecordId = null;
}
async function deleteRecord(id){
  if(!confirm('この記録を削除しますか？')) return;
  try{
    await db.collection('recs').doc(id).delete();
    showToast('削除しました');
  }catch(e){ showToast('削除に失敗しました: '+e.message); }
}
function editRecord(id){
  const r = allRecords.find(x=>x.id===id);
  if(!r) return;
  if(r.uid !== currentUser.uid){ showToast('自分の記録のみやり直せます'); return; }
  openPinModal(r);
}
function viewOnMap(lat, lng){
  document.querySelector('.tab[data-scr="mapScr"]').click();
  setTimeout(()=>{
    if(map){ map.setView([lat,lng], 18); }
  }, 150);
}

/* ---- Firestoreリアルタイム購読 & グリッド集計 ---- */
function listenRecords(){
  if(unsubRecords) unsubRecords();
  unsubRecords = db.collection('recs').orderBy('createdAt','desc').limit(500)
    .onSnapshot(snap=>{
      allRecords = [];
      snap.forEach(doc=> allRecords.push(Object.assign({id:doc.id}, doc.data())));
      renderGrid();
      renderLogList();
    }, err=>console.warn('recs listen error', err));
}

/* 10m角グリッドに集計し、件数に応じて色分け */
function renderGrid(){
  if(!gridLayerGroup) return;
  gridLayerGroup.clearLayers();
  const cellSize = 0.0000898; // 緯度約10m相当（経度方向はやや誤差あり、簡易実装）
  const buckets = {};
  allRecords.forEach(r=>{
    if(typeof r.lat!=='number'||typeof r.lng!=='number') return;
    const gx = Math.floor(r.lat/cellSize);
    const gy = Math.floor(r.lng/cellSize);
    const key = gx+'_'+gy;
    if(!buckets[key]) buckets[key] = { lat:0, lng:0, n:0, count:0 };
    buckets[key].lat += r.lat;
    buckets[key].lng += r.lng;
    buckets[key].n += 1;
    buckets[key].count += (r.count||1);
  });
  Object.values(buckets).forEach(b=>{
    const lat = b.lat/b.n, lng = b.lng/b.n;
    const n = b.count;
    let color = '#3B82F6', label='青';
    if(n>=10){ color='#EF4444'; label='赤'; }
    else if(n>=4){ color='#F59E0B'; label='黄'; }
    const radius = 8 + Math.min(n,30)*0.6;
    L.circleMarker([lat,lng], {
      radius, color, fillColor:color, fillOpacity:.55, weight:2
    }).bindPopup(`<b>このエリア（10m範囲）</b><br>個数合計: ${n}個<br>記録件数: ${b.n}件`).addTo(gridLayerGroup);
  });
}

async function getProfile(uid){
  if(profilesCache[uid]) return profilesCache[uid];
  try{
    const doc = await db.collection('users').doc(uid).get();
    profilesCache[uid] = doc.exists ? { nickname:doc.data().nickname, icon:doc.data().icon } : null;
  }catch(e){ profilesCache[uid] = null; }
  return profilesCache[uid];
}

async function renderLogList(){
  const wrap = document.getElementById('logList');
  if(allRecords.length===0){
    wrap.innerHTML = '<div class="card" style="text-align:center;color:var(--gray);">まだ記録がありません</div>';
    return;
  }
  // 記録に登場する全ユーザーの最新プロフィールを取得（プロフィール変更が一覧にも反映されるように）
  const uids = [...new Set(allRecords.map(r=>r.uid).filter(Boolean))];
  await Promise.all(uids.map(getProfile));

  wrap.innerHTML = allRecords.map(r=>{
    const date = r.createdAt && r.createdAt.toDate ? r.createdAt.toDate().toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    const live = profilesCache[r.uid];
    const icon = (live && live.icon) || r.icon || '👤';
    const nickname = (live && live.nickname) || r.nickname || 'ゲスト';
    const isMine = currentUser && r.uid === currentUser.uid;
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="font-weight:700;display:flex;align-items:center;gap:6px;"><span class="mini-avatar">${avatarContent(icon)}</span>${escapeHtml(nickname)}</div>
        <div style="font-size:10px;color:var(--gray);">${date}</div>
      </div>
      <div style="margin-top:6px;font-size:13px;">${(r.types||[]).map(t=>`<span class="gomi-chip on">${escapeHtml(t)}</span>`).join('')}</div>
      <div style="margin-top:4px;font-size:12px;color:var(--gray);">個数: ${r.count||1}個${r.note?(' / '+escapeHtml(r.note)):''}</div>
      <div class="log-actions">
        <button onclick="viewOnMap(${r.lat},${r.lng})">🗺️ 地図で見る</button>
        ${isMine ? `<button onclick="editRecord('${r.id}')">↩️ やり直す</button>
        <button class="danger" onclick="deleteRecord('${r.id}')">🗑️ 削除</button>` : ''}
      </div>
    </div>`;
  }).join('');
}
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ===================== ありがとう演出（音＋ポップアップ） ===================== */
function playThanksSound(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const now = ctx.currentTime;
    [[880,0],[1318.5,0.09]].forEach(([freq,delay])=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now+delay);
      gain.gain.linearRampToValueAtTime(0.25, now+delay+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now+delay+0.35);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now+delay);
      osc.stop(now+delay+0.4);
    });
  }catch(e){ /* 音が出せない環境は無視 */ }
}
function showThanksEffect(message){
  const el = document.getElementById('thanksPopup');
  el.innerHTML = `🙏 ${escapeHtml(message)}<br><span style="font-size:13px;font-weight:400;">記録してくれて感謝です</span>`;
  el.classList.remove('show');
  void el.offsetWidth; // reflow でアニメーションをリスタート
  el.classList.add('show');
  playThanksSound();
}

/* ===================== 共通UI ===================== */
function closeModal(id){ document.getElementById(id).classList.remove('on'); }
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('on'), 2600);
}
</script>
