<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>ポイ捨てゴミマップ</title>
<meta name="theme-color" content="#2F6FED">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

<style>
:root{
  --blue:#2F6FED;
  --blue-dark:#1F4FC4;
  --teal:#3FA796;
  --amber:#F5A623;
  --red:#E85D4E;
  --bg:#F5F8FC;
  --card:#FFFFFF;
  --ink:#1F2937;
  --muted:#6B7280;
  --line:#E4E9F2;
  --radius:18px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%; margin:0; overscroll-behavior:none;}
body{
  font-family:"Noto Sans JP", sans-serif;
  color:var(--ink);
  background:var(--bg);
  display:flex; flex-direction:column;
  height:100dvh; overflow:hidden;
}
h1,h2,h3,.brand{font-family:"Zen Kaku Gothic New", sans-serif;}

/* ---------- Header ---------- */
header{
  position:relative; z-index:20;
  padding:calc(10px + var(--safe-top)) 16px 10px;
  background:linear-gradient(135deg, var(--blue), var(--blue-dark));
  color:#fff;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 4px 14px rgba(47,111,237,0.25);
}
.brand{font-weight:900; font-size:17px; display:flex; align-items:center; gap:8px;}
.brand .leaf{font-size:18px;}
.header-btn{
  width:36px; height:36px; border-radius:50%;
  background:rgba(255,255,255,0.18); border:none; color:#fff;
  display:flex; align-items:center; justify-content:center; font-size:16px;
}

/* ---------- Map area ---------- */
#map-wrap{position:relative; flex:1; min-height:0;}
#map{position:absolute; inset:0;}
.leaflet-control-layers{border-radius:12px !important; overflow:hidden; font-family:"Noto Sans JP", sans-serif;}

.mentor-chip{
  position:absolute; top:14px; left:14px; right:70px; z-index:15;
  background:var(--card); border-radius:16px; padding:10px 12px;
  box-shadow:0 6px 18px rgba(20,30,60,0.12);
  display:flex; gap:10px; align-items:flex-start;
  animation:slideIn .35s ease;
}
.mentor-chip .face{
  width:34px; height:34px; border-radius:50%; flex:none;
  background:#FFE7B8; display:flex; align-items:center; justify-content:center; font-size:18px;
}
.mentor-chip p{margin:0; font-size:12.5px; line-height:1.5; color:var(--ink);}
.mentor-chip .close{
  position:absolute; top:4px; right:6px; border:none; background:none; color:var(--muted); font-size:14px; padding:4px;
}
@keyframes slideIn{from{opacity:0; transform:translateY(-8px);} to{opacity:1; transform:translateY(0);}}

.fab-report{
  position:absolute; z-index:15; right:18px; bottom:96px;
  width:60px; height:60px; border-radius:50%; border:none;
  background:linear-gradient(135deg, var(--teal), #2c8879);
  color:#fff; font-size:28px; box-shadow:0 10px 24px rgba(63,167,150,0.45);
  display:flex; align-items:center; justify-content:center;
}
.fab-report:active{transform:scale(0.94);}

.toast{
  position:absolute; left:50%; bottom:170px; transform:translateX(-50%);
  background:rgba(31,41,55,0.92); color:#fff; padding:10px 16px; border-radius:999px;
  font-size:13px; z-index:40; opacity:0; pointer-events:none; transition:opacity .25s;
}
.toast.show{opacity:1;}

/* ---------- Bottom nav ---------- */
nav.bottom{
  position:relative; z-index:20;
  display:flex; background:var(--card);
  border-top:1px solid var(--line);
  padding:8px 4px calc(8px + var(--safe-bottom));
}
nav.bottom button{
  flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:3px;
  color:var(--muted); font-size:10.5px; padding:4px 0; font-family:"Noto Sans JP", sans-serif;
}
nav.bottom button .ic{font-size:19px;}
nav.bottom button.active{color:var(--blue); font-weight:700;}

/* ---------- Views ---------- */
.view{position:absolute; inset:0; background:var(--bg); overflow-y:auto; z-index:10;}
.view.hidden{display:none;}
.view-header{padding:16px 18px 4px;}
.view-header h2{margin:0 0 2px; font-size:20px;}
.view-header p{margin:0; font-size:12.5px; color:var(--muted);}

/* ---------- Cards ---------- */
.card{
  background:var(--card); border-radius:var(--radius); margin:12px 16px; padding:16px;
  box-shadow:0 3px 12px rgba(20,30,60,0.06);
}

/* ---------- Popup (Leaflet) content ---------- */
.pin-popup{font-family:"Noto Sans JP", sans-serif; min-width:190px;}
.pin-popup .badge{
  display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px;
  margin-bottom:6px;
}
.badge.ok{background:#E7F6E9; color:#2C8C3E;}
.badge.unconf{background:#FFF3DA; color:#B8790F;}
.badge.warn{background:#FDE7E4; color:var(--red);}
.pin-popup h4{margin:0 0 4px; font-size:15px;}
.pin-popup .meta{font-size:11.5px; color:var(--muted); margin-bottom:6px;}
.pin-popup img{width:100%; border-radius:10px; margin-top:4px;}

/* ---------- Report Sheet ---------- */
.sheet-backdrop{
  position:fixed; inset:0; background:rgba(20,30,55,0.4); z-index:50;
  display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity .25s;
}
.sheet-backdrop.open{opacity:1; pointer-events:auto;}
.sheet{
  background:var(--card); width:100%; max-height:88vh; border-radius:22px 22px 0 0;
  padding:14px 18px calc(18px + var(--safe-bottom)); overflow-y:auto;
  transform:translateY(100%); transition:transform .3s ease;
}
.sheet-backdrop.open .sheet{transform:translateY(0);}
.sheet-handle{width:40px; height:4px; background:var(--line); border-radius:99px; margin:0 auto 12px;}
.sheet h3{margin:0 0 4px; font-size:18px;}
.sheet .sub{font-size:12px; color:var(--muted); margin:0 0 14px;}

.tabgroup{display:flex; gap:8px; margin-bottom:14px;}
.tabgroup button{
  flex:1; padding:10px 0; border-radius:12px; border:1.5px solid var(--line); background:#fff;
  font-weight:700; font-size:13.5px; color:var(--muted); font-family:"Noto Sans JP", sans-serif;
}
.tabgroup button.active{border-color:var(--blue); color:var(--blue); background:#EEF3FF;}

.icon-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px;}
.icon-cell{
  border:1.5px solid var(--line); border-radius:14px; padding:12px 4px; text-align:center;
  background:#fff; font-family:"Noto Sans JP", sans-serif;
}
.icon-cell .em{font-size:24px; display:block; margin-bottom:4px;}
.icon-cell span.lb{font-size:11px; color:var(--ink);}
.icon-cell.active{border-color:var(--teal); background:#EAF8F4;}

.loc-row{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:#F3F6FC; border-radius:14px; padding:12px 14px; margin-bottom:14px; font-size:12.5px;
}
.loc-row button{
  border:none; background:var(--blue); color:#fff; padding:8px 12px; border-radius:10px; font-size:12px; font-weight:700;
}
.photo-row{margin-bottom:16px;}
.photo-row label{font-size:12.5px; color:var(--muted); display:block; margin-bottom:6px;}
.photo-preview{
  width:100%; height:120px; border-radius:14px; border:1.5px dashed var(--line);
  display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:12.5px;
  background-size:cover; background-position:center; overflow:hidden; position:relative;
}
.photo-preview input{position:absolute; inset:0; opacity:0;}

.btn-primary{
  width:100%; padding:15px; border:none; border-radius:14px; background:var(--blue); color:#fff;
  font-weight:700; font-size:15px; font-family:"Noto Sans JP", sans-serif;
}
.btn-primary:disabled{background:#B9C6E6;}
.btn-ghost{
  width:100%; padding:12px; border:none; background:none; color:var(--muted); font-size:13px; margin-top:6px;
}

/* ---------- Mypage ---------- */
.profile-card{display:flex; align-items:center; gap:14px;}
.avatar{
  width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg, var(--blue), var(--teal));
  color:#fff; display:flex; align-items:center; justify-content:center; font-size:24px; flex:none;
}
.profile-name{font-weight:700; font-size:16px; margin:0;}
.profile-sub{font-size:12px; color:var(--muted); margin:2px 0 0;}
.stat-row{display:flex; gap:10px; margin-top:14px;}
.stat-box{flex:1; background:#F3F6FC; border-radius:12px; padding:10px; text-align:center;}
.stat-box b{display:block; font-size:18px; color:var(--blue);}
.stat-box span{font-size:11px; color:var(--muted);}
.list-row{
  display:flex; align-items:center; justify-content:space-between; padding:13px 2px;
  border-bottom:1px solid var(--line); font-size:14px;
}
.list-row:last-child{border-bottom:none;}
.list-row .l{display:flex; align-items:center; gap:10px;}
.soon{
  display:flex; flex-direction:column; align-items:center; justify-content:center; height:70%;
  color:var(--muted); text-align:center; padding:0 30px;
}
.soon .em{font-size:40px; margin-bottom:10px;}
</style>
</head>
<body>

<header>
  <div class="brand"><span class="leaf">🌿</span>ポイ捨てゴミマップ</div>
  <button class="header-btn" onclick="showToast('お知らせはまだありません')">🔔</button>
</header>

<div id="map-wrap">
  <div id="map"></div>

  <div class="mentor-chip" id="mentorChip">
    <div class="face">🧑‍🔧</div>
    <div>
      <p id="mentorText">この町をきれいにするのはみんなの力や。見つけたゴミはどんどん教えてくれよな！</p>
    </div>
    <button class="close" onclick="document.getElementById('mentorChip').style.display='none'">✕</button>
  </div>

  <button class="fab-report" onclick="openSheet()">＋</button>
  <div class="toast" id="toast"></div>
</div>

<!-- マイページ ビュー -->
<div class="view hidden" id="view-mypage">
  <div class="view-header"><h2>マイページ</h2><p>自分の記録やポイントを確認</p></div>

  <div class="card profile-card">
    <div class="avatar" id="avatarInitial">👤</div>
    <div>
      <p class="profile-name" id="profileName">ゲストユーザー</p>
      <p class="profile-sub" id="profileSub">ログインすると記録が消えません</p>
    </div>
  </div>

  <div class="card">
    <div class="stat-row">
      <div class="stat-box"><b id="statCount">0</b><span>調査件数</span></div>
      <div class="stat-box"><b id="statPoints">0</b><span>ポイント</span></div>
      <div class="stat-box"><b id="statBadges">0</b><span>バッジ</span></div>
    </div>
  </div>

  <div class="card" id="authCard">
    <div class="list-row" onclick="signInGoogle()">
      <div class="l">🔑 <span>Googleでログイン</span></div><span>›</span>
    </div>
    <div class="list-row" onclick="showToast('近日公開予定です')">
      <div class="l">📖 <span>調査履歴</span></div><span>›</span>
    </div>
    <div class="list-row" onclick="showToast('近日公開予定です')">
      <div class="l">⚙️ <span>設定</span></div><span>›</span>
    </div>
  </div>
</div>

<!-- 近日公開 ビュー(ランキング・タイムライン共通) -->
<div class="view hidden" id="view-soon">
  <div class="soon">
    <div class="em">🚧</div>
    <h3 style="margin:0 0 6px;">この機能は準備中です</h3>
    <p style="font-size:13px; margin:0;">データが集まり次第、フェーズ2で公開予定やで。もうしばらく待っててな。</p>
  </div>
</div>

<nav class="bottom">
  <button class="nav-btn active" data-view="map"><span class="ic">🏠</span>ホーム</button>
  <button class="nav-btn" data-view="soon"><span class="ic">📈</span>タイムライン</button>
  <button class="nav-btn" data-view="soon"><span class="ic">🏆</span>ランキング</button>
  <button class="nav-btn" data-view="mypage"><span class="ic">🙋</span>マイページ</button>
</nav>

<!-- 報告シート -->
<div class="sheet-backdrop" id="sheetBackdrop">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>ゴミを報告する</h3>
    <p class="sub">見つけたゴミをタップで記録しよう</p>

    <div class="tabgroup" id="catTabs">
      <button class="active" data-cat="ポイ捨て" onclick="selectCategory('ポイ捨て')">ポイ捨て</button>
      <button data-cat="海ごみ" onclick="selectCategory('海ごみ')">海ごみ</button>
    </div>

    <div class="icon-grid" id="iconGrid"></div>

    <div class="loc-row">
      <span id="locText">位置情報が未取得です</span>
      <button onclick="captureLocation()">現在地を取得</button>
    </div>

    <div class="photo-row">
      <label>写真を追加（任意）</label>
      <div class="photo-preview" id="photoPreview">
        タップして撮影・選択
        <input type="file" accept="image/*" capture="environment" id="photoInput" onchange="onPhotoSelected(event)">
      </div>
    </div>

    <button class="btn-primary" id="submitBtn" onclick="submitReport()" disabled>投稿する</button>
    <button class="btn-ghost" onclick="closeSheet()">キャンセル</button>
  </div>
</div>

<script>
/* =========================================================
   Firebase 初期化
   ↓ 既存の poisute-map-ise プロジェクトの設定値に置き換えてください
========================================================= */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let currentUser = null;
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    renderProfile(user);
    loadMyStats(user.uid);
  } else {
    auth.signInAnonymously().catch(err => console.error("匿名ログイン失敗:", err));
  }
});

function renderProfile(user){
  const isAnon = user.isAnonymous;
  document.getElementById('profileName').textContent = isAnon ? "ゲストユーザー" : (user.displayName || "親方ファン");
  document.getElementById('profileSub').textContent = isAnon ? "ログインすると記録が消えません" : user.email || "";
  document.getElementById('avatarInitial').textContent = isAnon ? "👤" : "🧑";
}

function signInGoogle(){
  const provider = new firebase.auth.GoogleAuthProvider();
  if (currentUser && currentUser.isAnonymous){
    currentUser.linkWithPopup(provider)
      .then(res => { renderProfile(res.user); showToast('ログインしました'); })
      .catch(err => {
        if (err.code === 'auth/credential-already-in-use'){
          firebase.auth().signInWithPopup(provider);
        } else {
          console.error(err); showToast('ログインに失敗しました');
        }
      });
  } else {
    auth.signInWithPopup(provider);
  }
}

function loadMyStats(uid){
  db.collection('reports').where('reportedBy','==',uid).get().then(snap => {
    const count = snap.size;
    document.getElementById('statCount').textContent = count;
    document.getElementById('statPoints').textContent = count * 10;
    document.getElementById('statBadges').textContent = Math.floor(count / 10);
  }).catch(err => console.error(err));
}

/* =========================================================
   地図（国土地理院タイル：通常⇔写真 / 完全無料）
========================================================= */
const map = L.map('map', { zoomControl:false }).setView([34.4859, 136.7093], 14);

const stdLayer = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
  attribution: '地図: 国土地理院', maxZoom: 18
}).addTo(map);

const photoLayer = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', {
  attribution: '写真: 国土地理院', maxZoom: 18
});

L.control.layers({ '通常地図': stdLayer, '写真（衛星）': photoLayer }, null, { position:'topright' }).addTo(map);
L.control.zoom({ position:'bottomright' }).addTo(map);

let heatLayer = null;
let markersLayer = L.layerGroup().addTo(map);

const CONFIDENCE_LABEL = {
  '確認済み': { cls:'ok', txt:'確認済み' },
  '未確認':   { cls:'unconf', txt:'未確認' },
  '要注意':   { cls:'warn', txt:'要注意（AIが不自然と判断）' }
};

function categoryColor(cat){ return cat === '海ごみ' ? '#2c8879' : '#2F6FED'; }

function buildDivIcon(item){
  const color = categoryColor(item.category);
  return L.divIcon({
    className:'',
    html:`<div style="width:32px;height:32px;border-radius:50% 50% 50% 0;background:${color};transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,0.25);">
            <span style="transform:rotate(45deg);font-size:15px;">${item.emoji || '🗑️'}</span>
          </div>`,
    iconSize:[32,32], iconAnchor:[16,30]
  });
}

function renderPopup(d){
  const conf = CONFIDENCE_LABEL[d.confidence] || CONFIDENCE_LABEL['未確認'];
  const date = d.createdAt && d.createdAt.toDate ? d.createdAt.toDate().toLocaleString('ja-JP') : '';
  const photo = (d.photos && d.photos[0]) ? `<img src="${d.photos[0]}">` : '';
  return `<div class="pin-popup">
    <span class="badge ${conf.cls}">${conf.txt}</span>
    <h4>${d.itemType || 'ゴミ'}</h4>
    <div class="meta">${date}${d.area && d.area.town ? ' ・ ' + d.area.town : ''}</div>
    ${photo}
  </div>`;
}

function loadReports(){
  db.collection('reports').orderBy('createdAt','desc').limit(500).onSnapshot(snap => {
    markersLayer.clearLayers();
    const heatPoints = [];
    snap.forEach(doc => {
      const d = doc.data();
      if (!d.location) return;
      const lat = d.location.latitude, lng = d.location.longitude;
      heatPoints.push([lat, lng, 0.6]);
      const marker = L.marker([lat,lng], { icon: buildDivIcon(d) });
      marker.bindPopup(renderPopup(d));
      markersLayer.addLayer(marker);
    });
    if (heatLayer) map.removeLayer(heatLayer);
    heatLayer = L.heatLayer(heatPoints, { radius:32, blur:24, maxZoom:16 }).addTo(map);
  }, err => console.error('reports取得エラー:', err));
}
loadReports();

/* =========================================================
   報告シート
========================================================= */
const ITEM_TYPES = [
  { cat:'ポイ捨て', label:'ペットボトル', emoji:'🧴' },
  { cat:'ポイ捨て', label:'タバコ', emoji:'🚬' },
  { cat:'ポイ捨て', label:'缶', emoji:'🥫' },
  { cat:'ポイ捨て', label:'食品容器', emoji:'🍱' },
  { cat:'ポイ捨て', label:'ビニール袋', emoji:'🛍️' },
  { cat:'ポイ捨て', label:'お菓子袋', emoji:'🍬' },
  { cat:'ポイ捨て', label:'ガラス', emoji:'🍾' },
  { cat:'ポイ捨て', label:'電池', emoji:'🔋' },
  { cat:'ポイ捨て', label:'その他', emoji:'❔' },
  { cat:'海ごみ', label:'漂着ペットボトル', emoji:'🧴' },
  { cat:'海ごみ', label:'発泡スチロール', emoji:'⚪' },
  { cat:'海ごみ', label:'漁具・ロープ', emoji:'🎣' },
  { cat:'海ごみ', label:'ブイ', emoji:'🛟' },
  { cat:'海ごみ', label:'流木', emoji:'🪵' },
  { cat:'海ごみ', label:'マイクロプラ', emoji:'🔬' },
  { cat:'海ごみ', label:'缶・金属', emoji:'🥫' },
  { cat:'海ごみ', label:'ガラス片', emoji:'🔻' },
  { cat:'海ごみ', label:'その他海ごみ', emoji:'❔' },
];

let selectedCategory = 'ポイ捨て';
let selectedItem = null;
let selectedLocation = null;
let selectedPhotoFile = null;

function renderIconGrid(){
  const grid = document.getElementById('iconGrid');
  grid.innerHTML = '';
  ITEM_TYPES.filter(i => i.cat === selectedCategory).forEach(item => {
    const cell = document.createElement('div');
    cell.className = 'icon-cell' + (selectedItem === item.label ? ' active' : '');
    cell.innerHTML = `<span class="em">${item.emoji}</span><span class="lb">${item.label}</span>`;
    cell.onclick = () => { selectedItem = item.label; renderIconGrid(); updateSubmitState(); };
    grid.appendChild(cell);
  });
}

function selectCategory(cat){
  selectedCategory = cat;
  selectedItem = null;
  document.querySelectorAll('#catTabs button').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  renderIconGrid();
  updateSubmitState();
}

function captureLocation(){
  if (!navigator.geolocation){ showToast('この端末では位置情報を取得できません'); return; }
  document.getElementById('locText').textContent = '取得中…';
  navigator.geolocation.getCurrentPosition(pos => {
    selectedLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    document.getElementById('locText').textContent =
      `取得済み（${selectedLocation.lat.toFixed(5)}, ${selectedLocation.lng.toFixed(5)}）`;
    updateSubmitState();
  }, err => {
    console.error(err);
    document.getElementById('locText').textContent = '取得に失敗しました。もう一度お試しください';
  }, { enableHighAccuracy:true, timeout:8000 });
}

function onPhotoSelected(e){
  const file = e.target.files[0];
  if (!file) return;
  selectedPhotoFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    const box = document.getElementById('photoPreview');
    box.style.backgroundImage = `url(${ev.target.result})`;
    box.textContent = '';
  };
  reader.readAsDataURL(file);
}

function updateSubmitState(){
  document.getElementById('submitBtn').disabled = !(selectedItem && selectedLocation);
}

function openSheet(){
  selectedCategory = 'ポイ捨て'; selectedItem = null; selectedLocation = null; selectedPhotoFile = null;
  document.getElementById('locText').textContent = '位置情報が未取得です';
  document.getElementById('photoPreview').style.backgroundImage = '';
  document.getElementById('photoPreview').textContent = 'タップして撮影・選択';
  document.getElementById('photoInput').value = '';
  selectCategory('ポイ捨て');
  document.getElementById('sheetBackdrop').classList.add('open');
}
function closeSheet(){ document.getElementById('sheetBackdrop').classList.remove('open'); }

async function submitReport(){
  if (!selectedItem || !selectedLocation || !currentUser) return;
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '投稿中…';

  try {
    let photoUrl = null;
    if (selectedPhotoFile){
      const ref = storage.ref().child(`reports/${currentUser.uid}_${Date.now()}.jpg`);
      const snap = await ref.put(selectedPhotoFile);
      photoUrl = await snap.ref.getDownloadURL();
    }
    await db.collection('reports').add({
      category: selectedCategory,
      itemType: selectedItem,
      location: new firebase.firestore.GeoPoint(selectedLocation.lat, selectedLocation.lng),
      area: {},
      photos: photoUrl ? [photoUrl] : [],
      confidence: '未確認',
      confirmCount: 0,
      reportedBy: currentUser.uid,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      status: 'active'
    });
    closeSheet();
    showToast('報告ありがとうございます！');
    if (!currentUser.isAnonymous) loadMyStats(currentUser.uid);
  } catch(err){
    console.error(err);
    showToast('投稿に失敗しました。もう一度お試しください');
  } finally {
    btn.disabled = false; btn.textContent = '投稿する';
  }
}

/* =========================================================
   下部ナビゲーション / ビュー切替
========================================================= */
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const target = btn.dataset.view;
    document.getElementById('map-wrap').classList.toggle('hidden', target !== 'map');
    document.getElementById('view-mypage').classList.toggle('hidden', target !== 'mypage');
    document.getElementById('view-soon').classList.toggle('hidden', target !== 'soon');
  });
});

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* =========================================================
   PWA: Service Worker 登録
========================================================= */
if ('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW登録失敗:', err));
  });
}
</script>
