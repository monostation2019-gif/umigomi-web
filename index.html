<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>まちみっけ｜伊勢市限定版</title>
<meta name="theme-color" content="#1f5c3a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root{
  --green:#1f5c3a;
  --green-2:#2f8a52;
  --green-pale:#e9f5ec;
  --cream:#faf8f2;
  --ink:#2b2b26;
  --gray:#8a8a82;
  --border:#e6e2d6;
  --orange:#f2a33c;
  --pink:#e8688f;
  --blue:#4a90d9;
  --radius:20px;
  --shadow:0 4px 18px rgba(31,92,58,.10);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; font-family:'Zen Maru Gothic', sans-serif; background:var(--cream); color:var(--ink);
  overscroll-behavior-y:none;
}
#appFrame{
  max-width:480px; margin:0 auto; min-height:100dvh; background:var(--cream);
  position:relative; display:flex; flex-direction:column;
}
button{font-family:inherit; cursor:pointer;}
img{max-width:100%; display:block;}

/* ---------- Login overlay ---------- */
#loginScreen{
  position:fixed; inset:0; z-index:200; background:linear-gradient(160deg,var(--green) 0%,#123d27 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px; padding:32px;
  color:#fff; text-align:center;
}
#loginScreen .logo{font-size:44px; font-weight:900; letter-spacing:1px;}
#loginScreen .logo span{color:#ffd77a;}
#loginScreen .badge{
  background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.4); border-radius:999px;
  padding:6px 18px; font-size:13px; font-weight:700;
}
#loginScreen .tagline{font-size:15px; opacity:.9; line-height:1.8; max-width:320px;}
#loginScreen .authBtns{width:100%; max-width:320px; display:flex; flex-direction:column; gap:12px; margin-top:8px;}
.btn{
  border:none; border-radius:14px; padding:15px 18px; font-size:15px; font-weight:700;
  display:flex; align-items:center; justify-content:center; gap:10px; transition:transform .1s ease, opacity .15s;
}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.4; pointer-events:none;}
.btn-google{background:#fff; color:#333;}
.btn-apple{background:#000; color:#fff;}
.btn-guest{background:rgba(255,255,255,.12); color:#fff; border:1px solid rgba(255,255,255,.5);}
.btn-primary{background:var(--green-2); color:#fff;}
.btn-outline{background:#fff; color:var(--green); border:1.5px solid var(--green-pale); box-shadow:var(--shadow);}

/* ---------- Header ---------- */
.topbar{
  padding:calc(14px + var(--safe-t)) 20px 12px; display:flex; align-items:center; justify-content:space-between;
  background:var(--cream); position:sticky; top:0; z-index:20;
}
.topbar h1{font-size:19px; margin:0; font-weight:900; color:var(--green);}
.topbar .iconbtn{
  width:38px; height:38px; border-radius:50%; background:#fff; border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-size:17px; color:var(--green);
}

/* ---------- Screens ---------- */
.screen{display:none; flex:1; padding-bottom:calc(88px + var(--safe-b)); animation:fadeIn .18s ease;}
.screen.active{display:block;}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

/* ---------- HOME ---------- */
.home-hero{
  margin:8px 18px 18px; padding:26px 22px 22px; border-radius:24px;
  background:linear-gradient(160deg,#1f5c3a 0%, #2f8a52 100%); color:#fff; position:relative; overflow:hidden;
  box-shadow:var(--shadow);
}
.home-hero::after{
  content:""; position:absolute; right:-30px; bottom:-40px; width:160px; height:160px; border-radius:50%;
  background:rgba(255,255,255,.08);
}
.home-hero .logo{font-size:30px; font-weight:900; margin:0 0 8px;}
.home-hero .logo span{color:#ffd77a;}
.home-hero .badge{
  display:inline-block; background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.4);
  border-radius:999px; padding:4px 14px; font-size:12px; font-weight:700; margin-bottom:14px;
}
.home-hero p{font-size:13.5px; line-height:1.8; opacity:.92; margin:0 0 18px; position:relative; z-index:1;}
.discoverBtn{
  width:100%; background:#fff; color:var(--green); font-size:16px; font-weight:900; border-radius:16px;
  padding:16px; display:flex; align-items:center; justify-content:center; gap:10px; border:none;
  box-shadow:0 6px 16px rgba(0,0,0,.15); position:relative; z-index:1;
}

.quicknav{display:flex; gap:12px; margin:0 18px 22px;}
.quicknav button{
  flex:1; background:#fff; border:1px solid var(--border); border-radius:16px; padding:14px 6px;
  display:flex; flex-direction:column; align-items:center; gap:6px; font-size:12px; font-weight:700; color:var(--ink);
  box-shadow:var(--shadow);
}
.quicknav .ic{font-size:20px;}

.section-title{margin:0 18px 10px; font-size:15px; font-weight:900; color:var(--green); display:flex; align-items:center; gap:6px;}
.statsRow{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:0 18px 22px;}
.statCard{background:#fff; border:1px solid var(--border); border-radius:16px; padding:14px 8px; text-align:center;}
.statCard .num{font-size:20px; font-weight:900; color:var(--green);}
.statCard .lbl{font-size:11px; color:var(--gray); margin-top:2px;}

.zukanGrid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:0 18px 24px;}
.zukanItem{display:flex; flex-direction:column; align-items:center; gap:6px;}
.zukanItem .circle{
  width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px;
  box-shadow:var(--shadow);
}
.zukanItem .lbl{font-size:10.5px; text-align:center; color:var(--ink); font-weight:700; line-height:1.3;}

/* ---------- CAMERA / DISCOVER ---------- */
.cameraStage{margin:8px 18px; text-align:center;}
.cameraBox{
  border:2px dashed var(--border); border-radius:20px; padding:40px 16px; background:#fff;
}
.cameraBox .ic{font-size:52px; margin-bottom:10px;}
.cameraBox p{font-size:13px; color:var(--gray); margin:6px 0 18px;}
input[type=file]{display:none;}

/* ---------- Category / Type picker (manual selection, no AI) ---------- */
.typeGrid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:6px 0 4px;}
.typeBtn{
  display:flex; flex-direction:column; align-items:center; gap:6px; background:#fff;
  border:2px solid var(--border); border-radius:14px; padding:12px 4px; font-size:11.5px; font-weight:700; color:var(--ink);
}
.typeBtn .ic{font-size:24px;}
.typeBtn.active{border-color:var(--green-2); background:var(--green-pale); color:var(--green);}

.speciesSearchBox{margin:6px 0 10px;}
.speciesSearchBox input{
  width:100%; box-sizing:border-box; border:1.5px solid var(--border); border-radius:14px;
  padding:12px 14px; font-size:14px; font-family:inherit; background:var(--cream);
}
.speciesList{display:flex; flex-direction:column; gap:8px; max-height:280px; overflow-y:auto; padding-right:2px;}
.speciesRow{display:flex; align-items:center; gap:12px; background:#fff; border:1.5px solid var(--border); border-radius:14px; padding:10px 12px;}
.speciesRow .ic{font-size:20px;}
.speciesRow .nm{font-weight:700; font-size:13.5px;}
.speciesRow .en{font-size:11px; color:var(--gray);}
.speciesRow.active{border-color:var(--green-2); background:var(--green-pale);}
.speciesEmpty{text-align:center; color:var(--gray); font-size:12.5px; padding:16px 0;}
#pinMap{height:220px; width:100%; border-radius:14px; overflow:hidden; background:#dfe9e2;}

.previewCard{margin:8px 18px; background:#fff; border-radius:20px; overflow:hidden; box-shadow:var(--shadow);}
.previewCard img{width:100%; height:230px; object-fit:cover; background:#eee;}
.resultBox{padding:16px 18px 20px;}
.resultTop{display:flex; align-items:center; justify-content:space-between;}
.resultTop .name{font-size:17px; font-weight:900;}
.resultTop .en{font-size:12px; color:var(--gray);}
.resultTop .pct{font-size:22px; font-weight:900; color:var(--green);}
.subChoices{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap;}
.subChip{background:var(--green-pale); color:var(--green); font-size:12px; font-weight:700; padding:6px 12px; border-radius:999px;}
.resultBtns{display:flex; flex-direction:column; gap:10px; margin-top:18px;}

/* ---------- MAP ---------- */
.filterRow{display:flex; gap:8px; margin:10px 18px 12px; overflow-x:auto; padding-bottom:2px;}
.filterChip{
  flex:0 0 auto; padding:8px 16px; border-radius:999px; font-size:12.5px; font-weight:700; border:1.5px solid var(--border);
  background:#fff; color:var(--gray); white-space:nowrap;
}
.filterChip.active{background:var(--green); color:#fff; border-color:var(--green);}
.mapWrap{position:relative; margin:0 18px; border-radius:20px; overflow:hidden; box-shadow:var(--shadow);}
#leafletMap{height:65vh; min-height:460px; width:100%; background:#dfe9e2;}
.trashPinIcon{background:none !important; border:none !important;}
.trashPinInner{
  width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:15px; line-height:1; border:2px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,.35);
}
.mapTypeCtrl{
  position:absolute; top:10px; right:10px; z-index:1000; display:flex; flex-direction:column; gap:4px;
  background:rgba(255,255,255,.96); border-radius:14px; padding:4px; box-shadow:var(--shadow);
}
.mapTypeCtrl button{
  border:none; background:none; padding:7px 12px; font-size:11.5px; font-weight:700; color:var(--gray);
  border-radius:10px; white-space:nowrap; text-align:center;
}
.mapTypeCtrl button.active{background:var(--green); color:#fff;}
.areaStats{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:14px 18px;}
.areaStats .cell{background:#fff; border:1px solid var(--border); border-radius:14px; padding:10px 4px; text-align:center;}
.areaStats .cell .n{font-size:16px; font-weight:900; color:var(--green);}
.areaStats .cell .l{font-size:10.5px; color:var(--gray); margin-top:2px;}

/* ---------- MYPAGE ---------- */
.profileCard{
  margin:8px 18px 18px; background:linear-gradient(160deg,#1f5c3a,#2f8a52); border-radius:22px; padding:22px;
  color:#fff; display:flex; align-items:center; gap:14px; box-shadow:var(--shadow);
}
.profileCard .avatar{
  width:58px; height:58px; border-radius:50%; background:rgba(255,255,255,.2); display:flex; align-items:center;
  justify-content:center; font-size:26px; flex:none;
}
.profileCard .name{font-size:16px; font-weight:900;}
.profileCard .lv{font-size:12px; opacity:.9; margin-top:2px;}
.mypageStats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:0 18px 20px;}
.menuList{margin:0 18px 20px; background:#fff; border-radius:18px; border:1px solid var(--border); overflow:hidden;}
.menuList button{
  width:100%; display:flex; align-items:center; justify-content:space-between; padding:15px 18px; background:none;
  border:none; border-bottom:1px solid var(--border); font-size:14px; font-weight:700; color:var(--ink);
}
.menuList button:last-child{border-bottom:none;}
.menuList .left{display:flex; align-items:center; gap:12px;}
.menuList .badgeNum{background:var(--green-pale); color:var(--green); font-size:11px; font-weight:900; padding:2px 9px; border-radius:999px;}

/* ---------- RANKING ---------- */
.rankTabs{display:flex; gap:8px; margin:8px 18px 10px;}
.rankTabs button{flex:1; padding:9px; border-radius:12px; border:1.5px solid var(--border); background:#fff; font-size:12.5px; font-weight:700; color:var(--gray);}
.rankTabs button.active{background:var(--green); color:#fff; border-color:var(--green);}
.periodTabs{display:flex; gap:16px; margin:0 20px 12px; border-bottom:1px solid var(--border);}
.periodTabs button{background:none; border:none; padding:8px 2px; font-size:13px; font-weight:700; color:var(--gray); border-bottom:2px solid transparent;}
.periodTabs button.active{color:var(--green); border-color:var(--green);}
.rankList{margin:0 18px; background:#fff; border-radius:18px; border:1px solid var(--border); overflow:hidden;}
.rankRow{display:flex; align-items:center; gap:12px; padding:13px 16px; border-bottom:1px solid var(--border);}
.rankRow:last-child{border-bottom:none;}
.rankRow .medal{width:26px; text-align:center; font-size:15px; font-weight:900; color:var(--gray);}
.rankRow.top1 .medal{color:#e0a627;}
.rankRow.top2 .medal{color:#9aa0a6;}
.rankRow.top3 .medal{color:#b0703b;}
.rankRow .town{flex:1; font-size:14px; font-weight:700;}
.rankRow .count{font-size:13px; color:var(--green); font-weight:900;}
.rankRow .count small{color:var(--gray); font-weight:500; font-size:11px;}
.rankDivider{padding:10px 16px; font-size:11.5px; font-weight:900; color:var(--green); background:var(--green-pale); border-bottom:1px solid var(--border);}
.rankRow-plain .town{font-weight:500; color:var(--ink);}

/* ---------- Bottom nav ---------- */
#bottomNav{
  position:fixed; left:0; right:0; bottom:0; max-width:480px; margin:0 auto; background:#fff;
  border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-around;
  padding:8px 6px calc(8px + var(--safe-b)); z-index:50;
}
#bottomNav button{
  background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:3px;
  font-size:10.5px; color:var(--gray); font-weight:700; flex:1; padding:4px 0;
}
#bottomNav button .ic{font-size:19px;}
#bottomNav button.active{color:var(--green);}
#bottomNav button.centerBtn{
  margin-top:-26px; background:linear-gradient(160deg,#1f5c3a,#2f8a52); color:#fff; width:54px; height:54px;
  border-radius:50%; justify-content:center; box-shadow:0 6px 14px rgba(31,92,58,.35); flex:none;
}
#bottomNav button.centerBtn .ic{font-size:22px;}

.toast{
  position:fixed; left:50%; bottom:110px; transform:translateX(-50%); background:#2b2b26; color:#fff;
  padding:10px 18px; border-radius:999px; font-size:13px; z-index:300; opacity:0; pointer-events:none; transition:opacity .25s;
}
.toast.show{opacity:1;}
.hidden{display:none !important;}
</style>
</head>
<body>
<div id="appFrame">

  <!-- ================= LOGIN ================= -->
  <div id="loginScreen">
    <div>
      <div class="logo">まち<span>みっけ</span> 🔍</div>
      <div class="badge">伊勢市限定版</div>
    </div>
    <p class="tagline">歩いて、走って、見つけよう。<br>まちで見つけたものを写真で記録。<br>種類をえらんで、みんなの図鑑になります。</p>
    <div class="authBtns">
      <button class="btn btn-google" id="googleLoginBtn">
        <span>🔎</span> Googleでログイン
      </button>
      <button class="btn btn-apple" id="appleLoginBtn">
        <span>🍎</span> Appleでログイン
      </button>
      <button class="btn btn-guest" id="guestLoginBtn">ゲストで始める</button>
    </div>
  </div>

  <!-- ================= TOPBAR ================= -->
  <div class="topbar">
    <h1 id="topbarTitle">まちみっけ</h1>
    <button class="iconbtn" id="logoutBtn" title="ログアウト" aria-label="ログアウト">🚪</button>
  </div>

  <!-- ================= HOME ================= -->
  <section class="screen active" id="screen-home">
    <div class="home-hero">
      <div class="logo">まち<span>みっけ</span> 🔍</div>
      <div class="badge">伊勢市限定版</div>
      <p>歩いて、走って、見つけよう。<br>みんなでつくる、伊勢の図鑑。</p>
      <button class="discoverBtn" data-nav="discover">📷 発見する</button>
    </div>

    <div class="quicknav">
      <button data-nav="map"><span class="ic">🗺️</span>マップ</button>
      <button data-nav="ranking"><span class="ic">🏆</span>ランキング</button>
      <button data-nav="mypage"><span class="ic">👤</span>マイページ</button>
    </div>

    <div class="section-title">あなたの記録</div>
    <div class="statsRow">
      <div class="statCard"><div class="num" id="homeStatFinds">0</div><div class="lbl">発見数</div></div>
      <div class="statCard"><div class="num" id="homeStatSpecies">0</div><div class="lbl">図鑑登録数</div></div>
      <div class="statCard"><div class="num" id="homeStatDist">0<small style="font-size:11px;">km</small></div><div class="lbl">調査距離</div></div>
    </div>

    <div class="section-title">いろいろな図鑑</div>
    <div class="zukanGrid" id="zukanGrid"></div>
  </section>

  <!-- ================= 図鑑 (list) ================= -->
  <section class="screen" id="screen-zukan">
    <div class="section-title" style="margin-top:14px;">図鑑一覧</div>
    <div class="zukanGrid" id="zukanGrid2" style="margin-bottom:18px;"></div>
    <div class="section-title">最近の発見</div>
    <div id="recentList" style="margin:0 18px;"></div>
  </section>

  <!-- ================= 発見 (camera) ================= -->
  <section class="screen" id="screen-discover">
    <!-- STEP 1: 写真を撮る／アルバムから選ぶ -->
    <div id="captureStage">
      <div class="cameraStage">
        <div class="cameraBox">
          <div class="ic">📷</div>
          <p id="captureHint">見つけたものを撮影してください</p>
          <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
            <label class="btn btn-primary" style="display:inline-flex;" for="photoInputCamera">📷 写真を撮る</label>
            <label class="btn btn-outline" style="display:inline-flex;" for="photoInputAlbum">🖼️ アルバムから選択</label>
          </div>
          <input type="file" id="photoInputCamera" accept="image/*" capture="environment">
          <input type="file" id="photoInputAlbum" accept="image/*">
        </div>
      </div>
    </div>

    <!-- STEP 2: 地図で場所を確認・ピン打ち（現在地 or 手動） -->
    <div id="pinStage" class="hidden">
      <div class="previewCard">
        <img id="previewImg" src="" alt="撮影した写真">
        <div class="resultBox">
          <div style="font-size:12px; color:var(--gray); font-weight:700; margin-bottom:8px;">登録する場所を確認してください（ピンはドラッグで動かせます）</div>
          <div id="pinMap"></div>
          <div id="pinStatus" style="font-size:12px; color:var(--gray); margin:10px 0 14px;">現在地を取得中…</div>
          <div class="resultBtns">
            <button class="btn btn-outline" id="retryPinBtn">📍 現在地を取得し直す</button>
            <button class="btn btn-primary" id="toTypeBtn" disabled>この場所で確定する ›</button>
            <button class="btn btn-outline" id="retakeBtn">‹ 撮り直す</button>
          </div>
        </div>
      </div>
    </div>

    <!-- STEP 3: ゴミの種類を選んで登録 -->
    <div id="typeStage" class="hidden">
      <div class="section-title" style="margin-top:14px;">なにを見つけましたか？</div>
      <div class="typeGrid" id="typeGrid" style="margin:0 18px 18px;"></div>
      <div style="margin:0 18px;">
        <button class="btn btn-outline" id="backToPinBtn" style="width:100%;">‹ 場所を選び直す</button>
      </div>
    </div>
  </section>

  <!-- ================= 発見マップ ================= -->
  <section class="screen" id="screen-map">
    <div class="filterRow" id="mapFilterRow"></div>
    <div class="mapWrap">
      <div id="leafletMap"></div>
      <div class="mapTypeCtrl" id="mapTypeCtrl">
        <button data-type="normal" class="active">通常</button>
        <button data-type="gray">グレー</button>
        <button data-type="satellite">衛星</button>
      </div>
    </div>
    <div class="areaStats" id="areaStats"></div>
  </section>

  <!-- ================= マイページ ================= -->
  <section class="screen" id="screen-mypage">
    <div class="profileCard">
      <div class="avatar">🧑</div>
      <div>
        <div class="name" id="myName">伊勢の探検家</div>
        <div class="lv" id="myLevel">Lv.1 さんぽビギナー</div>
      </div>
    </div>
    <div class="mypageStats">
      <div class="statCard"><div class="num" id="myStatFinds">0</div><div class="lbl">発見数</div></div>
      <div class="statCard"><div class="num" id="myStatSpecies">0</div><div class="lbl">図鑑登録数</div></div>
      <div class="statCard"><div class="num" id="myStatDist">0<small style="font-size:11px;">km</small></div><div class="lbl">調査距離</div></div>
    </div>
    <div class="menuList">
      <button data-nav="zukan"><span class="left">📔 自分の記録</span><span>›</span></button>
      <button><span class="left">⭐ お気に入り</span><span>›</span></button>
      <button><span class="left">🏅 バッジコレクション</span><span class="badgeNum" id="badgeCount">0</span></button>
      <button><span class="left">🎯 ミッション</span><span>›</span></button>
      <button><span class="left">⚙️ 設定</span><span>›</span></button>
    </div>
  </section>

  <!-- ================= ランキング ================= -->
  <section class="screen" id="screen-ranking">
    <div class="section-title" style="margin-top:14px;">町別ランキング</div>

/* ---------------- Ranking data ----------------
   まだ誰も登録していないので、全町0件からの一斉スタート。
   { finds: {"町名": 件数, ...}, species: {...}, likes: {...} }
   実際の発見が登録され次第、Firestoreの集計結果でここを埋めるように差し替える。 */
const RANKING_DATA = { finds: {}, species: {}, likes: {} };

// 件数（降順）→ 同数の場合は町名の50音順、で並べたランキング配列を作る
function buildRankingList(type) {
  const counts = RANKING_DATA[type] || {};
  return TOWNS
    .map(t => ({ name: t.name, yomi: t.yomi, count: counts[t.name] || 0 }))
    .sort((a, b) => b.count - a.count || a.yomi.localeCompare(b.yomi, "ja"));
}

const screens = ["home", "zukan", "discover", "map", "mypage", "ranking"];
function showScreen(name) {
  screens.forEach(s => document.getElementById("screen-" + s).classList.toggle("active", s === name));
  document.querySelectorAll("#bottomNav button[data-nav]").forEach(b =>
    b.classList.toggle("active", b.dataset.nav === name)
  );
  document.getElementById("topbarTitle").textContent =
    name === "home" ? "まちみっけ" :
    name === "zukan" ? "図鑑" :
    name === "discover" ? "発見する" :
    name === "map" ? "発見マップ" :
    name === "mypage" ? "マイページ" : "町別ランキング";
  if (name === "map") {
    // 画面切り替えアニメーション（.18s）が終わってから初期化・再計算することで、
    // タイルの一部が読み込まれず消えて見えるバグを防ぐ
    setTimeout(() => {
      initMapIfNeeded();
      requestAnimationFrame(() => leafletMap && leafletMap.invalidateSize());
    }, 200);
  }
  if (name === "discover") resetCaptureStage();
}

/* ============================= Toast ============================= */
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 4000);
}

document.getElementById("googleLoginBtn").addEventListener("click", async () => {
  if (!auth) return toast("Firebase未設定です");
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch (e) { toast("エラー: " + (e.code || e.message)); console.error(e); }
});

  if (!auth) return toast("Firebase未設定です");
  try {
    const provider = new OAuthProvider("apple.com");
    provider.addScope("email");
    provider.addScope("name");
    await signInWithPopup(auth, provider);
  } catch (e) { toast("エラー: " + (e.code || e.message)); console.error(e); }
});

  if (!auth) return toast("Firebase未設定です");
  try { await signInAnonymously(auth); }
  catch (e) { toast("エラー: " + (e.code || e.message)); console.error(e); }
});

  if (!auth) { setLoggedIn(false); toast("ログアウトしました（デモ）"); return; }
  await signOut(auth);
});

function setLoggedIn(isIn) {
  document.getElementById("loginScreen").classList.toggle("hidden", isIn);
}

if (auth) {
  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    setLoggedIn(!!user);
    if (user) {
      await ensureUserProfile(user);
      loadUserStats(user);
    }
  });
} else {
  // No Firebase config yet — allow browsing the UI anyway.
  setLoggedIn(true);
}

async function ensureUserProfile(user) {
  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      displayName: user.displayName || "伊勢の探検家",
      finds: 0, species: 0, distanceKm: 0, badges: 0,
      createdAt: serverTimestamp(),
    });
  }
}

function loadUserStats(user) {
  const ref = doc(db, "users", user.uid);
  onSnapshot(ref, (snap) => {
    if (!snap.exists()) return;
    const d = snap.data();
    document.getElementById("myName").textContent = d.displayName || "伊勢の探検家";
    const lv = Math.max(1, Math.floor((d.finds || 0) / 20) + 1);
    document.getElementById("myLevel").textContent = `Lv.${lv} さんぽマスター`;
    ["homeStatFinds", "myStatFinds"].forEach(id => document.getElementById(id).textContent = d.finds || 0);
    ["homeStatSpecies", "myStatSpecies"].forEach(id => document.getElementById(id).textContent = d.species || 0);
    ["homeStatDist", "myStatDist"].forEach(id => document.getElementById(id).firstChild.textContent = (d.distanceKm || 0).toFixed(1));
    document.getElementById("badgeCount").textContent = d.badges || 0;
  });
}

let pendingPhotoDataUrl = null;

/* ---------------- 撮影 → 位置ピン確認 ---------------- */
/* Firestoreは1ドキュメントあたり最大1MBまでという制限があり、
   カメラで撮影したそのままの写真（数MB）を base64 で保存しようとすると
   登録に失敗する（バグの原因）。事前にリサイズ＆圧縮してから保存する。 */
function compressImage(file, maxDim = 1280, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width >= height) {
            height = Math.round(height * (maxDim / width));
            width = maxDim;
          } else {
            width = Math.round(width * (maxDim / height));
            height = maxDim;
          }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = () => reject(new Error("画像の読み込みに失敗しました"));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error("ファイルの読み込みに失敗しました"));
    reader.readAsDataURL(file);
  });
}

async function handlePhotoSelected(e) {
  const file = e.target.files[0];
  if (!file) return;
  try {
    pendingPhotoDataUrl = await compressImage(file);
  } catch (err) {
    console.error(err);
    toast("写真の読み込みに失敗しました。もう一度お試しください。");
    e.target.value = "";
    return;
  }
  document.getElementById("previewImg").src = pendingPhotoDataUrl;
  document.getElementById("captureStage").classList.add("hidden");
  document.getElementById("pinStage").classList.remove("hidden");
  document.getElementById("toTypeBtn").disabled = true;
  requestPinLocation();
}
document.getElementById("photoInputCamera").addEventListener("change", handlePhotoSelected);
document.getElementById("photoInputAlbum").addEventListener("change", handlePhotoSelected);

document.getElementById("retakeBtn").addEventListener("click", () => {
  pendingPhotoDataUrl = null;
  document.getElementById("pinStage").classList.add("hidden");
  document.getElementById("captureStage").classList.remove("hidden");
  document.getElementById("photoInputCamera").value = "";
  document.getElementById("photoInputAlbum").value = "";
});

let pinMap = null, pinMarker = null;
const DEFAULT_PIN_LATLNG = [34.4855, 136.7096]; // 伊勢市付近（GPSが取れない時の初期位置）

function initOrUpdatePinMap(lat, lng, draggable) {
  const target = [lat, lng];
  if (!pinMap) {
    pinMap = L.map("pinMap", { zoomControl: false }).setView(target, 17);
    L.tileLayer(TILE_DEFS.normal.url, TILE_DEFS.normal.options).addTo(pinMap);
    pinMarker = L.marker(target, { draggable: true }).addTo(pinMap);
    pinMarker.on("dragend", () => {
      const p = pinMarker.getLatLng();
      pendingLat = p.lat;
      pendingLng = p.lng;
      document.getElementById("pinStatus").textContent = "ピンの位置を手動で調整しました。この位置でよければ「この場所で確定する」を押してください。";
      document.getElementById("toTypeBtn").disabled = false;
    });
  } else {
    pinMap.setView(target, 17);
    pinMarker.setLatLng(target);
  }
  setTimeout(() => pinMap && pinMap.invalidateSize(), 150);
}

function requestPinLocation() {
  document.getElementById("toTypeBtn").disabled = true;
  document.getElementById("pinStatus").textContent = "現在地を取得中…";
  if (!navigator.geolocation) {
    initOrUpdatePinMap(...DEFAULT_PIN_LATLNG);
    pendingLat = DEFAULT_PIN_LATLNG[0];
    pendingLng = DEFAULT_PIN_LATLNG[1];
    document.getElementById("pinStatus").textContent = "現在地が取得できないため、ピンをドラッグして位置を指定してください。";
    document.getElementById("toTypeBtn").disabled = false;
    return;
  }
  navigator.geolocation.getCurrentPosition((pos) => {
    pendingLat = pos.coords.latitude;
    pendingLng = pos.coords.longitude;
    initOrUpdatePinMap(pendingLat, pendingLng);
    document.getElementById("pinStatus").textContent = "現在地を取得しました。ずれている場合はピンをドラッグして調整できます。";
    document.getElementById("toTypeBtn").disabled = false;
  }, () => {
    initOrUpdatePinMap(...DEFAULT_PIN_LATLNG);
    pendingLat = DEFAULT_PIN_LATLNG[0];
    pendingLng = DEFAULT_PIN_LATLNG[1];
    document.getElementById("pinStatus").textContent = "現在地を取得できませんでした。ピンをドラッグして位置を指定してください。";
    document.getElementById("toTypeBtn").disabled = false;
  }, { enableHighAccuracy: true, timeout: 6000 });
}
document.getElementById("retryPinBtn").addEventListener("click", requestPinLocation);

// 場所を確定 → ゴミの種類選択ステージへ進む（登録はまだ行わない）
document.getElementById("toTypeBtn").addEventListener("click", () => {
  if (pendingLat == null || pendingLng == null) return;
  document.getElementById("pinStage").classList.add("hidden");
  document.getElementById("typeStage").classList.remove("hidden");
  renderTypeGrid();
});

async function saveDiscovery(lat, lng) {
  try {
    await addDoc(collection(db, "discoveries"), {
      uid: currentUser.uid,
      category: pendingCategory,
      type: pendingSelection.id,
      name: pendingSelection.name,
      nameEn: pendingSelection.en,
      photo: pendingPhotoDataUrl, // NOTE: for production, upload to Firebase Storage instead of inline base64
      lat, lng,
      createdAt: serverTimestamp(),
    });
    await setDoc(doc(db, "users", currentUser.uid), {
      finds: increment(1), species: increment(1),
    }, { merge: true });
    toast("この内容で登録しました！");
    resetCaptureStage();
    showScreen("home");
  } catch (e) {
    console.error(e);
    // 失敗時は写真・位置・選択内容を保持したままにして、種類をもう一度タップすれば再登録できるようにする
    toast("登録に失敗しました。もう一度お試しください。");
  }
}

/* ============================= Map ============================= */
let leafletMap = null;
let mapInitDone = false;
let activeFilter = "all";

/* 「すべて」＋ゴミの種類ごとのフィルター。横一列・横スクロールで並べる（.filterRow が overflow-x:auto）。 */
const MAP_FILTERS = [
  { id: "all", label: "すべて" },
  ...TRASH_TYPES.map(t => ({ id: t.id, label: t.name, emoji: t.emoji })),
];
const filterRow = document.getElementById("mapFilterRow");
MAP_FILTERS.forEach(f => {
  const b = document.createElement("button");
  b.className = "filterChip" + (f.id === "all" ? " active" : "");
  b.textContent = f.id === "all" ? f.label : `${f.emoji} ${f.label}`;
  b.addEventListener("click", () => {
    activeFilter = f.id;
    filterRow.querySelectorAll(".filterChip").forEach(c => c.classList.remove("active"));
    b.classList.add("active");
    renderMarkers();
  });
  filterRow.appendChild(b);
});

let discoveryMarkersLayer = null;
let allDiscoveries = [];

/* ---------------- 地図の種類（通常／グレー／衛星） ----------------
   ログインし直したり画面を更新したりしても、必ず「通常」から起動する
   （選択状態は保存しない仕様）。 */
const TILE_DEFS = {
  normal: {
    url: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    options: { attribution: "&copy; OpenStreetMap contributors", maxZoom: 19 },
  },
  gray: {
    url: "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
    options: { attribution: "&copy; OpenStreetMap contributors &copy; CARTO", subdomains: "abcd", maxZoom: 19 },
  },
  satellite: {
    url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
    options: { attribution: "Tiles &copy; Esri", maxZoom: 19 },
  },
};
let currentTileLayer = null;
let activeMapType = "normal";

function setMapType(type) {
  if (!leafletMap || !TILE_DEFS[type]) return;
  activeMapType = type;
  if (currentTileLayer) leafletMap.removeLayer(currentTileLayer);
  const def = TILE_DEFS[type];
  currentTileLayer = L.tileLayer(def.url, def.options).addTo(leafletMap);
  document.querySelectorAll("#mapTypeCtrl button").forEach(b =>
    b.classList.toggle("active", b.dataset.type === type)
  );
}
document.querySelectorAll("#mapTypeCtrl button").forEach(b =>
  b.addEventListener("click", () => setMapType(b.dataset.type))
);

function initMapIfNeeded() {
  if (mapInitDone) { leafletMap.invalidateSize(); return; }
  mapInitDone = true;

  // Default center: Ise Shrine area, Mie, Japan
  leafletMap = L.map("leafletMap", { zoomControl: false }).setView([34.4855, 136.7096], 14);
  setMapType("normal"); // 起動時は必ず通常マップ
  discoveryMarkersLayer = L.layerGroup().addTo(leafletMap);

  // ---- スマホで地図の一部が表示されない（グレーの空白ができる）バグ対策 ----
  // コンテナのサイズが変わるたびに描画サイズを再計算する
  const mapEl = document.getElementById("leafletMap");
  if (window.ResizeObserver) {
    new ResizeObserver(() => leafletMap.invalidateSize()).observe(mapEl);
  }
  window.addEventListener("resize", () => leafletMap.invalidateSize());
  window.addEventListener("orientationchange", () => setTimeout(() => leafletMap.invalidateSize(), 300));
  // 初回表示直後にタイルが崩れることがあるため、少し時間を置いてもう一度補正
  setTimeout(() => leafletMap.invalidateSize(), 300);

  navigator.geolocation?.getCurrentPosition((pos) => {
    leafletMap.setView([pos.coords.latitude, pos.coords.longitude], 15);
    L.circleMarker([pos.coords.latitude, pos.coords.longitude], {
      radius: 8, color: "#4a90d9", fillColor: "#4a90d9", fillOpacity: .6,
    }).addTo(leafletMap).bindPopup("現在地");
  });

  if (db) {
    const q = query(collection(db, "discoveries"), orderBy("createdAt", "desc"), limit(200));
    onSnapshot(q, (snap) => {
      allDiscoveries = [];
      snap.forEach(d => { const v = d.data(); if (v.lat && v.lng) allDiscoveries.push(v); });
      renderMarkers();
      updateAreaStats();
    });
  } else {
    renderAreaStatsPlaceholder();
  }
}

function renderMarkers() {
  if (!discoveryMarkersLayer) return;
  discoveryMarkersLayer.clearLayers();
  const list = activeFilter === "all" ? allDiscoveries : allDiscoveries.filter(d => (d.type || "other") === activeFilter);
  list.forEach(d => {
    const t = TRASH_TYPES.find(x => x.id === d.type) || TRASH_TYPES[TRASH_TYPES.length - 1];
    const cat = CATEGORIES.find(c => c.id === d.category) || CATEGORIES[CATEGORIES.length - 1];
    const icon = L.divIcon({
      className: "trashPinIcon",
      html: `<div class="trashPinInner" style="background:${cat.color};">${t.emoji}</div>`,
      iconSize: [30, 30],
      iconAnchor: [15, 15],
      popupAnchor: [0, -16],
    });
    L.marker([d.lat, d.lng], { icon })
      .addTo(discoveryMarkersLayer)
      .bindPopup(`<b>${t.emoji} ${d.name || t.name}</b>`);
  });
}

function updateAreaStats() {
  const counts = { poi: 0, umigomi: 0, other: 0 };
  allDiscoveries.forEach(d => {
    if (d.category === "poi") counts.poi++;
    else if (d.category === "umigomi") counts.umigomi++;
    else counts.other++;
  });
  const el = document.getElementById("areaStats");
  el.innerHTML = `
    <div class="cell"><div class="n">${counts.poi}</div><div class="l">ポイ捨て</div></div>
    <div class="cell"><div class="n">${counts.umigomi}</div><div class="l">海ごみ</div></div>
    <div class="cell"><div class="n">${counts.other}</div><div class="l">その他</div></div>`;
}
function renderAreaStatsPlaceholder() {
  document.getElementById("areaStats").innerHTML = `
    <div class="cell"><div class="n">128</div><div class="l">ポイ捨て</div></div>
    <div class="cell"><div class="n">64</div><div class="l">海ごみ</div></div>
    <div class="cell"><div class="n">31</div><div class="l">その他</div></div>`;
}

/* ============================= Ranking ============================= */
let rankType = "finds", rankPeriod = "month";
const RANK_CUTOFF = 30; // 30位まで順位表示。31位以降は50音順でリスト
function renderRanking() {
  const el = document.getElementById("rankList");
  const list = buildRankingList(rankType);
  const medals = ["🥇", "🥈", "🥉"];
  let html = "";
  list.forEach((item, i) => {
    if (i === RANK_CUTOFF) {
      html += `<div class="rankDivider">${RANK_CUTOFF + 1}位以降（50音順）</div>`;
    }
    if (i < RANK_CUTOFF) {
      html += `
        <div class="rankRow ${i === 0 ? "top1" : i === 1 ? "top2" : i === 2 ? "top3" : ""}">
          <div class="medal">${medals[i] || i + 1}</div>
          <div class="town">${item.name}</div>
          <div class="count">${item.count}<small>件</small></div>
        </div>`;
    } else {
      html += `
        <div class="rankRow rankRow-plain">
          <div class="medal"></div>
          <div class="town">${item.name}</div>
          <div class="count">${item.count}<small>件</small></div>
        </div>`;
    }
  });
  el.innerHTML = html;
}
document.querySelectorAll(".rankTabs button").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll(".rankTabs button").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  rankType = b.dataset.rank;
  renderRanking();
}));
document.querySelectorAll(".periodTabs button").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll(".periodTabs button").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  rankPeriod = b.dataset.period; // NOTE: mock data doesn't vary by period yet — wire to Firestore query when ready
  renderRanking();
}));
renderRanking();
