<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本史・魂の鏡診断</title>
    <style>
        body { font-family: "Yu Mincho", serif; background-color: #f5f0e6; color: #4a4238; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: #ffffff; border: 1px solid #d4c0a5; padding: 30px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #5d4a3f; font-size: 1.4rem; border-bottom: 2px solid #b6a084; padding-bottom: 10px; }
        .question { font-size: 1.2rem; margin: 30px 0; }
        button { display: block; width: 100%; padding: 15px; margin: 10px 0; font-size: 1.1rem; cursor: pointer; background: #6b7a66; color: #fffdf5; border: none; border-radius: 5px; }
        #result { display: none; }
        .name { font-size: 1.8rem; color: #5d4a3f; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div id="q-area">
            <h1>日本史・魂の鏡診断</h1>
            <p class="question" id="q-text">準備中です...</p>
            <button onclick="answer(1)">はい</button>
            <button onclick="answer(0)">いいえ</button>
        </div>
        <div id="result">
            <h1>診断結果</h1>
            <div class="name" id="char-name"></div>
            <p id="advice"></p>
            <button onclick="location.reload()">最初からやり直す</button>
        </div>
    </div>

    <script>
        const questions = [
            "Q1. 計画より直感で動く方ですか？", "Q2. 社会変革に関心がある？", 
            "Q3. 大勢をまとめたいですか？", "Q4. 時代の中心が好きですか？",
            "Q5. 困難は感情で突破する？", "Q6. 権力や成功が大事？", 
            "Q7. 未来志向ですか？", "Q8. チームプレイ派ですか？", 
            "Q9. 新しい手法が好きですか？", "Q10. 人のためなら頑張れる？"
        ];

        // 50人の詳細データ
        const characterData = [
            {name: "織田信長", advice: "破壊と創造の革命児。既存の枠組みを壊し、新しい未来を切り拓く力があります。"},
            {name: "豊臣秀吉", advice: "知恵と情熱で成り上がった戦略家。人たらしの愛嬌と柔軟な発想が武器です。"},
            {name: "徳川家康", advice: "忍耐と大局観。時を待つ強さが、確実な平和を築き上げます。"},
            {name: "坂本龍馬", advice: "自由な魂と広い視野。時代の奔流を乗りこなし、新たな循環の橋渡しをします。"},
            {name: "南方熊楠", advice: "孤高の探究者。誰にも真似できない独自の視点で、真理を追い求めてください。"},
            {name: "良寛", advice: "無欲と慈悲の象徴。ありのままの心で、人々に安らぎを与える存在です。"},
            {name: "千利休", advice: "美の極致を追求する求道者。日常の小さな動作に、神聖な意味を見出す力があります。"},
            {name: "与謝野晶子", advice: "情熱的な自己表現者。自分の心に正直に、愛と自由を叫び続けてください。"},
            {name: "聖徳太子", advice: "調和の体現者。全体を俯瞰し、異なる意見を一つにまとめる調停役です。"},
            {name: "空海", advice: "深遠なる智慧の継承者。未知なるものに飛び込み、真理を解き明かす冒険家です。"},
            // ... ここに50人分を記述します（以下、同様に順次追加）
            {name: "北条政子", advice: "意志の強さと守る力。大切なもののためなら、どんな困難にも立ち向かう覚悟があります。"},
            {name: "紫式部", advice: "鋭い観察眼と豊かな感性。見えない心の機微を言葉にする才能に溢れています。"},
            {name: "渋沢栄一", advice: "道徳と経済の両立を掲げる先駆者。あなたの行動は、社会の新しい循環を生みます。"},
            {name: "平塚らいてう", advice: "自立と解放の旗手。既存の価値観に挑み、新たな女性像を切り拓く力があります。"}
            // ※残りの36名分も同様に構造化して追加可能です
        ];

        let currentQ = 0, score = "";
        document.getElementById('q-text').innerText = questions[0];

        function answer(val) {
            score += val;
            currentQ++;
            if (currentQ < questions.length) {
                document.getElementById('q-text').innerText = questions[currentQ];
            } else {
                // 回答コードをインデックスに変換（50で割った余りで判定）
                const index = parseInt(score, 2) % characterData.length;
                const res = characterData[index] || characterData[0];
                document.getElementById('q-area').style.display = 'none';
                document.getElementById('result').style.display = 'block';
                document.getElementById('char-name').innerText = "あなたは「" + res.name + "」タイプです";
                document.getElementById('advice').innerText = res.advice;
            }
        }
    </script>
</body>
</html>
