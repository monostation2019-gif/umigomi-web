<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理者ページ — 海ゴミ探究ノート</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --navy:#0A1628; --navy2:#112240; --navy3:#1a2f52;
  --teal:#0EA5A0; --teal2:#14B8B3;
  --amber:#F59E0B; --green:#10B981; --red:#EF4444; --blue:#3B82F6;
  --white:#F0F8FF; --gray:#8BA3BC;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,'Noto Sans JP',sans-serif;
  background:var(--navy);color:var(--white);min-height:100vh;
}

/* ===== ログイン ===== */
#loginScreen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
}
.login-box{
  background:var(--navy2);border-radius:20px;padding:36px 28px;
  width:100%;max-width:400px;
  border:1px solid rgba(14,165,160,.35);
  box-shadow:0 24px 64px rgba(0,0,0,.5);
}
.login-logo{font-size:42px;text-align:center;margin-bottom:6px;}
.login-title{font-size:20px;font-weight:700;text-align:center;color:var(--teal);letter-spacing:1px;margin-bottom:3px;}
.login-sub{font-size:11px;color:var(--gray);text-align:center;margin-bottom:28px;}
.lbl{font-size:11px;color:var(--gray);margin-bottom:5px;}
.linput{
  width:100%;background:var(--navy3);
  border:1px solid rgba(255,255,255,.12);border-radius:10px;
  color:var(--white);font-size:15px;padding:12px 14px;
  margin-bottom:14px;outline:none;
}
.linput:focus{border-color:var(--teal);}
.login-btn{
  width:100%;background:linear-gradient(135deg,var(--teal),#0891B2);
  color:var(--navy);border:none;border-radius:10px;
  padding:14px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;
}
.login-btn:active{opacity:.9;}
.login-err{
  display:none;margin-top:12px;font-size:12px;
  color:var(--red);text-align:center;
  background:rgba(239,68,68,.1);border-radius:8px;padding:9px;
}

/* ===== 管理画面 ===== */
#adminScreen{display:none;}

header{
  background:var(--navy2);border-bottom:2px solid var(--teal);
  padding:8px 12px;display:flex;align-items:center;
  justify-content:space-between;
  position:sticky;top:0;z-index:200;
  gap:8px;
}
.hdr-title{font-size:14px;font-weight:700;color:var(--teal);letter-spacing:.5px;white-space:nowrap;}
.hdr-sub{font-size:9px;color:var(--gray);margin-top:1px;}
.hdr-left{flex-shrink:0;min-width:0;}
.hdr-right{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.logout-btn{
  background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);
  color:var(--red);border-radius:8px;
  padding:6px 10px;font-size:11px;font-weight:700;
  cursor:pointer;font-family:inherit;white-space:nowrap;
}
.map-btn{
  background:rgba(26,122,138,.18);border:1px solid rgba(47,184,172,.4);
  color:#2fb8ac;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;
  cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px;
  font-family:inherit;white-space:nowrap;
}

.main{padding:16px;max-width:860px;margin:0 auto;}

/* 統計 */
.stats-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.stat-box{
  flex:1;min-width:90px;
  background:var(--navy2);border-radius:12px;
  padding:12px;border:1px solid rgba(255,255,255,.07);
  text-align:center;
}
.stat-n{font-size:26px;font-weight:700;line-height:1;font-family:'Oswald',monospace;}
.stat-n.tl{color:var(--teal);}
.stat-n.rd{color:var(--red);}
.stat-n.am{color:var(--amber);}
.stat-n.gr{color:var(--green);}
.stat-l{font-size:10px;color:var(--gray);margin-top:3px;}

/* フィルター */
.filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.f-btn{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
  border-radius:20px;color:var(--gray);
  font-size:11px;padding:6px 14px;cursor:pointer;font-family:inherit;transition:all .15s;
}
.f-btn.on{background:rgba(14,165,160,.2);border-color:var(--teal);color:var(--teal);}
.refresh-btn{
  margin-left:auto;
  background:rgba(14,165,160,.15);border:1px solid rgba(14,165,160,.3);
  border-radius:8px;color:var(--teal);
  font-size:11px;padding:6px 12px;cursor:pointer;font-family:inherit;
}

/* カード */
.fb-list{display:flex;flex-direction:column;gap:12px;}
.fb-card{
  background:var(--navy2);border-radius:14px;
  border:1px solid rgba(255,255,255,.07);
  border-left:4px solid var(--gray);
  overflow:hidden;
}
.fb-card.unread{border-left-color:var(--teal);}
.fb-card.type-request{border-left-color:var(--teal);}
.fb-card.type-report{border-left-color:var(--red);}
.fb-card.type-message{border-left-color:var(--amber);}
.fb-card.type-other{border-left-color:var(--gray);}
.fb-card.unread.type-report{border-left-color:var(--red);}
.fb-card.unread.type-message{border-left-color:var(--amber);}

/* カードヘッダー */
.fb-head{
  display:flex;align-items:flex-start;
  justify-content:space-between;gap:10px;
  padding:13px 15px 8px;
}
.fb-badges{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.type-badge{
  font-size:11px;font-weight:700;padding:3px 10px;
  border-radius:20px;
}
.tb-request{background:rgba(14,165,160,.15);color:var(--teal);border:1px solid rgba(14,165,160,.35);}
.tb-report{background:rgba(239,68,68,.13);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.tb-message{background:rgba(245,158,11,.13);color:var(--amber);border:1px solid rgba(245,158,11,.3);}
.tb-other{background:rgba(139,163,188,.12);color:var(--gray);border:1px solid rgba(139,163,188,.25);}
.unread-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--teal);flex-shrink:0;margin-top:2px;
}
.fb-act-row{display:flex;gap:6px;flex-shrink:0;}
.btn-read{
  background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);
  color:var(--green);border-radius:6px;
  padding:5px 10px;font-size:10px;font-weight:700;
  cursor:pointer;font-family:inherit;white-space:nowrap;
}
.btn-del{
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);
  color:var(--red);border-radius:6px;
  padding:5px 10px;font-size:10px;font-weight:700;
  cursor:pointer;font-family:inherit;
}

/* 送信者情報 */
.sender-bar{
  display:flex;align-items:center;gap:10px;
  padding:7px 15px;
  background:rgba(0,0,0,.18);
  border-top:1px solid rgba(255,255,255,.05);
  border-bottom:1px solid rgba(255,255,255,.05);
}
.sender-avatar{
  width:34px;height:34px;border-radius:50%;
  background:var(--navy3);display:flex;align-items:center;
  justify-content:center;font-size:16px;
  border:2px solid rgba(14,165,160,.35);flex-shrink:0;overflow:hidden;
}
.sender-avatar img{width:100%;height:100%;object-fit:cover;}
.sender-info{flex:1;min-width:0;}
.sender-name{font-size:13px;font-weight:700;}
.sender-uid{font-size:9px;color:var(--teal);font-family:monospace;letter-spacing:.5px;}
.sender-date{font-size:9px;color:var(--gray);}

/* 本文 */
.fb-body-wrap{padding:10px 15px;}
.fb-body{
  font-size:13px;line-height:1.75;color:var(--white);
  background:rgba(0,0,0,.2);border-radius:8px;
  padding:10px 13px;white-space:pre-wrap;word-break:break-all;
}

/* 返信エリア */
.reply-section{
  padding:10px 15px 14px;
  border-top:1px solid rgba(255,255,255,.05);
}
.reply-history{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.reply-bubble{
  background:rgba(14,165,160,.1);border:1px solid rgba(14,165,160,.2);
  border-radius:10px;padding:10px 13px;
}
.reply-bubble-head{
  display:flex;justify-content:space-between;
  font-size:10px;color:var(--teal);margin-bottom:5px;
}
.reply-bubble.auto{
  background:rgba(59,130,246,.08);border-color:rgba(59,130,246,.2);
}
.reply-bubble.auto .reply-bubble-head{color:#60a5fa;}
.reply-text{font-size:12px;line-height:1.7;white-space:pre-wrap;word-break:break-all;}
.reply-form{display:flex;flex-direction:column;gap:7px;}
.reply-ttl{font-size:10px;color:var(--teal);font-weight:700;letter-spacing:.5px;}
.reply-textarea{
  width:100%;background:var(--navy3);
  border:1px solid rgba(255,255,255,.12);border-radius:8px;
  color:var(--white);font-family:inherit;font-size:13px;
  padding:9px 11px;resize:none;outline:none;
}
.reply-textarea:focus{border-color:var(--teal);}
.btn-send-reply{
  align-self:flex-end;
  background:linear-gradient(135deg,var(--teal),#0891B2);
  color:var(--navy);border:none;border-radius:8px;
  padding:9px 18px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;letter-spacing:.5px;
}
.btn-send-reply:active{opacity:.9;}
.reply-sent-msg{
  display:none;font-size:11px;color:var(--green);
  background:rgba(16,185,129,.1);border-radius:6px;
  padding:6px 10px;text-align:center;
}

/* ローディング / 空 */
.loading{text-align:center;padding:50px;color:var(--teal);font-size:13px;}
.empty-msg{text-align:center;padding:60px 20px;color:var(--gray);font-size:13px;}
.empty-msg .big{font-size:42px;display:block;margin-bottom:10px;}
</style>
</head>
<body>

<!-- ===== ログイン ===== -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🌊</div>
    <div class="login-title">管理者ページ</div>
    <div class="login-sub">海ゴミ探究ノート — Admin</div>
    <div class="lbl">管理者パスワード</div>
    <input id="loginPass" class="linput" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">🔑 ログイン</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ===== 管理画面 ===== -->
<div id="adminScreen">
  <header>
    <div class="hdr-left">
      <div class="hdr-title">🛠️ 管理者ページ</div>
      <div class="hdr-sub" id="adminEmail">—</div>
    </div>
    <div class="hdr-right">
      <a href="poisute-map-ise.html" target="_blank" class="map-btn">🗺️ ポイ捨てマップ</a>
      <button class="logout-btn" onclick="doLogout()">🔒 ロック</button>
    </div>
  </header>

  <div class="main">

    <!-- 統計 -->
    <div class="stats-row">
      <div class="stat-box"><div class="stat-n tl" id="statTotal">–</div><div class="stat-l">合計</div></div>
      <div class="stat-box"><div class="stat-n rd"  id="statUnread">–</div><div class="stat-l">未読</div></div>
      <div class="stat-box"><div class="stat-n tl"  id="statReq">–</div><div class="stat-l">ご要望</div></div>
      <div class="stat-box"><div class="stat-n rd"  id="statRep">–</div><div class="stat-l">報告</div></div>
      <div class="stat-box"><div class="stat-n am"  id="statMsg">–</div><div class="stat-l">メッセージ</div></div>
      <div class="stat-box"><div class="stat-n gr"  id="statOth">–</div><div class="stat-l">その他</div></div>
    </div>
    <!-- ポイ捨てマップ更新状況 -->
    <div id="poisuteUpdateBar" style="
      display:none;background:rgba(26,122,138,.1);border:1px solid rgba(47,184,172,.25);
      border-radius:10px;padding:8px 14px;margin-bottom:12px;
      display:flex;align-items:center;gap:8px;font-size:11px;
    ">
      <span style="font-size:16px;">🗺️</span>
      <div>
        <span style="color:var(--teal);font-weight:700;">ポイ捨てマップ 伊勢版</span>
        <span style="color:var(--gray);margin-left:8px;">最終更新: </span>
        <span id="poisuteLastUpdated" style="color:var(--white);">—</span>
      </div>
      <a href="poisute-map-ise.html" target="_blank" style="margin-left:auto;color:var(--teal);font-size:11px;text-decoration:none;">開く →</a>
    </div>

    <!-- フィルター -->
    <div class="filter-bar">
      <button class="f-btn on" onclick="setFilter('all',this)">📋 すべて</button>
      <button class="f-btn"    onclick="setFilter('unread',this)">🔵 未読</button>
      <button class="f-btn"    onclick="setFilter('request',this)">💡 ご要望</button>
      <button class="f-btn"    onclick="setFilter('report',this)">📋 報告</button>
      <button class="f-btn"    onclick="setFilter('message',this)">💌 メッセージ</button>
      <button class="f-btn"    onclick="setFilter('other',this)">💬 その他</button>
      <button class="refresh-btn" onclick="loadFeedbacks()">🔄 更新</button>
    </div>

    <!-- リスト -->
    <div class="fb-list" id="fbList">
      <div class="loading">読み込み中...</div>
    </div>
  </div>
</div>

<script>
// ============================================================
// ★ Firebase設定
// ============================================================
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAEVbHOo9qiVvGnqyobu9mhEUfJINUF_iY",
  authDomain:        "umigomi-note.firebaseapp.com",
  projectId:         "umigomi-note",
  storageBucket:     "umigomi-note.firebasestorage.app",
  messagingSenderId: "693984572640",
  appId:             "1:693984572640:web:55b6be5cb8f453ca230c85"
};

// ============================================================
// ★ パスワード認証（Firebase Auth不使用 — Firestoreのみ）
// ============================================================
// パスワードを変更したい場合：
//   ブラウザのコンソールで以下を実行してハッシュを取得してください：
//   const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode('新しいパスワード'));
//   console.log([...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join(''));
// 取得したハッシュ文字列を ADMIN_PASS_HASH に貼り付けてください。
// 現在のパスワード: umiadmin2025
const ADMIN_PASS_HASH = 'f604b4c96d23319e76a29b1a3bc00b8f651603ec1ab25055c7c5ec4374e7d092';

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();
// ※ admin.htmlはFirebase Authを使わず直接Firestoreにアクセスします
// Firestoreセキュリティルールでfeedbacks/notificationsをallow read,write: if true に設定してください

let allFeedbacks = [];
let currentFilter = 'all';

// セッション管理（sessionStorageのみ — localStorageはUMIアプリと分離）
function isLoggedIn() {
  return sessionStorage.getItem('umi_admin_ok') === '1';
}
function setLoggedIn(v) {
  if (v) sessionStorage.setItem('umi_admin_ok', '1');
  else sessionStorage.removeItem('umi_admin_ok');
}

// 起動時チェック
(function init() {
  if (isLoggedIn()) {
    showAdmin();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminScreen').style.display = 'none';
  }
})();

async function doLogin() {
  const pass = document.getElementById('loginPass').value;
  if (!pass) { showLoginErr('パスワードを入力してください'); return; }
  try {
    const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pass));
    const hash = [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
    if (hash === ADMIN_PASS_HASH) {
      setLoggedIn(true);
      showAdmin();
    } else {
      showLoginErr('パスワードが違います');
    }
  } catch(e) {
    showLoginErr('エラー: ' + e.message);
  }
}

function showAdmin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'block';
  loadFeedbacks();
  showPoisuteUpdate();
}

function doLogout() {
  setLoggedIn(false);
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminScreen').style.display = 'none';
  document.getElementById('loginPass').value = '';
}

function showLoginErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg; el.style.display = 'block';
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ===== フィードバック読み込み =====
// ポイ捨てマップの最終更新日を表示
function showPoisuteUpdate() {
  const ts = localStorage.getItem('poisuteIse_lastUpdated');
  const bar = document.getElementById('poisuteUpdateBar');
  const el = document.getElementById('poisuteLastUpdated');
  if (ts && bar && el) {
    const d = new Date(ts);
    el.textContent = d.toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    bar.style.display = 'flex';
  }
  // 記録件数も表示
  try {
    const recs = JSON.parse(localStorage.getItem('poisuteIse_v1') || '[]');
    if (recs.length > 0 && el) {
      el.textContent += '　（' + recs.length + '件登録済み）';
    }
  } catch(e) {}
}

async function loadFeedbacks() {
  document.getElementById('fbList').innerHTML = '<div class="loading">読み込み中...</div>';
  try {
    const snap = await db.collection('feedbacks')
      .orderBy('createdAt','desc').get();
    allFeedbacks = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    updateStats();
    renderList();
  } catch(e) {
    document.getElementById('fbList').innerHTML =
      `<div class="empty-msg">❌ 読み込みエラー: ${e.message}<br><small>Firestoreのセキュリティルールを確認してください</small></div>`;
  }
}

function updateStats() {
  document.getElementById('statTotal').textContent  = allFeedbacks.length;
  document.getElementById('statUnread').textContent = allFeedbacks.filter(f=>!f.read).length;
  document.getElementById('statReq').textContent    = allFeedbacks.filter(f=>f.type==='request').length;
  document.getElementById('statRep').textContent    = allFeedbacks.filter(f=>f.type==='report').length;
  document.getElementById('statMsg').textContent    = allFeedbacks.filter(f=>f.type==='message').length;
  document.getElementById('statOth').textContent    = allFeedbacks.filter(f=>f.type==='other').length;
}

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderList();
}

// ===== 描画 =====
const TYPE_INFO = {
  request: { label:'💡 ご要望',    cls:'tb-request' },
  report:  { label:'📋 報告',      cls:'tb-report'  },
  message: { label:'💌 メッセージ', cls:'tb-message' },
  other:   { label:'💬 その他',    cls:'tb-other'   },
};

function renderList(){
  let items = allFeedbacks;
  if (currentFilter==='unread')  items = items.filter(f=>!f.read);
  else if (currentFilter!=='all') items = items.filter(f=>f.type===currentFilter);

  if (!items.length){
    document.getElementById('fbList').innerHTML =
      '<div class="empty-msg"><span class="big">📭</span>該当するメッセージはありません</div>';
    return;
  }

  document.getElementById('fbList').innerHTML = items.map(fb => buildCard(fb)).join('');
}

function buildCard(fb){
  const info     = TYPE_INFO[fb.type] || TYPE_INFO.other;
  const unread   = !fb.read ? 'unread' : '';
  const typeClass= 'type-' + (fb.type||'other');
  const date     = fb.createdAt
    ? new Date(fb.createdAt.seconds*1000).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
    : '日時不明';

  // アバター（Firestoreのprofilesコレクションから読んでいる場合はプロフィール画像は別途取得が必要なため、イニシャルで代替）
  const initial = (fb.userName||'?').charAt(0).toUpperCase();

  // 返信履歴HTML
  const repliesHtml = (fb.replies||[]).map(r => `
    <div class="reply-bubble ${r.isAutoReply?'auto':''}">
      <div class="reply-bubble-head">
        <span>${r.isAutoReply ? '🤖 自動返信' : '👤 管理者'}</span>
        <span>${r.sentAt ? new Date(r.sentAt.seconds*1000).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : ''}</span>
      </div>
      <div class="reply-text">${escHtml(r.message)}</div>
    </div>`).join('');

  return `
<div class="fb-card ${unread} ${typeClass}" id="card-${fb.id}">

  <!-- ヘッダー -->
  <div class="fb-head">
    <div class="fb-badges">
      ${!fb.read ? '<div class="unread-dot"></div>' : ''}
      <span class="type-badge ${info.cls}">${info.label}</span>
    </div>
    <div class="fb-act-row">
      ${!fb.read
        ? `<button class="btn-read" onclick="markRead('${fb.id}')">✅ 既読</button>`
        : '<span style="font-size:9px;color:var(--gray)">既読済み</span>'}
      <button class="btn-del" onclick="deleteFb('${fb.id}')">🗑️</button>
    </div>
  </div>

  <!-- 送信者情報 -->
  <div class="sender-bar">
    <div class="sender-avatar">${initial}</div>
    <div class="sender-info">
      <div class="sender-name">${escHtml(fb.userName||'名前未設定')}</div>
      <div class="sender-uid">UID: ${(fb.uid||'').slice(0,12)}…</div>
    </div>
    <div class="sender-date">🕐 ${date}</div>
  </div>

  <!-- 本文 -->
  <div class="fb-body-wrap">
    <div class="fb-body">${escHtml(fb.body)}</div>
  </div>

  <!-- 返信エリア -->
  <div class="reply-section">
    ${(fb.replies && fb.replies.length)
      ? `<div class="reply-history" id="rh-${fb.id}">${repliesHtml}</div>`
      : `<div class="reply-history" id="rh-${fb.id}"></div>`}
    <div class="reply-form">
      <div class="reply-ttl">↩️ 返信を送る</div>
      <textarea class="reply-textarea" id="rt-${fb.id}" rows="3" placeholder="${escHtml(fb.userName||'ユーザー')}さんへの返信を入力..."></textarea>
      <button class="btn-send-reply" onclick="sendReply('${fb.id}','${escHtml(fb.uid||'')}','${escHtml(fb.userName||'')}')">
        📨 送信する
      </button>
      <div class="reply-sent-msg" id="rs-${fb.id}">✅ 返信を送信しました！</div>
    </div>
  </div>

</div>`;
}

// ===== 返信送信 =====
async function sendReply(fbId, toUid, toName){
  const ta  = document.getElementById('rt-' + fbId);
  const msg = ta ? ta.value.trim() : '';
  if (!msg) { alert('返信内容を入力してください'); return; }

  const btn = document.querySelector(`#card-${fbId} .btn-send-reply`);
  if (btn) btn.disabled = true;

  try {
    const now = firebase.firestore.FieldValue.serverTimestamp();

    // feedbacksドキュメントのreplies配列に追記
    const replyObj = {
      message:     msg,
      sentAt:      new Date(),   // サーバータイム非対応のためDate
      isAutoReply: false
    };
    await db.collection('feedbacks').doc(fbId).update({
      replied: true,
      replies: firebase.firestore.FieldValue.arrayUnion(replyObj)
    });

    // notificationsコレクションにユーザー向け通知を追加
    await db.collection('notifications').add({
      toUid:       toUid,
      toName:      toName,
      fbId:        fbId,
      message:     msg,
      from:        '管理者',
      isAutoReply: false,
      createdAt:   now,
      read:        false
    });

    // UI更新
    const histEl = document.getElementById('rh-' + fbId);
    if (histEl){
      const div = document.createElement('div');
      div.className = 'reply-bubble';
      div.innerHTML = `
        <div class="reply-bubble-head">
          <span>👤 管理者</span>
          <span>たった今</span>
        </div>
        <div class="reply-text">${escHtml(msg)}</div>`;
      histEl.appendChild(div);
    }

    const sentMsg = document.getElementById('rs-' + fbId);
    if (sentMsg){ sentMsg.style.display='block'; setTimeout(()=>sentMsg.style.display='none', 3000); }
    if (ta) ta.value = '';

    // ローカルのreplies配列も更新
    const idx = allFeedbacks.findIndex(f=>f.id===fbId);
    if (idx!==-1){
      if (!allFeedbacks[idx].replies) allFeedbacks[idx].replies = [];
      allFeedbacks[idx].replies.push({ message:msg, sentAt:null, isAutoReply:false });
      allFeedbacks[idx].replied = true;
    }
  } catch(e){
    alert('送信エラー: ' + e.message);
  } finally {
    if (btn) btn.disabled = false;
  }
}

// ===== 既読 / 削除 =====
async function markRead(id){
  try {
    await db.collection('feedbacks').doc(id).update({ read:true });
    const idx = allFeedbacks.findIndex(f=>f.id===id);
    if (idx!==-1) allFeedbacks[idx].read = true;
    updateStats();
    renderList();
  } catch(e){ alert('エラー: '+e.message); }
}

async function deleteFb(id){
  if (!confirm('このメッセージを削除しますか？')) return;
  try {
    await db.collection('feedbacks').doc(id).delete();
    allFeedbacks = allFeedbacks.filter(f=>f.id!==id);
    updateStats();
    renderList();
  } catch(e){ alert('エラー: '+e.message); }
}

function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
