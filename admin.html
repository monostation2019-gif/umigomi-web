<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>まちみっけ｜管理者ページ</title>
<meta name="robots" content="noindex, nofollow">

<!-- 早めに接続だけ確立しておく（本体の読み込みは画面下部で行う。詳細は下の説明コメント参照） -->
<link rel="preconnect" href="https://unpkg.com">
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
:root{
  --blue:#2F6FED; --teal:#3FA796; --amber:#F5A623; --red:#E85D4E;
  --bg:#F5F8FC; --card:#FFFFFF; --ink:#1F2937; --muted:#6B7280; --line:#E4E9F2;
  --radius:14px; --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;}
html,body{height:100%; margin:0;}
body{
  font-family:"Noto Sans JP", sans-serif; color:var(--ink); background:var(--bg);
  display:flex; flex-direction:column; height:100dvh; overflow:hidden;
}
button{font-family:inherit; cursor:pointer;}
input,textarea,select{font-family:inherit;}

/* ---------- ログイン画面 ---------- */
#loginScreen{
  position:fixed; inset:0; background:var(--bg); z-index:100;
  display:flex; align-items:center; justify-content:center; padding:24px;
}
#loginScreen.hidden{display:none;}
.login-card{
  background:var(--card); border-radius:20px; padding:28px 24px; width:100%; max-width:340px;
  box-shadow:0 10px 30px rgba(20,30,60,0.12); text-align:center;
}
.login-card h1{font-size:18px; margin:0 0 4px;}
.login-card p{font-size:12.5px; color:var(--muted); margin:0 0 18px;}
.login-card input{
  width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:12px;
  font-size:15px; margin-bottom:10px;
}
.login-card button{
  width:100%; padding:12px; border:none; border-radius:12px; background:var(--blue);
  color:#fff; font-size:15px; font-weight:700;
}
.login-error{color:var(--red); font-size:12.5px; margin:8px 0 0; min-height:16px;}

/* ---------- 管理画面 ---------- */
#adminApp{display:flex; flex-direction:column; height:100%;}
#adminApp.hidden{display:none;}
.admin-header{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px; background:var(--card); border-bottom:1px solid var(--line);
}
.admin-header h1{font-size:16px; margin:0;}
.admin-header button{
  border:none; background:none; color:var(--muted); font-size:13px; font-weight:700;
}
.mode-tabs{display:flex; gap:6px; padding:10px 14px; background:var(--card); border-bottom:1px solid var(--line);}
.mode-tab{
  flex:1; border:1px solid var(--line); background:var(--bg); border-radius:10px;
  padding:9px 6px; font-size:12.5px; font-weight:700; color:var(--muted);
}
.mode-tab.active{background:var(--blue); border-color:var(--blue); color:#fff;}

.leaflet-control-layers{border-radius:12px !important; overflow:hidden; font-family:"Noto Sans JP", sans-serif;}
.admin-locate-btn, .admin-list-btn{
  position:absolute; z-index:20; width:40px; height:40px; background:#fff; border:none; border-radius:10px;
  box-shadow:0 1px 6px rgba(0,0,0,0.3); font-size:19px; color:var(--blue);
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.admin-locate-btn{right:10px; bottom:14px;}
.admin-list-btn{right:10px; bottom:62px; font-size:17px;}

/* ---------- タップ後の「何を登録するか」選択シート ---------- */
.type-choice-sheet{
  position:absolute; left:14px; right:14px; bottom:14px; z-index:22;
  background:var(--card); border-radius:16px; padding:38px 16px calc(14px + var(--safe-bottom));
  box-shadow:0 8px 24px rgba(20,30,60,0.22); animation:slideUp .25s ease;
}
.type-choice-sheet.hidden{display:none;}
.tcs-label{margin:0 0 10px; font-size:13px; font-weight:700; color:var(--ink); text-align:center;}
.tcs-actions{display:flex; gap:10px; margin-bottom:8px;}
.tcs-btn{
  flex:1; border:none; border-radius:12px; padding:14px 8px; font-size:13px; font-weight:700;
  line-height:1.6; color:#fff;
}
.tcs-gomi{background:linear-gradient(135deg, var(--red), #c9463a);}
.tcs-stamp{background:linear-gradient(135deg, var(--teal), #2c8879);}
.tcs-cancel{width:100%; border:1px solid var(--line); background:none; border-radius:10px; padding:9px; font-size:12.5px; color:var(--muted); font-weight:700;}
@keyframes slideUp{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}

.panel-close-btn{
  position:absolute; top:8px; right:10px; z-index:6;
  border:none; background:none; color:var(--muted); font-size:20px; line-height:1;
  padding:6px 8px; border-radius:8px;
}
.panel-close-btn:active{background:var(--bg);}

.list-panel-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
.list-panel-header h2{font-size:16px; margin:0;}
.list-panel-header button{border:none; background:none; color:var(--muted); font-size:18px;}

#mapArea{position:relative; flex:1; min-height:0;}
#adminMap{position:absolute; inset:0; z-index:0;}
/* ---------- 登録フォームパネル ---------- */
.form-panel{
  position:absolute; left:0; right:0; bottom:0; z-index:20;
  background:var(--card); border-radius:18px 18px 0 0; padding:40px 18px calc(16px + var(--safe-bottom));
  box-shadow:0 -6px 20px rgba(20,30,60,0.15); max-height:70%; overflow-y:auto;
}
.form-panel.hidden{display:none;}
.form-row{margin-bottom:12px;}
.form-row label{display:block; font-size:12.5px; font-weight:700; color:var(--muted); margin-bottom:5px;}
.form-row input[type="text"], .form-row input[type="number"], .form-row select, .form-row textarea{
  width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:10px; font-size:14.5px;
}
.form-row textarea{min-height:80px; resize:vertical;}
.form-actions{display:flex; gap:8px; margin-top:14px;}
.form-actions button{
  flex:1; padding:12px; border:none; border-radius:10px; font-size:14.5px; font-weight:700;
}
.btn-cancel{background:var(--bg); color:var(--muted); border:1px solid var(--line) !important;}
.btn-submit{background:var(--teal); color:#fff;}
.btn-delete{background:#FDE7E4; color:var(--red);}
.btn-delete.hidden{display:none;}
.form-photo-preview{width:80px; height:80px; border-radius:10px; object-fit:cover; margin-top:6px; display:none;}

/* ---------- 一覧パネル ---------- */
#listPanel{position:absolute; inset:0; background:var(--bg); z-index:15; overflow-y:auto; padding:12px 14px;}
#listPanel.hidden{display:none;}
.list-tabs{display:flex; gap:6px; margin-bottom:10px;}
.list-tab{
  flex:1; border:1px solid var(--line); background:var(--card); border-radius:10px;
  padding:8px; font-size:12.5px; font-weight:700; color:var(--muted);
}
.list-tab.active{background:var(--ink); border-color:var(--ink); color:#fff;}
.admin-item{
  background:var(--card); border-radius:12px; padding:10px 12px; margin-bottom:8px;
  display:flex; align-items:flex-start; gap:10px; box-shadow:0 1px 4px rgba(20,30,60,0.06);
}
.admin-item .em{font-size:20px; width:44px; height:44px; flex:none; border-radius:8px; background:var(--bg); display:flex; align-items:center; justify-content:center;}
.admin-item .thumb{width:44px; height:44px; border-radius:8px; object-fit:cover; flex:none; background:var(--bg);}
.admin-item .info{flex:1; min-width:0;}
.admin-item .info .t{font-size:13.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.admin-item .info .d{
  font-size:11.5px; color:var(--ink); margin-top:3px; line-height:1.4;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.admin-item .info .s{font-size:11px; color:var(--muted); margin-top:3px;}
.admin-item .actions{display:flex; flex-direction:column; align-items:stretch; gap:4px; flex:none;}
.admin-item .actions button{
  border:none; border-radius:8px; padding:4px 9px; font-size:11px; font-weight:700; white-space:nowrap;
}
.admin-item .loc-btn{background:rgba(47,111,237,0.1); color:var(--blue);}
.admin-item .edit-btn{background:rgba(63,167,150,0.12); color:var(--teal);}
.admin-item .del-btn{background:none; color:var(--red); font-size:15px; padding:2px; align-self:center;}
.empty-note{color:var(--muted); font-size:13px; text-align:center; padding:30px 0;}

.dm-note{
  background:var(--card); border:1px dashed var(--line); border-radius:12px;
  padding:14px; font-size:12.5px; color:var(--muted); text-align:center; margin-top:6px;
}

/* ---------- お知らせ管理パネル ---------- */
#notifPanel{position:absolute; inset:0; background:var(--bg); z-index:15; overflow-y:auto; padding:12px 14px;}
#notifPanel.hidden{display:none;}
.notif-form-card{background:var(--card); border-radius:12px; padding:14px; box-shadow:0 1px 4px rgba(20,30,60,0.06); margin-bottom:14px;}
.notif-form-card .form-actions{margin-top:10px;}

.toast{
  position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:#fff; padding:10px 18px; border-radius:99px; font-size:13px;
  opacity:0; pointer-events:none; transition:all .25s; z-index:200;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* ---------- 一覧パネル：上に戻るボタン ---------- */
.scroll-top-btn{
  position:fixed; right:16px; bottom:calc(20px + var(--safe-bottom)); z-index:50;
  width:46px; height:46px; border-radius:50%; border:none; background:var(--ink); color:#fff;
  font-size:18px; box-shadow:0 4px 14px rgba(20,30,60,0.35);
  opacity:0; transform:translateY(10px); pointer-events:none;
  transition:opacity .2s ease, transform .2s ease;
  display:flex; align-items:center; justify-content:center;
}
.scroll-top-btn.show{opacity:1; transform:translateY(0); pointer-events:auto;}

/* ---------- ポップアップ内：一覧・編集へのジャンプ ---------- */
.popup-jump{cursor:pointer;}
.popup-jump .pj-link{color:var(--blue); font-size:11px; margin-top:2px; font-weight:700;}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="loginScreen">
  <div class="login-card">
    <h1>🔧 まちみっけ 管理者ページ</h1>
    <p>関係者以外はアクセスしないでください</p>
    <input type="password" id="pwInput" placeholder="パスワード" autocomplete="off">
    <button onclick="tryLogin()">ログイン</button>
    <p class="login-error" id="loginError"></p>
  </div>
</div>

<!-- 管理画面 -->
<div id="adminApp" class="hidden">
  <div class="admin-header">
    <h1>まちみっけ 管理者ページ</h1>
    <div style="display:flex; gap:14px;">
      <button onclick="openNotifPanel()">📢 お知らせ</button>
      <button onclick="openListPanel()">📋 一覧</button>
      <button onclick="logout()">ログアウト</button>
    </div>
  </div>

  <div id="mapArea">
    <div id="adminMap"></div>

    <button type="button" class="admin-list-btn" onclick="openListPanel()">📋</button>
    <button type="button" class="admin-locate-btn" onclick="goToMyLocationAdmin(true)">⌖</button>

    <!-- タップ直後：ゴミ／スタンプの選択シート -->
    <div class="type-choice-sheet hidden" id="typeChoiceSheet">
      <button type="button" class="panel-close-btn" onclick="cancelPlacement()" aria-label="閉じる">✕</button>
      <p class="tcs-label">ここに何を登録しますか？</p>
      <div class="tcs-actions">
        <button type="button" class="tcs-btn tcs-gomi" onclick="chooseType('gomi')">🗑️<br>ゴミ投稿</button>
        <button type="button" class="tcs-btn tcs-stamp" onclick="chooseType('stamp')">🏅<br>スタンプ投稿</button>
      </div>
      <button type="button" class="tcs-cancel" onclick="cancelPlacement()">キャンセル</button>
    </div>

    <!-- ゴミ追加フォーム -->
    <div class="form-panel-gomi form-panel hidden" id="formPanelGomi">
      <button type="button" class="panel-close-btn" onclick="closeFormPanel()" aria-label="閉じる">✕</button>
      <div class="form-row">
        <label>種類</label>
        <select id="gomiTypeSelect"></select>
      </div>
      <div class="form-row">
        <label>ひとこと（任意）</label>
        <textarea id="gomiComment" placeholder="現地の様子など"></textarea>
      </div>
      <div class="form-row">
        <label>写真（任意・カメラ／アルバムから選択）</label>
        <input type="file" accept="image/*" id="gomiPhotoInput" onchange="onGomiPhotoSelected(event)">
        <img class="form-photo-preview" id="gomiPhotoPreview">
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeFormPanel()">キャンセル</button>
        <button class="btn-delete hidden" id="gomiDeleteBtn" onclick="deleteGomiFromForm()">削除</button>
        <button class="btn-submit" id="gomiSubmitBtn" onclick="submitGomi()">登録する</button>
      </div>
    </div>

    <!-- スタンプ追加フォーム -->
    <div class="form-panel-stamp form-panel hidden" id="formPanelStamp">
      <button type="button" class="panel-close-btn" onclick="closeFormPanel()" aria-label="閉じる">✕</button>
      <div class="form-row">
        <label>スポット名</label>
        <input type="text" id="stampTitle" placeholder="例：二見浦">
      </div>
      <div class="form-row">
        <label>歴史・文化の説明文</label>
        <textarea id="stampHistory" placeholder="この場所の由来や見どころなど"></textarea>
      </div>
      <div class="form-row">
        <label>獲得半径（メートル）</label>
        <input type="number" id="stampRadius" value="30" min="5" max="200">
      </div>
      <div class="form-row">
        <label>紹介写真（任意・カメラ／アルバムから選択）</label>
        <input type="file" accept="image/*" id="stampPhotoInput" onchange="onStampPhotoSelected(event)">
        <img class="form-photo-preview" id="stampPhotoPreview">
      </div>
      <div class="form-actions">
        <button class="btn-cancel" onclick="closeFormPanel()">キャンセル</button>
        <button class="btn-delete hidden" id="stampDeleteBtn" onclick="deleteStampFromForm()">削除</button>
        <button class="btn-submit" id="stampSubmitBtn" onclick="submitStamp()">登録する</button>
      </div>
    </div>
  </div>

  <!-- 一覧パネル -->
  <div id="listPanel" class="hidden">
    <div class="list-panel-header">
      <h2>投稿一覧・削除</h2>
      <button onclick="closeListPanel()">✕</button>
    </div>
    <div class="list-tabs">
      <button type="button" class="list-tab active" data-list="gomi" onclick="setListTab('gomi', this)">ゴミ投稿</button>
      <button type="button" class="list-tab" data-list="stamp" onclick="setListTab('stamp', this)">スタンプ地点</button>
    </div>
    <div id="listItems"></div>
    <div class="dm-note">📨 ユーザーへのDM機能は今後追加予定です</div>
  </div>
  <button type="button" class="scroll-top-btn" id="scrollTopBtn" onclick="scrollListToTop()" aria-label="上に戻る">▲</button>

  <!-- お知らせ管理パネル -->
  <div id="notifPanel" class="hidden">
    <div class="list-panel-header">
      <h2>📢 お知らせ管理</h2>
      <button onclick="closeNotifPanel()">✕</button>
    </div>
    <div class="notif-form-card">
      <div class="form-row">
        <label>タイトル</label>
        <input type="text" id="notifTitleInput" placeholder="例：アプリをアップデートしました">
      </div>
      <div class="form-row">
        <label>本文（任意）</label>
        <textarea id="notifBodyInput" placeholder="お知らせの内容を入力してください"></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-submit" style="flex:1;" onclick="submitNotif()">配信する</button>
      </div>
    </div>
    <div id="notifListAdmin"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- =========================================================
     Leaflet・Firebaseの読み込みはここ（画面の中身を全部書いた後）に
     あえて配置している。<head>内に置くとダウンロード＆実行が終わる
     まで画面が真っ白のまま止まってしまうため、先にログイン画面だけ
     でも表示できるよう、意図的に一番下に移動した。
     ※ 順番は変更しないこと
========================================================= -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<script>
/* =========================================================
   管理者パスワード
   ・SHA-256ハッシュで比較（平文は保存しない）
   ・初期パスワードは「isechan2026」。変更する場合は下記を
     ブラウザのコンソールで実行して出たハッシュ値に置き換える：
     crypto.subtle.digest('SHA-256', new TextEncoder().encode('新しいパスワード'))
       .then(b => console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')));
   ・これはあくまで簡易的な入室ゲートです。より強固に守るには、
     Firestore側のセキュリティルールで管理者のみ書き込み可能にする
     設定も合わせておすすめします。
========================================================= */
const ADMIN_PASSWORD_HASH = 'e0af7b44d2528e444df1b10aac22b304219a7292d08f6c55bcfb5d4ae9d8eb89';

async function sha256Hex(text){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
}

async function tryLogin(){
  const pw = document.getElementById('pwInput').value;
  const hash = await sha256Hex(pw);
  if (hash === ADMIN_PASSWORD_HASH){
    sessionStorage.setItem('mm_admin_authed', '1');
    enterAdmin();
  } else {
    document.getElementById('loginError').textContent = 'パスワードが違います';
  }
}

function logout(){
  sessionStorage.removeItem('mm_admin_authed');
  location.reload();
}

document.getElementById('pwInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') tryLogin();
});

/* =========================================================
   Firebase 初期化
========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyAPoFjQ4RTIYByTuu35J93kwlLfYBEkpKY",
  authDomain: "machimikke.firebaseapp.com",
  projectId: "machimikke",
  storageBucket: "machimikke.firebasestorage.app",
  messagingSenderId: "497845237336",
  appId: "1:497845237336:web:a39e12428d2943fdf43c2d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ---- オフライン対応：電波が無くても登録操作を続けられるようにする ----
// これを有効にすると、ゴミ・スタンプの登録内容（写真データ含む）はまず
// 端末内（IndexedDB）に保存され、電波が戻ったタイミングでFirebase側が
// 自動的にサーバーへ送信してくれる。人がやることは「いつも通り登録する」
// だけでよく、送信タイミングを気にする必要はない。
// synchronizeTabs:true にしておくと、同じブラウザで複数タブ/画面を
// 開いていても矛盾なく動作する。
db.enablePersistence({ synchronizeTabs: true }).catch(err => {
  console.warn('オフライン保存を有効にできませんでした:', err && err.code);
  // 'failed-precondition' = 他のタブで既に有効化済み（実害なし）
  // 'unimplemented'      = 古いブラウザで非対応（その場合は従来通りオンライン時のみ動作）
});

// ---- オフライン/オンライン状態の表示 ----
// 画面の右上あたりに小さく現在の通信状態を表示し、未送信件数があれば併記する。
let pendingWriteCount = 0;
function renderNetStatusBadge(){
  let badge = document.getElementById('netStatusBadge');
  if (!badge){
    badge = document.createElement('div');
    badge.id = 'netStatusBadge';
    badge.style.cssText = 'position:fixed; left:8px; bottom:calc(8px + var(--safe-bottom, 0px)); z-index:9999; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700; box-shadow:0 1px 4px rgba(0,0,0,0.25); pointer-events:none; transition:background .2s,color .2s;';
    document.body.appendChild(badge);
  }
  if (!navigator.onLine){
    badge.textContent = pendingWriteCount > 0 ? `📴 オフライン（未送信 ${pendingWriteCount}件）` : '📴 オフライン';
    badge.style.background = '#F2C94C';
    badge.style.color = '#4A3800';
  } else if (pendingWriteCount > 0){
    badge.textContent = `🔄 送信中…（残り ${pendingWriteCount}件）`;
    badge.style.background = '#2F6FED';
    badge.style.color = '#fff';
  } else {
    badge.textContent = '🟢 オンライン';
    badge.style.background = '#DCEFDD';
    badge.style.color = '#1F6B2C';
  }
}
window.addEventListener('online', renderNetStatusBadge);
window.addEventListener('offline', renderNetStatusBadge);
document.addEventListener('DOMContentLoaded', renderNetStatusBadge);
// スクリプトの実行タイミング次第ではDOMContentLoadedが既に発火済みのことがあるため保険で即実行も行う
renderNetStatusBadge();

let adminReady = false;
let anonAuthPromise = null;

function enterAdmin(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('adminApp').classList.remove('hidden');
  if (!adminReady){
    adminReady = true;
    // ※ Firestoreへの書き込み（ゴミ・スタンプ登録）は認証（匿名サインイン）完了後で
    //   ないとセキュリティルールにより権限エラーになる場合があるため、
    //   このPromiseを保持しておき、登録処理の直前で必ず完了を待つ。
    anonAuthPromise = auth.signInAnonymously().catch(err => {
      console.warn('匿名サインインに失敗:', err);
    });
    initAdminMap();
  }
}

  iconUrl: STAMP_ICON_DATA_URL, iconSize:[40,40], iconAnchor:[20,20], popupAnchor:[0,-18]
});

let tempMarker = null;
let chosenType = null;
let adminMyLocationMarker = null;
let editingGomiId = null;
let editingStampId = null;
let editingGomiExistingPhoto = null;
let editingStampExistingPhoto = null;

function initAdminMap(){
  adminMap = L.map('adminMap', { zoomControl:true }).setView([34.4859, 136.7093], 14);

  const stdLayer = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
    attribution: '地図: 国土地理院', maxZoom: 18
  }).addTo(adminMap);
  const photoLayer = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', {
    attribution: '写真: 国土地理院', maxZoom: 18
  });
  L.control.layers({ '通常地図': stdLayer, '写真（衛星）': photoLayer }, null, { position:'topright' }).addTo(adminMap);

  gomiMarkersLayer = L.layerGroup().addTo(adminMap);
  stampMarkersLayer = L.layerGroup().addTo(adminMap);

  // ---- 現在地の自動取得（index.htmlと同じ仕組み） ----
  adminMap.on('locationfound', (e) => {
    if (adminMyLocationMarker) adminMap.removeLayer(adminMyLocationMarker);
    adminMyLocationMarker = L.circleMarker(e.latlng, {
      radius:8, color:'#fff', weight:3, fillColor:'#2F6FED', fillOpacity:1
    }).addTo(adminMap);
  });
  adminMap.on('locationerror', (e) => console.warn('現在地取得エラー:', e.message));
  goToMyLocationAdmin(false);

  // ---- 地図タップ→仮ピンを置いて「ゴミ／スタンプ」を選択させる ----
  adminMap.on('click', (e) => {
    if (!document.getElementById('listPanel').classList.contains('hidden')) return;
    closeFormPanel();
    clickedLatLng = e.latlng;
    if (tempMarker) adminMap.removeLayer(tempMarker);
    tempMarker = L.marker(clickedLatLng, { draggable:true }).addTo(adminMap);
    tempMarker.on('dragend', () => { clickedLatLng = tempMarker.getLatLng(); });
    document.getElementById('typeChoiceSheet').classList.remove('hidden');
  });

  watchGomiReports();
  watchStampSpots();
}

function goToMyLocationAdmin(showFeedback){
  if (showFeedback) showToast('現在地を取得中…');
  adminMap.locate({ setView:true, maxZoom:16, enableHighAccuracy:true, timeout:8000 });
}

function chooseType(type){
  chosenType = type;
  document.getElementById('typeChoiceSheet').classList.add('hidden');
  if (tempMarker && type === 'stamp') tempMarker.setIcon(stampIconAdmin);
  document.getElementById('formPanelGomi').classList.toggle('hidden', type !== 'gomi');
  document.getElementById('formPanelStamp').classList.toggle('hidden', type !== 'stamp');
}

function cancelPlacement(){
  document.getElementById('typeChoiceSheet').classList.add('hidden');
  if (tempMarker){ adminMap.removeLayer(tempMarker); tempMarker = null; }
  clickedLatLng = null;
  chosenType = null;
}

function closeFormPanel(){
  document.getElementById('typeChoiceSheet').classList.add('hidden');
  document.getElementById('formPanelGomi').classList.add('hidden');
  document.getElementById('formPanelStamp').classList.add('hidden');
  if (tempMarker){ adminMap.removeLayer(tempMarker); tempMarker = null; }
  clickedLatLng = null;
  chosenType = null;
  editingGomiId = null;
  editingStampId = null;
  editingGomiExistingPhoto = null;
  editingStampExistingPhoto = null;
  document.getElementById('gomiSubmitBtn').textContent = '登録する';
  document.getElementById('stampSubmitBtn').textContent = '登録する';
  document.getElementById('gomiDeleteBtn').classList.add('hidden');
  document.getElementById('stampDeleteBtn').classList.add('hidden');
}

function openListPanel(){
  closeFormPanel();
  const panel = document.getElementById('listPanel');
  panel.classList.remove('hidden');
  panel.scrollTop = 0;
  document.getElementById('scrollTopBtn').classList.remove('show');
  renderList();
}

function closeListPanel(){
  document.getElementById('listPanel').classList.add('hidden');
  document.getElementById('scrollTopBtn').classList.remove('show');
}

function scrollListToTop(){
  document.getElementById('listPanel').scrollTo({ top:0, behavior:'smooth' });
}

/* =========================================================
   写真の圧縮（index.htmlと同じ方式：正方形にクロップしてJPEG化 → base64）
========================================================= */
function resizeImageToJpeg(file, maxSize, quality){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const side = Math.min(img.width, img.height);
      const sx = (img.width - side) / 2;
      const sy = (img.height - side) / 2;
      const outSize = Math.min(maxSize, side);
      const canvas = document.createElement('canvas');
      canvas.width = outSize; canvas.height = outSize;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, sx, sy, side, side, 0, 0, outSize, outSize);
      canvas.toBlob(blob => {
        if (blob) resolve(blob); else reject(new Error('画像の変換に失敗しました'));
      }, 'image/jpeg', quality);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('画像の読み込みに失敗しました')); };
    img.src = url;
  });
}
function blobToDataURL(blob){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error('画像の読み込みに失敗しました'));
    reader.readAsDataURL(blob);
  });
}

let gomiPhotoDataUrl = null;
let stampPhotoDataUrl = null;

async function onGomiPhotoSelected(e){
  const file = e.target.files[0];
  if (!file) return;
  try {
    const blob = await resizeImageToJpeg(file, 800, 0.75);
    gomiPhotoDataUrl = await blobToDataURL(blob);
    const preview = document.getElementById('gomiPhotoPreview');
    preview.src = gomiPhotoDataUrl; preview.style.display = '';
  } catch(err) { showToast('画像の読み込みに失敗しました'); }
}
async function onStampPhotoSelected(e){
  const file = e.target.files[0];
  if (!file) return;
  try {
    const blob = await resizeImageToJpeg(file, 800, 0.8);
    stampPhotoDataUrl = await blobToDataURL(blob);
    const preview = document.getElementById('stampPhotoPreview');
    preview.src = stampPhotoDataUrl; preview.style.display = '';
  } catch(err) { showToast('画像の読み込みに失敗しました'); }
}

   逆ジオコーディング（町名の自動判定・index.htmlと同じAPI）
========================================================= */
async function reverseGeocodeTown(lat, lng){
  try {
    const url = `https://mreversegeocoder.gsi.go.jp/reverse-geocoder/LonLatToAddress?lat=${lat}&lon=${lng}`;
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    const info = data && data.results;
    return (info && info.lv01Nm) ? info.lv01Nm : null;
  } catch(err) { return null; }
}

/* =========================================================
   ゴミ登録
========================================================= */
async function submitGomi(){
  if (!clickedLatLng) return;
  const label = gomiSelect.value;
  const itemDef = ITEM_TYPES.find(it => it.label === label);
  const comment = document.getElementById('gomiComment').value.trim();
  const isEditing = !!editingGomiId;
  const wasOffline = !navigator.onLine;

  try {
    if (anonAuthPromise) await anonAuthPromise;

    const area = {};
    // オフライン中は住所検索（外部通信）を待たずスキップする。
    // 電波が戻った後の編集時に町名を追加することもできるため、実害は小さい。
    if (navigator.onLine){
      const townName = await reverseGeocodeTown(clickedLatLng.lat, clickedLatLng.lng);
      if (townName) area.town = townName;
    }
    // ※学区（gakku）はindex.html側の対応表が大きいため、ここでは町名のみ自動判定します

    const photoToSave = gomiPhotoDataUrl
      ? [gomiPhotoDataUrl]
      : (isEditing && editingGomiExistingPhoto ? [editingGomiExistingPhoto] : []);

    const payload = {
      category: itemDef ? itemDef.cat : 'ポイ捨て',
      itemType: label,
      emoji: itemDef ? itemDef.emoji : '❔',
      location: new firebase.firestore.GeoPoint(clickedLatLng.lat, clickedLatLng.lng),
      area: area,
      photos: photoToSave,
      comment: comment || ''
    };

    // ここが重要：write操作（update/add）は awaitで完了を待たない。
    // オフライン時、Firestoreはこのプロミスをサーバー到達までは解決しないため、
    // awaitすると電波が戻るまで画面が固まったようになってしまう。
    // 実際の保存（端末内キューへの登録）はこの呼び出しの時点で完了しているので、
    // 画面の処理はここで先に進めてよい。送受信自体はSDKが裏側で自動的に行う。
    let writePromise;
    if (isEditing){
      writePromise = db.collection('reports').doc(editingGomiId).update(payload);
    } else {
      writePromise = db.collection('reports').add({
        ...payload,
        confidence: '未確認',
        confirmCount: 0,
        reportedBy: 'admin',
        reporterName: '運営（親方）',
        reporterAvatarType: 'emoji',
        reporterAvatarEmoji: '🧑‍🔧',
        reporterAvatarPhotoUrl: null,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        status: 'active'
      });
    }
    // 実際にサーバーへ届いた/失敗した時のログだけ裏側で記録しておく（画面はブロックしない）
    writePromise
      .then(() => console.log('[gomi] サーバーへの同期完了'))
      .catch(err => console.error('[gomi] サーバー同期エラー:', err));

    showToast(
      wasOffline
        ? '📴 オフラインのため端末に保存しました。電波が戻ったら自動で送信されます'
        : (isEditing ? 'ゴミ投稿を更新しました' : 'ゴミ投稿を登録しました')
    );

    closeFormPanel();
    document.getElementById('gomiComment').value = '';
    document.getElementById('gomiPhotoInput').value = '';
    document.getElementById('gomiPhotoPreview').style.display = 'none';
    gomiPhotoDataUrl = null;
  } catch(err) {
    console.error(err);
    showToast('登録に失敗しました' + (err && err.code ? '（' + err.code + '）' : ''));
  }
}

/* =========================================================
   スタンプ登録
========================================================= */
async function submitStamp(){
  if (!clickedLatLng) return;
  const title = document.getElementById('stampTitle').value.trim();
  const historyText = document.getElementById('stampHistory').value.trim();
  const radius = Number(document.getElementById('stampRadius').value) || 30;
  if (!title){ showToast('スポット名を入力してください'); return; }
  const isEditing = !!editingStampId;
  const wasOffline = !navigator.onLine;

  try {
    if (anonAuthPromise) await anonAuthPromise;

    const photoToSave = stampPhotoDataUrl || (isEditing ? (editingStampExistingPhoto || null) : null);

    const payload = {
      lat: clickedLatLng.lat,
      lng: clickedLatLng.lng,
      radius: radius,
      title: title,
      historyText: historyText,
      photo: photoToSave
    };

    // ゴミ登録と同様、write完了は待たずに画面を先に進める（オフライン時に固まるのを防ぐ）
    let writePromise;
    if (isEditing){
      writePromise = db.collection('stampSpots').doc(editingStampId).update(payload);
    } else {
      writePromise = db.collection('stampSpots').add({
        ...payload,
        createdBy: auth.currentUser ? auth.currentUser.uid : null,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
    writePromise
      .then(() => console.log('[stamp] サーバーへの同期完了'))
      .catch(err => console.error('[stamp] サーバー同期エラー:', err));

    showToast(
      wasOffline
        ? '📴 オフラインのため端末に保存しました。電波が戻ったら自動で送信されます'
        : (isEditing ? 'スタンプ地点を更新しました' : 'スタンプ地点を登録しました')
    );

    closeFormPanel();
    document.getElementById('stampTitle').value = '';
    document.getElementById('stampHistory').value = '';
    document.getElementById('stampRadius').value = 30;
    document.getElementById('stampPhotoInput').value = '';
    document.getElementById('stampPhotoPreview').style.display = 'none';
    stampPhotoDataUrl = null;
  } catch(err) {
    console.error(err);
    showToast('登録に失敗しました' + (err && err.code ? '（' + err.code + '）' : ''));
  }
}

/* =========================================================
   地図上への反映・一覧表示
========================================================= */
let allGomiReports = [];
let allStampSpots = [];
let currentListTab = 'gomi';

// 「ゴミ投稿」と「スタンプ地点」それぞれの未送信件数を別々に把握し、合算してバッジに出す
let pendingGomiCount = 0;
let pendingStampCount = 0;
function updatePendingTotal(){
  pendingWriteCount = pendingGomiCount + pendingStampCount;
  renderNetStatusBadge();
}

function watchGomiReports(){
  // includeMetadataChanges:true を付けると、サーバーにまだ届いていない
  // ローカル書き込み（オフライン中に登録した分）の状態変化も検知できる
  db.collection('reports').orderBy('createdAt','desc').limit(300)
    .onSnapshot({ includeMetadataChanges: true }, snap => {
      allGomiReports = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      pendingGomiCount = snap.docs.filter(d => d.metadata.hasPendingWrites).length;
      updatePendingTotal();

      gomiMarkersLayer.clearLayers();
      allGomiReports.forEach(r => {
        if (!r.location) return;
        const marker = L.marker([r.location.latitude, r.location.longitude]);
        marker.bindPopup(`<div class="popup-jump" onclick="editGomi('${r.id}')">${r.emoji || '🗑️'} ${escapeHtml(r.itemType || '')}<div class="pj-link">タップで編集・打ち直し →</div></div>`);
        marker.addTo(gomiMarkersLayer);
      });
      if (!document.getElementById('listPanel').classList.contains('hidden') && currentListTab === 'gomi') renderList();
    });
}

function watchStampSpots(){
  db.collection('stampSpots')
    .onSnapshot({ includeMetadataChanges: true }, snap => {
      allStampSpots = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      pendingStampCount = snap.docs.filter(d => d.metadata.hasPendingWrites).length;
      updatePendingTotal();

      stampMarkersLayer.clearLayers();
      allStampSpots.forEach(s => {
        const marker = L.marker([s.lat, s.lng], { icon: stampIconAdmin });
        marker.bindPopup(`<div class="popup-jump" onclick="editStamp('${s.id}')"><b>${escapeHtml(s.title)}</b><br>半径${s.radius}m<div class="pj-link">タップで編集・打ち直し →</div></div>`);
        marker.addTo(stampMarkersLayer);
      });
      if (!document.getElementById('listPanel').classList.contains('hidden') && currentListTab === 'stamp') renderList();
    });
}

function setListTab(tab, btn){
  currentListTab = tab;
  document.querySelectorAll('.list-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function escapeHtml(str){
  return String(str == null ? '' : str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderList(){
  const wrap = document.getElementById('listItems');
  if (currentListTab === 'gomi'){
    if (allGomiReports.length === 0){ wrap.innerHTML = '<p class="empty-note">まだ投稿がありません</p>'; return; }
    wrap.innerHTML = allGomiReports.map(r => {
      const lat = r.location ? r.location.latitude : null;
      const lng = r.location ? r.location.longitude : null;
      const photoHtml = (r.photos && r.photos[0])
        ? `<img class="thumb" src="${r.photos[0]}" alt="">`
        : `<div class="em">${r.emoji || '🗑️'}</div>`;
      return `
      <div class="admin-item">
        ${photoHtml}
        <div class="info">
          <div class="t">${escapeHtml(r.itemType || '')}${r.area && r.area.town ? '（' + escapeHtml(r.area.town) + '）' : ''}</div>
          <div class="d">${r.comment ? escapeHtml(r.comment) : '（説明文なし）'}</div>
          <div class="s">投稿者：${escapeHtml(r.reporterName || '無記名')}</div>
        </div>
        <div class="actions">
          ${lat != null ? `<button type="button" class="loc-btn" onclick="locateItem(${lat},${lng})">📍場所</button>` : ''}
          <button type="button" class="edit-btn" onclick="editGomi('${r.id}')">✏️編集</button>
          <button type="button" class="del-btn" onclick="deleteGomi('${r.id}')">✕</button>
        </div>
      </div>`;
    }).join('');
  } else {
    if (allStampSpots.length === 0){ wrap.innerHTML = '<p class="empty-note">まだスタンプ地点がありません</p>'; return; }
    wrap.innerHTML = allStampSpots.map(s => {
      const photoHtml = s.photo
        ? `<img class="thumb" src="${s.photo}" alt="">`
        : `<div class="em">🏅</div>`;
      return `
      <div class="admin-item">
        ${photoHtml}
        <div class="info">
          <div class="t">${escapeHtml(s.title)}</div>
          <div class="d">${s.historyText ? escapeHtml(s.historyText) : '（説明文なし）'}</div>
          <div class="s">半径${s.radius}m</div>
        </div>
        <div class="actions">
          <button type="button" class="loc-btn" onclick="locateItem(${s.lat},${s.lng})">📍場所</button>
          <button type="button" class="edit-btn" onclick="editStamp('${s.id}')">✏️編集</button>
          <button type="button" class="del-btn" onclick="deleteStamp('${s.id}')">✕</button>
        </div>
      </div>`;
    }).join('');
  }
}

/* 一覧から地図の該当地点へジャンプ */
function locateItem(lat, lng){
  closeListPanel();
  adminMap.setView([lat, lng], 18, { animate:true });
}

/* ゴミ投稿の編集 */
function editGomi(id){
  const r = allGomiReports.find(x => x.id === id);
  if (!r || !r.location){ showToast('位置情報が見つかりません'); return; }
  adminMap.closePopup();
  closeListPanel();
  closeFormPanel();

  editingGomiId = id;
  editingGomiExistingPhoto = (r.photos && r.photos[0]) ? r.photos[0] : null;
  clickedLatLng = { lat: r.location.latitude, lng: r.location.longitude };

  tempMarker = L.marker(clickedLatLng, { draggable:true }).addTo(adminMap);
  tempMarker.on('dragend', () => { clickedLatLng = tempMarker.getLatLng(); });
  adminMap.setView(clickedLatLng, 18);

  gomiSelect.value = r.itemType || '';
  document.getElementById('gomiComment').value = r.comment || '';
  gomiPhotoDataUrl = null;
  const preview = document.getElementById('gomiPhotoPreview');
  if (editingGomiExistingPhoto){ preview.src = editingGomiExistingPhoto; preview.style.display = ''; }
  else { preview.src = ''; preview.style.display = 'none'; }

  document.getElementById('typeChoiceSheet').classList.add('hidden');
  document.getElementById('formPanelStamp').classList.add('hidden');
  document.getElementById('formPanelGomi').classList.remove('hidden');
  document.getElementById('gomiSubmitBtn').textContent = '更新する';
  document.getElementById('gomiDeleteBtn').classList.remove('hidden');
}

/* スタンプ地点の編集 */
function editStamp(id){
  const s = allStampSpots.find(x => x.id === id);
  if (!s){ showToast('データが見つかりません'); return; }
  adminMap.closePopup();
  closeListPanel();
  closeFormPanel();

  editingStampId = id;
  editingStampExistingPhoto = s.photo || null;
  clickedLatLng = { lat: s.lat, lng: s.lng };

  tempMarker = L.marker(clickedLatLng, { draggable:true, icon: stampIconAdmin }).addTo(adminMap);
  tempMarker.on('dragend', () => { clickedLatLng = tempMarker.getLatLng(); });
  adminMap.setView(clickedLatLng, 18);

  document.getElementById('stampTitle').value = s.title || '';
  document.getElementById('stampHistory').value = s.historyText || '';
  document.getElementById('stampRadius').value = s.radius || 30;
  stampPhotoDataUrl = null;
  const preview = document.getElementById('stampPhotoPreview');
  if (editingStampExistingPhoto){ preview.src = editingStampExistingPhoto; preview.style.display = ''; }
  else { preview.src = ''; preview.style.display = 'none'; }

  document.getElementById('typeChoiceSheet').classList.add('hidden');
  document.getElementById('formPanelGomi').classList.add('hidden');
  document.getElementById('formPanelStamp').classList.remove('hidden');
  document.getElementById('stampSubmitBtn').textContent = '更新する';
  document.getElementById('stampDeleteBtn').classList.remove('hidden');
}

function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(window._adminToastTimer);
  window._adminToastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* =========================================================
   お知らせ配信機能
   ・notificationsコレクションに配信すると、index.html側の
     ベルアイコンに赤い点がつき、ユーザーがタップすると読める。
========================================================= */
let allNotifications = [];

db.collection('notifications').orderBy('createdAt', 'desc').limit(50).onSnapshot(snap => {
  allNotifications = snap.docs.map(doc => {
    const d = doc.data();
    const ms = (d.createdAt && d.createdAt.toMillis) ? d.createdAt.toMillis() : 0;
    return { id: doc.id, title: d.title || '', body: d.body || '', ms };
  });
  renderNotifAdminList();
}, err => {
  console.warn('お知らせの取得に失敗:', err);
});

function renderNotifAdminList(){
  const wrap = document.getElementById('notifListAdmin');
  if (!wrap) return;
  if (allNotifications.length === 0){
    wrap.innerHTML = '<p class="empty-note">お知らせはまだありません</p>';
    return;
  }
  wrap.innerHTML = allNotifications.map(n => {
    const date = n.ms ? new Date(n.ms).toLocaleString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
    return `
    <div class="admin-item">
      <div class="em">📢</div>
      <div class="info">
        <div class="t">${escapeHtml(n.title)}</div>
        <div class="d">${n.body ? escapeHtml(n.body) : '（本文なし）'}</div>
        <div class="s">${date}</div>
      </div>
      <div class="actions">
        <button type="button" class="del-btn" onclick="deleteNotif('${n.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function openNotifPanel(){
  document.getElementById('notifPanel').classList.remove('hidden');
}
function closeNotifPanel(){
  document.getElementById('notifPanel').classList.add('hidden');
}

async function submitNotif(){
  const title = document.getElementById('notifTitleInput').value.trim();
  const body = document.getElementById('notifBodyInput').value.trim();
  if (!title){ showToast('タイトルを入力してください'); return; }
  try {
    if (anonAuthPromise) await anonAuthPromise;
    await db.collection('notifications').add({
      title,
      body,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('notifTitleInput').value = '';
    document.getElementById('notifBodyInput').value = '';
    showToast('お知らせを配信しました');
  } catch(err){
    console.error('お知らせ配信エラー:', err);
    showToast('配信に失敗しました');
  }
}

async function deleteNotif(id){
  if (!confirm('このお知らせを削除しますか？')) return;
  try {
    await db.collection('notifications').doc(id).delete();
    showToast('削除しました');
  } catch(err){
    console.error('お知らせ削除エラー:', err);
    showToast('削除に失敗しました');
  }
}

/* =========================================================
   セッション復元によるログイン状態の自動復帰
   ※ adminMap 等の変数・initAdminMap 関数が全て定義された
     「スクリプトの最後」でこれを実行する必要がある。
     途中の位置に置くと、let/const の初期化前に
     initAdminMap() が変数へアクセスしてしまい
     ReferenceError（一時的死角）が発生し、以降の処理が
     すべて止まって地図が表示されなくなる不具合があった。
========================================================= */
if (sessionStorage.getItem('mm_admin_authed') === '1'){
  enterAdmin();
}

/* =========================================================
   PWA: Service Worker 登録（オフライン対応）
   index.html側と同じ仕組みをadmin.htmlにも入れておく。
   これが無いと、admin.htmlを直接ブックマーク等から開いた場合に
   このページ自体がブラウザに保存されず、電波が無い時に
   ページそのものが開けなくなってしまう。
========================================================= */
if ('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' }).catch(err => {
      console.warn('SW登録失敗:', err);
    });
  });
}
