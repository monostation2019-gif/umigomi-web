<script type="module">
  // ---------------- Firebase Authentication (ログインページはAuthのみ読み込む) ----------------
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    OAuthProvider,
    signInWithPopup,
    signInAnonymously,
    onAuthStateChanged,
    updateProfile,
    signOut,
    setPersistence,
    browserLocalPersistence
  } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

  var firebaseConfig = {
    apiKey: "AIzaSyAPoFjQ4RTIYByTuu35J93kwlLfYBEkpKY",
    authDomain: "machimikke.firebaseapp.com",
    projectId: "machimikke",
    storageBucket: "machimikke.firebasestorage.app",
    messagingSenderId: "497845237336",
    appId: "1:497845237336:web:a39e12428d2943fdf43c2d"
  };

  var app = initializeApp(firebaseConfig);
  var auth = getAuth(app);
  setPersistence(auth, browserLocalPersistence).catch(function(e){ console.error('persistence設定エラー', e); });

  var googleProvider = new GoogleAuthProvider();
  var appleProvider = new OAuthProvider('apple.com');

  function randomGuestName(){
    return 'ゲスト' + Math.floor(1000 + Math.random() * 9000);
  }

  async function signInGoogle(){ await signInWithPopup(auth, googleProvider); }
  async function signInApple(){ await signInWithPopup(auth, appleProvider); }
  async function signInGuest(){
    var result = await signInAnonymously(auth);
    if(!result.user.displayName){
      await updateProfile(result.user, { displayName: randomGuestName() });
    }
  }

  window.__AuthReady = true;
  window.AuthAPI = {
    signInGoogle: signInGoogle,
    signInApple: signInApple,
    signInGuest: signInGuest
  };

  // 既にログイン済み(前回ログインした端末で再訪問した場合など)なら、
  // ログイン画面を出さず即座にホーム画面へ移動する。
  // ログインボタンでログインに成功した場合もここが呼ばれてホームへ移動する。
  onAuthStateChanged(auth, function(fbUser){
    if(fbUser){
      location.replace('index.html');
    }else{
      if(window.__showLoginScreen) window.__showLoginScreen();
    }
  });
</script>

(function(){
  var loginScreen = document.getElementById('login-screen');
  var loginLoading = document.getElementById('login-loading');
  var loginLoadingText = document.getElementById('login-loading-text');

  function withTimeout(promise, ms){
    return Promise.race([
      promise,
      new Promise(function(resolve){ setTimeout(function(){ resolve(null); }, ms); })
    ]);
  }

  var toastTimer = null;
  function showToast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2600);
  }

  function showLoginScreen(){
    loginLoading.style.display = 'none';
    loginScreen.style.display = 'flex';
  }
  window.__showLoginScreen = showLoginScreen;

  function authErrorMessage(err){
    var code = err && err.code;
    if(code === 'auth/popup-closed-by-user' || code === 'auth/cancelled-popup-request') return null;
    if(code === 'auth/popup-blocked') return 'ポップアップがブロックされました。ブラウザの設定を確認してください';
    if(code === 'auth/operation-not-allowed') return 'この方法でのログインは現在準備中です';
    if(code === 'auth/account-exists-with-different-credential') return 'このメールアドレスは別のログイン方法で登録済みです';
    if(code === 'auth/network-request-failed') return '通信エラーが発生しました。電波状況を確認してください';
    return 'ログインに失敗しました。もう一度お試しください';
  }

  // ログイン処理が固まって「ログイン処理中...」が延々と出続けることがないよう、
  // 一定時間で必ずスピナーを閉じてエラーメッセージを出す(タイムアウト保護)。
  var LOGIN_TIMEOUT_MS = 15000;
  var loginAttemptInFlight = false;
  async function runLogin(signInFn){
    if(loginAttemptInFlight) return;
    if(!window.AuthAPI){
      showToast('ログイン機能の読み込み中です。数秒後にもう一度お試しください');
      return;
    }
    loginAttemptInFlight = true;
    loginLoadingText.textContent = 'ログイン処理中...';
    loginLoading.style.display = 'flex';
    try{
      var result = await withTimeout(signInFn(), LOGIN_TIMEOUT_MS);
      if(result === null){
        // タイムアウト。onAuthStateChangedが後から発火してホームへ移動する可能性も
        // あるため、ここではエラー表示のみ行いスピナーを閉じる。
        loginLoading.style.display = 'none';
        showToast('通信状況が良くないようです。電波の良い場所でもう一度お試しください');
      }
      // 成功時はonAuthStateChanged経由でindex.htmlへ自動的に移動する
    }catch(err){
      console.error(err);
      loginLoading.style.display = 'none';
      var msg = authErrorMessage(err);
      if(msg) showToast(msg);
    }finally{
      loginAttemptInFlight = false;
    }
  }

  document.getElementById('login-google').addEventListener('click', function(){
    runLogin(function(){ return window.AuthAPI.signInGoogle(); });
  });
  document.getElementById('login-apple').addEventListener('click', function(){
    runLogin(function(){ return window.AuthAPI.signInApple(); });
  });
  document.getElementById('login-guest').addEventListener('click', function(){
    runLogin(function(){ return window.AuthAPI.signInGuest(); });
  });

  // Firebase Authモジュールの読み込みが極端に遅い/失敗した場合でも、
  // ずっと「ログイン処理中」のまま止まらないよう、数秒待ってボタンを有効化する。
  // (window.AuthAPIがまだ無い場合、ボタンを押すと上のrunLogin内でその旨を案内する)
  setTimeout(function(){
    if(!window.__AuthReady){
      showToast('通信状況を確認しています…');
    }
  }, 6000);
})();
</script>

<script>
(function(){
  // ---- Service Worker登録(安全設計: 自動リロードしない) ----
  // index.html側と同じsw.jsを登録する(スコープが同じなので二重登録しても問題ない)
  if(!('serviceWorker' in navigator)) return;

  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js').then(function(reg){
      reg.addEventListener('updatefound', function(){
        var newWorker = reg.installing;
        if(!newWorker) return;
        newWorker.addEventListener('statechange', function(){
          if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
            showSwUpdateBanner(newWorker);
          }
        });
      });
    }).catch(function(e){
      console.error('Service Worker登録に失敗しました', e);
    });
  });

  var swRefreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', function(){
    if(swRefreshing) return;
    swRefreshing = true;
    location.reload();
  });

  function showSwUpdateBanner(worker){
    if(document.getElementById('sw-update-banner')) return;
    var banner = document.createElement('div');
    banner.id = 'sw-update-banner';
    banner.style.cssText = 'position:fixed;left:12px;right:12px;bottom:12px;z-index:3000;'+
      'background:var(--indigo, #253A50);color:#fff;border-radius:12px;'+
      'box-shadow:0 6px 20px rgba(0,0,0,0.25);padding:12px 14px;'+
      'display:flex;align-items:center;justify-content:space-between;gap:10px;'+
      'font-family:"Zen Kaku Gothic New",sans-serif;font-size:13px;';
    banner.innerHTML = '<span>新しいバージョンがあります</span>'+
      '<button id="sw-update-btn" style="background:var(--vermillion,#B23A2E);color:#fff;'+
      'border:none;border-radius:8px;padding:8px 14px;font-size:12.5px;font-weight:500;'+
      'font-family:inherit;cursor:pointer;white-space:nowrap;">今すぐ更新</button>';
    document.body.appendChild(banner);
    document.getElementById('sw-update-btn').addEventListener('click', function(){
      worker.postMessage('SKIP_WAITING');
      banner.remove();
    });
  }
})();
</script>
