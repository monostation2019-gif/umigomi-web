/* ---------- ログインパネル ---------- */
.login-wrap{
  position:relative; z-index:5;
  height:100%; display:flex; flex-direction:column; justify-content:flex-end;
  padding:0 22px calc(30px + var(--safe-bottom));
}

.login-panel{
  background:rgba(255,255,255,0.82);
  -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
  border-radius:26px; padding:22px 20px calc(20px + var(--safe-bottom) * 0);
  box-shadow:0 -6px 30px rgba(20,40,80,0.08);
  animation:riseIn .5s ease;
}
@keyframes riseIn{from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:translateY(0);}}

.login-panel h2{
  margin:0 0 4px; font-size:19px; font-weight:900;
  font-family:"Zen Kaku Gothic New", sans-serif; color:var(--ink);
  text-align:center;
}
.login-panel p.lead{
  margin:0 0 20px; font-size:12.5px; color:var(--muted); text-align:center; line-height:1.6;
}

.auth-btn{
  width:100%; display:flex; align-items:center; justify-content:center; gap:10px;
  padding:14px; border-radius:14px; border:none; font-size:14.5px; font-weight:700;
  font-family:"Noto Sans JP", sans-serif; margin-bottom:10px;
  transition:transform .12s ease, opacity .12s ease;
}
.auth-btn:active{transform:scale(0.97);}
.auth-btn:disabled{opacity:.55;}
.auth-btn .ic{
  width:20px; height:20px; display:flex; align-items:center; justify-content:center; flex:none;
}
.auth-btn .ic svg{width:100%; height:100%;}

.btn-google{background:#fff; color:#3c4043; border:1.5px solid #DADCE0;}
.btn-apple{background:#000; color:#fff;}
.btn-guest{background:#F1F4FA; color:var(--ink); border:1.5px solid var(--line);}

.divider{
  display:flex; align-items:center; gap:10px; margin:14px 0 12px; color:var(--muted); font-size:11px;
}
.divider::before, .divider::after{content:''; flex:1; height:1px; background:var(--line);}

.login-note{
  text-align:center; font-size:10.5px; color:var(--muted); margin:14px 0 0; line-height:1.7;
}

.login-status{
  display:flex; align-items:center; justify-content:center; gap:8px;
  font-size:12.5px; color:var(--muted); padding:10px 0 0;
}
.spinner{
  width:15px; height:15px; border-radius:50%;
  border:2.5px solid var(--line); border-top-color:var(--blue);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.toast{
  position:fixed; left:50%; bottom:calc(28px + var(--safe-bottom)); transform:translateX(-50%);
  background:rgba(31,41,55,0.94); color:#fff; padding:11px 18px; border-radius:999px;
  font-size:13px; z-index:80; opacity:0; pointer-events:none; transition:opacity .25s; max-width:86%; text-align:center;
}
.toast.show{opacity:1;}

/* ---------- ニックネーム設定シート ---------- */
.sheet-backdrop{
  position:fixed; inset:0; background:rgba(20,30,55,0.45); z-index:60;
  display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity .25s;
}
.sheet-backdrop.open{opacity:1; pointer-events:auto;}
.sheet{
  background:var(--card); width:100%; max-height:88vh; border-radius:24px 24px 0 0;
  padding:18px 20px calc(20px + var(--safe-bottom)); overflow-y:auto;
  transform:translateY(100%); transition:transform .3s ease;
}
.sheet-backdrop.open .sheet{transform:translateY(0);}
.sheet-handle{width:40px; height:4px; background:var(--line); border-radius:99px; margin:0 auto 14px;}
.sheet .face-emoji{
  width:58px; height:58px; border-radius:50%; margin:0 auto 14px; background:#EAF1FF;
  display:flex; align-items:center; justify-content:center; font-size:28px;
}
.sheet h3{margin:0 0 6px; font-size:18px; text-align:center; font-family:"Zen Kaku Gothic New", sans-serif;}
.sheet p.sub{font-size:12.5px; color:var(--muted); margin:0 0 18px; text-align:center; line-height:1.6;}

.text-input{
  width:100%; padding:14px; border:1.5px solid var(--line); border-radius:12px;
  font-size:15px; margin-bottom:4px; font-family:"Noto Sans JP", sans-serif; color:var(--ink);
}
.text-input:focus{border-color:var(--blue); outline:none;}
.field-error{font-size:11.5px; color:var(--red); margin:6px 0 6px; display:none; min-height:1px;}
.field-hint{font-size:11px; color:var(--muted); margin:6px 0 18px;}

.btn-primary{
  width:100%; padding:15px; border:none; border-radius:14px; background:var(--blue); color:#fff;
  font-weight:700; font-size:15px; font-family:"Noto Sans JP", sans-serif;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-primary:disabled{background:#B9C6E6;}
</style>
</head>

    <button class="auth-btn btn-apple" id="btnApple" onclick="handleApple()">
      <span class="ic">
        <svg viewBox="0 0 384 512" fill="#fff"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141 0 184.5 0 273.5c0 26.3 4.8 53.5 14.4 81.7 12.8 37.4 59 129.1 107.2 127.6 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-84.1 102.6-121.6-65.2-30.7-57.7-90-57.7-92.5zM256.7 88.5c26.9-32 24.5-61.2 23.7-71.7-23.8 1.4-51.3 16.4-67 34.9-17.4 19.8-27.6 44.4-25.4 71.9 25.7 2 49.1-11 68.7-35.1z"/></svg>
      </span>
      <span>Appleでログイン</span>
    </button>

    <div class="divider">または</div>

    <button class="auth-btn btn-guest" id="btnGuest" onclick="handleGuest()">
      <span>👤</span>
      <span>ゲストとして始める</span>
    </button>

    <p class="login-note">ゲスト利用の記録は端末に紐づきます。あとからGoogle・Appleと連携すれば記録はそのまま引き継がれます。</p>

    <div class="login-status" id="loginStatus" style="display:none;">
      <div class="spinner"></div><span id="loginStatusText">確認しています…</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ニックネーム設定シート（初回のみ） -->
<div class="sheet-backdrop" id="nameSheetBackdrop">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="face-emoji">🧑‍🔧</div>
    <h3>ニックネームを決めよう</h3>
    <p class="sub">町のみんなに表示される名前やで。他の人と同じ名前は使われへんから、自分だけの名前を選んでな。</p>

    <input type="text" id="nameInput" class="text-input" placeholder="ニックネームを入力（12文字まで）" maxlength="12">
    <p class="field-error" id="nameError"></p>
    <p class="field-hint">あとからマイページでいつでも変更できます</p>

    <button class="btn-primary" id="nameSaveBtn" onclick="saveNickname()">この名前で始める</button>
  </div>
</div>

<script>
/* =========================================================
   Firebase 初期化（index.html と同じプロジェクト設定）
========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyAPoFjQ4RTIYByTuu35J93kwlLfYBEkpKY",
  authDomain: "machimikke.firebaseapp.com",
  projectId: "machimikke",
  storageBucket: "machimikke.firebasestorage.app",
  messagingSenderId: "497845237336",
  appId: "1:497845237336:web:a39e12428d2943fdf43c2d"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const NEXT_PAGE = 'index.html';

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function setBusy(busy, label){
  document.querySelectorAll('.auth-btn').forEach(b => b.disabled = busy);
  const status = document.getElementById('loginStatus');
  status.style.display = busy ? 'flex' : 'none';
  if (label) document.getElementById('loginStatusText').textContent = label;
}

function normalizeName(name){
  return name.trim().toLowerCase().replace(/\s+/g, '');
}

/* =========================================================
   認証状態の監視
   すでにログイン済み（匿名含む）なら、ニックネーム設定済みか確認して
   未設定なら設定シートを、設定済みならそのまま index.html へ遷移する
========================================================= */
let handledInitialState = false;
auth.onAuthStateChanged(user => {
  if (!user){
    handledInitialState = true;
    return; // ログイン画面をそのまま表示して、ボタン操作を待つ
  }
  if (handledInitialState) return; // ボタン操作から発生した状態変化は各ハンドラ側で処理済み
  handledInitialState = true;
  checkProfileAndProceed(user, false);
});

async function checkProfileAndProceed(user, isFreshSignIn){
  setBusy(true, '確認しています…');
  try {
    const doc = await db.collection('users').doc(user.uid).get();
    if (doc.exists && doc.data().nickname){
      window.location.href = NEXT_PAGE;
      return;
    }
    // 初回ログイン、またはニックネーム未設定 → 設定シートを開く
    setBusy(false);
    openNameSheet();
  } catch (err){
    console.error('プロフィール確認エラー:', err);
    setBusy(false);
    showToast('通信状態を確認して、もう一度お試しください');
  }
}

/* =========================================================
   Google ログイン
   すでに匿名ログイン中の場合は linkWithPopup でアカウントを引き継ぐ
   （＝同一人物が重複ユーザーにならないようにする）
========================================================= */
function handleGoogle(){
  const provider = new firebase.auth.GoogleAuthProvider();
  setBusy(true, 'Googleでログイン中…');
  const current = auth.currentUser;

  const afterSuccess = (user) => { checkProfileAndProceed(user, true); };
  const onFail = (err) => {
    setBusy(false);
    if (err && err.code === 'auth/credential-already-in-use'){
      // 既に別アカウントで使われているGoogleアカウント → そのままそのアカウントでログイン
      auth.signInWithPopup(provider).then(res => afterSuccess(res.user)).catch(e2 => {
        console.error(e2); showToast('ログインに失敗しました');
      });
    } else if (err && err.code === 'auth/popup-closed-by-user'){
      // 何もしない（キャンセル）
    } else {
      console.error(err); showToast('ログインに失敗しました');
    }
  };

  if (current && current.isAnonymous){
    current.linkWithPopup(provider).then(res => afterSuccess(res.user)).catch(onFail);
  } else {
    auth.signInWithPopup(provider).then(res => afterSuccess(res.user)).catch(onFail);
  }
}

/* =========================================================
   Apple ログイン（Google と同じ重複防止ロジック）
========================================================= */
function handleApple(){
  const provider = new firebase.auth.OAuthProvider('apple.com');
  provider.addScope('email');
  provider.addScope('name');
  setBusy(true, 'Appleでログイン中…');
  const current = auth.currentUser;

  const afterSuccess = (user) => { checkProfileAndProceed(user, true); };
  const onFail = (err) => {
    setBusy(false);
    if (err && err.code === 'auth/credential-already-in-use'){
      auth.signInWithPopup(provider).then(res => afterSuccess(res.user)).catch(e2 => {
        console.error(e2); showToast('ログインに失敗しました');
      });
    } else if (err && err.code === 'auth/popup-closed-by-user'){
      // キャンセル
    } else {
      console.error(err); showToast('ログインに失敗しました');
    }
  };

  if (current && current.isAnonymous){
    current.linkWithPopup(provider).then(res => afterSuccess(res.user)).catch(onFail);
  } else {
    auth.signInWithPopup(provider).then(res => afterSuccess(res.user)).catch(onFail);
  }
}

/* =========================================================
   ゲストとして開始（匿名ログイン）
   既に匿名ユーザーが存在する場合はそのまま流用し、二重に作成しない
========================================================= */
function handleGuest(){
  setBusy(true, 'はじめています…');
  const current = auth.currentUser;
  if (current){
    checkProfileAndProceed(current, false);
    return;
  }
  auth.signInAnonymously()
    .then(res => checkProfileAndProceed(res.user, true))
    .catch(err => {
      console.error('匿名ログイン失敗:', err);
      setBusy(false);
      showToast('開始に失敗しました。もう一度お試しください');
    });
}

/* =========================================================
   ニックネーム設定（usernames コレクションで重複を防止）
========================================================= */
function openNameSheet(){
  document.getElementById('nameError').style.display = 'none';
  document.getElementById('nameInput').value = '';
  document.getElementById('nameSheetBackdrop').classList.add('open');
  setTimeout(() => document.getElementById('nameInput').focus(), 300);
}

async function saveNickname(){
  const user = auth.currentUser;
  if (!user){
    showToast('通信状態を確認して、もう一度お試しください');
    return;
  }
  const input = document.getElementById('nameInput');
  const raw = input.value.trim();
  const errEl = document.getElementById('nameError');
  errEl.style.display = 'none';

  if (!raw){ errEl.textContent = '名前を入力してください'; errEl.style.display = 'block'; return; }
  const key = normalizeName(raw);
  if (!key){ errEl.textContent = '使用できない名前です'; errEl.style.display = 'block'; return; }

  const btn = document.getElementById('nameSaveBtn');
  btn.disabled = true; btn.textContent = '保存中…';

  try {
    const usernameRef = db.collection('usernames').doc(key);
    const userRef = db.collection('users').doc(user.uid);

    await db.runTransaction(async (tx) => {
      const nameSnap = await tx.get(usernameRef);
      if (nameSnap.exists && nameSnap.data().uid !== user.uid){
        throw new Error('DUPLICATE');
      }
      const userSnap = await tx.get(userRef);
      const oldKey = userSnap.exists ? userSnap.data().nameKey : null;
      if (oldKey && oldKey !== key){
        tx.delete(db.collection('usernames').doc(oldKey));
      }
      tx.set(usernameRef, { uid: user.uid, name: raw });
      tx.set(userRef, {
        nickname: raw,
        nameKey: key,
        avatar: userSnap.exists && userSnap.data().avatar ? userSnap.data().avatar : '👤',
        avatarType: userSnap.exists && userSnap.data().avatarType ? userSnap.data().avatarType : 'emoji',
        avatarPhotoUrl: userSnap.exists ? (userSnap.data().avatarPhotoUrl || null) : null
      }, { merge: true });
    });

    window.location.href = NEXT_PAGE;
  } catch (err) {
    console.error('ニックネーム保存エラー:', err);
    btn.disabled = false; btn.textContent = 'この名前で始める';
    if (err && err.message === 'DUPLICATE'){
      errEl.textContent = 'その名前はすでに使われています。別の名前をお試しください';
      errEl.style.display = 'block';
    } else {
      const code = (err && err.code) ? err.code : '';
      const msg = (err && err.message) ? err.message : String(err);
      errEl.textContent = '保存に失敗しました： ' + (code ? code + ' / ' : '') + msg;
      errEl.style.display = 'block';
    }
  }
}

window.addEventListener('error', (e) => {
  console.error('未捕捉エラー:', e.message, e.filename, e.lineno);
});
window.addEventListener('unhandledrejection', (e) => {
  console.error('未捕捉のPromiseエラー:', e.reason);
});
</script>
</body>
</html>
