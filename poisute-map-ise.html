<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ポイ捨てマップ 伊勢版｜管理専用</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- MarkerCluster -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>

<!-- Leaflet.heat -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>

<style>
:root {
  --ocean-deep:   #0b2535;
  --ocean-mid:    #0e3d55;
  --teal:         #1a7a8a;
  --seafoam:      #2fb8ac;
  --sand:         #e8d5a3;
  --coral:        #e05c3a;
  --waste-gray:   #8a9ba8;
  --surface:      #122533;
  --surface-2:    #1a3347;
  --text:         #d6eaf0;
  --text-dim:     #7ea8bc;
  --border:       rgba(47,184,172,.25);
  --radius:       10px;
  --font-body:    'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: var(--font-body); background: var(--ocean-deep); color: var(--text); }

#app { display: flex; flex-direction: column; height: 100vh; }

/* LOGIN */
#loginScreen {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; background: var(--ocean-deep);
}
.login-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 36px 28px; width: 100%; max-width: 360px;
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
}
.login-logo { font-size: 42px; text-align: center; margin-bottom: 8px; }
.login-title { font-size: 18px; font-weight: 700; color: var(--seafoam); text-align: center; margin-bottom: 4px; letter-spacing: 1px; }
.login-sub { font-size: 11px; color: var(--text-dim); text-align: center; margin-bottom: 24px; }
.login-lbl { font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
.login-inp {
  width: 100%; background: var(--ocean-mid); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 15px; padding: 11px 13px;
  margin-bottom: 14px; outline: none;
}
.login-inp:focus { border-color: var(--seafoam); }
.login-btn {
  width: 100%; background: linear-gradient(135deg, var(--teal), #0891B2);
  color: #fff; border: none; border-radius: 10px; padding: 13px;
  font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 1px;
}
.login-err { display: none; margin-top: 10px; font-size: 12px; color: var(--coral); text-align: center; background: rgba(224,92,58,.1); border-radius: 8px; padding: 8px; }

/* MAIN APP */
#mainApp { display: none; flex-direction: column; height: 100vh; }

header {
  background: var(--ocean-mid);
  border-bottom: 1px solid var(--border);
  padding: 0 8px;
  height: 48px;
  display: flex; align-items: center; gap: 6px;
  flex-shrink: 0; z-index: 1000;
  overflow: hidden;
}
.logo-icon { font-size: 18px; flex-shrink: 0; }
.hdr-title-wrap { flex-shrink: 0; min-width: 0; }
header h1 { font-size: 13px; font-weight: 700; letter-spacing: .02em; color: var(--seafoam); white-space: nowrap; }
header .sub { font-size: 9px; color: var(--text-dim); white-space: nowrap; }
.header-actions { margin-left: auto; display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
.btn-icon {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; padding: 4px 7px;
  font-size: 11px; cursor: pointer; transition: background .15s;
  display: flex; align-items: center; gap: 2px; white-space: nowrap; flex-shrink: 0;
}
.btn-icon:hover { background: var(--teal); }
.btn-icon.lock { border-color: rgba(224,92,58,.4); color: var(--coral); padding: 4px 8px; }
.btn-icon.lock:hover { background: rgba(224,92,58,.2); }

/* WEATHER BADGE */
#weather-badge {
  display: flex; align-items: center; gap: 4px;
  background: rgba(47,184,172,.12); border: 1px solid var(--border);
  border-radius: 6px; padding: 3px 6px; flex-shrink: 0; cursor: default;
  max-width: 120px; overflow: hidden;
}
.wx-icon { font-size: 14px; line-height: 1; flex-shrink: 0; }
.wx-info { display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.wx-main { font-size: 10px; font-weight: 700; color: var(--text); line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wx-sub  { font-size: 9px; color: var(--text-dim); line-height: 1.2; white-space: nowrap; display: none; }

/* MAP CONTAINER */
#map-wrap { position: relative; flex: 1; }
#map { width: 100%; height: 100%; }

/* FILTER BAR */
#filter-bar {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  z-index: 900; display: flex; gap: 5px; flex-wrap: wrap; justify-content: center;
  padding: 0 12px;
}
.filter-btn {
  background: rgba(11,37,53,.88); border: 1px solid var(--border);
  color: var(--text-dim); border-radius: 20px;
  padding: 4px 10px; font-size: 11px; cursor: pointer;
  transition: all .15s; backdrop-filter: blur(6px); white-space: nowrap;
}
.filter-btn.active { background: var(--teal); border-color: var(--seafoam); color: #fff; }

/* VIEW TOGGLE */
#view-toggle {
  position: absolute; bottom: 80px; right: 12px;
  z-index: 900; display: flex; flex-direction: column; gap: 5px;
}
.view-btn {
  background: rgba(11,37,53,.9); border: 1px solid var(--border);
  color: var(--text-dim); border-radius: 8px; padding: 7px 9px;
  font-size: 12px; cursor: pointer; transition: all .15s;
  backdrop-filter: blur(6px); text-align: center;
}
.view-btn.active { background: var(--teal); color: #fff; border-color: var(--seafoam); }

/* FAB */
#fab {
  position: absolute; bottom: 20px; right: 12px;
  z-index: 900; width: 52px; height: 52px;
  background: var(--coral); border: none; border-radius: 50%;
  color: #fff; font-size: 24px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(224,92,58,.5);
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s;
}
#fab:hover { transform: scale(1.08); }

/* STATS BAR */
#stats-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  z-index: 900;
  background: rgba(11,37,53,.92); border-top: 1px solid var(--border);
  padding: 5px 12px; display: flex; gap: 14px; align-items: center;
  backdrop-filter: blur(8px);
}
.stat-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-dim); white-space: nowrap; }
.stat-item strong { color: var(--seafoam); font-size: 13px; }

/* MODAL */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.55);
  z-index: 1100; display: none; align-items: flex-end;
}
.overlay.open { display: flex; }

.drawer {
  background: var(--surface); width: 100%; max-width: 520px;
  margin: 0 auto; border-radius: 16px 16px 0 0;
  padding: 0 0 env(safe-area-inset-bottom,0);
  max-height: 88vh; overflow-y: auto;
}
.drawer-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
.drawer-header { padding: 14px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.drawer-header h2 { font-size: 15px; font-weight: 700; color: var(--seafoam); }
.drawer-close { margin-left: auto; background: none; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer; line-height: 1; }
.drawer-body { padding: 14px 20px 24px; display: flex; flex-direction: column; gap: 12px; }

/* FORM */
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-size: 12px; color: var(--text-dim); font-weight: 600; letter-spacing: .04em; }

input[type=text], input[type=number], select, textarea {
  background: var(--ocean-mid); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px; padding: 9px 12px;
  font-size: 14px; font-family: var(--font-body); width: 100%;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--seafoam); }
textarea { resize: vertical; min-height: 60px; }

/* GPS ROW */
.gps-row { display: flex; gap: 7px; align-items: flex-start; }
.gps-row input { flex: 1; }
.btn-gps {
  background: var(--teal); border: none; color: #fff;
  border-radius: 8px; padding: 9px 11px; font-size: 12px; cursor: pointer;
  white-space: nowrap; flex-shrink: 0;
}
.gps-status { font-size: 11px; color: var(--text-dim); margin-top: 3px; }

/* PHOTO */
.photo-upload {
  border: 2px dashed var(--border); border-radius: 10px;
  padding: 18px; text-align: center; cursor: pointer; position: relative;
}
.photo-upload:hover { border-color: var(--seafoam); }
.photo-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.photo-upload .up-icon { font-size: 26px; display: block; margin-bottom: 5px; }
.photo-upload .up-text { font-size: 12px; color: var(--text-dim); }
#photo-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
#photo-preview img { width: 68px; height: 68px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }

/* TRASH GRID */
.trash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.trash-chip {
  background: var(--ocean-mid); border: 1px solid var(--border);
  border-radius: 8px; padding: 7px 4px; text-align: center;
  cursor: pointer; transition: all .15s; font-size: 11px;
}
.trash-chip.selected { background: var(--teal); border-color: var(--seafoam); color: #fff; }
.trash-chip .tc-icon { font-size: 17px; display: block; margin-bottom: 2px; }

/* COUNT */
.count-wrap { display: flex; flex-direction: column; gap: 7px; }
.count-input-row { display: flex; align-items: center; gap: 10px; }
.count-spinner {
  display: flex; align-items: center;
  background: var(--ocean-mid); border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
}
.count-spinner button {
  background: none; border: none; color: var(--text); font-size: 18px;
  width: 34px; height: 36px; cursor: pointer;
}
.count-spinner button:hover { background: var(--teal); }
.count-spinner input {
  width: 56px; text-align: center; background: none; border: none;
  border-left: 1px solid var(--border); border-right: 1px solid var(--border);
  color: var(--text); font-size: 15px; font-weight: 700; padding: 5px 0;
}
.sev-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700;
}
.sev-badge.lv1 { background: rgba(47,184,172,.2); color: var(--seafoam); border: 1px solid var(--seafoam); }
.sev-badge.lv2 { background: rgba(232,208,48,.2); color: #e8d030; border: 1px solid #e8d030; }
.sev-badge.lv3 { background: rgba(224,92,58,.2); color: var(--coral); border: 1px solid var(--coral); }
.count-scale { display: flex; gap: 3px; align-items: center; }
.scale-seg { height: 5px; flex: 1; border-radius: 3px; background: var(--surface-2); min-width: 10px; }
.scale-seg.fill-lv1 { background: var(--seafoam); }
.scale-seg.fill-lv2 { background: #e8d030; }
.scale-seg.fill-lv3 { background: var(--coral); }

.btn-submit {
  background: var(--coral); border: none; color: #fff;
  border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700;
  cursor: pointer; width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}

/* POPUP */
.popup-content { font-size: 12px; line-height: 1.6; min-width: 170px; }
.popup-content strong { color: var(--teal); display: block; margin-bottom: 4px; font-size: 13px; }
.popup-photo { width: 100%; max-height: 110px; object-fit: cover; border-radius: 6px; margin-bottom: 7px; }
.popup-tag {
  display: inline-block; background: var(--teal); color: #fff;
  border-radius: 4px; padding: 1px 5px; font-size: 10px; margin: 2px 2px 2px 0;
}
.popup-del {
  margin-top: 8px; width: 100%;
  background: rgba(224,92,58,.15); border: 1px solid rgba(224,92,58,.4);
  color: var(--coral); border-radius: 6px; padding: 5px 10px;
  font-size: 11px; cursor: pointer; font-family: var(--font-body);
}

/* TOAST */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--surface-2); border: 1px solid var(--seafoam);
  color: var(--text); padding: 9px 18px; border-radius: 8px;
  font-size: 13px; z-index: 2000; opacity: 0; transition: opacity .3s;
  pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; }

/* LIST VIEW */
#list-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  z-index: 1200; display: none; align-items: center; justify-content: center;
}
#list-overlay.open { display: flex; }
.list-modal {
  background: var(--surface); border-radius: 16px; width: 94%; max-width: 540px;
  max-height: 85vh; display: flex; flex-direction: column;
  border: 1px solid var(--border);
}
.list-header {
  padding: 16px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.list-header h3 { font-size: 15px; font-weight: 700; color: var(--seafoam); }
.list-close { background: none; border: none; color: var(--text-dim); font-size: 22px; cursor: pointer; }
.list-body { flex: 1; overflow-y: auto; padding: 10px 14px; }
.record-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.05);
}
.record-thumb {
  width: 46px; height: 46px; border-radius: 8px; background: var(--ocean-mid);
  display: flex; align-items: center; justify-content: center; font-size: 22px;
  flex-shrink: 0; overflow: hidden; border: 1px solid var(--border);
}
.record-thumb img { width: 100%; height: 100%; object-fit: cover; }
.record-info { flex: 1; min-width: 0; }
.record-type { font-size: 12px; font-weight: 700; }
.record-coord { font-size: 10px; color: var(--seafoam); }
.record-meta { font-size: 9px; color: var(--text-dim); }
.record-del {
  background: rgba(224,92,58,.12); border: 1px solid rgba(224,92,58,.3);
  color: var(--coral); border-radius: 6px; padding: 5px 10px;
  font-size: 10px; cursor: pointer; font-family: var(--font-body);
  flex-shrink: 0; white-space: nowrap;
}
.record-fly {
  background: rgba(47,184,172,.12); border: 1px solid var(--border);
  color: var(--seafoam); border-radius: 6px; padding: 5px 10px;
  font-size: 10px; cursor: pointer; font-family: var(--font-body);
  flex-shrink: 0; white-space: nowrap;
}
.list-empty { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 13px; }

/* Leaflet */
.leaflet-popup-content-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); box-shadow: 0 4px 20px rgba(0,0,0,.4); }
.leaflet-popup-tip { background: var(--surface); }
.leaflet-control-zoom a { background: var(--surface) !important; color: var(--text) !important; border-color: var(--border) !important; }
.marker-cluster-small, .marker-cluster-medium, .marker-cluster-large { background: rgba(26,122,138,.45) !important; }
.marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div { background: var(--teal) !important; color: #fff !important; font-weight: 700; }

@media (min-width: 640px) {
  .overlay { align-items: center; }
  .drawer { border-radius: 16px; max-height: 80vh; margin: auto; }
}
</style>
</head>
<body>
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🗺️</div>
    <div class="login-title">ポイ捨てマップ 伊勢版</div>
    <div class="login-sub">管理者専用 — Admin Only</div>
    <div class="login-lbl">管理者パスワード</div>
    <input id="loginPass" class="login-inp" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">🔑 ログイン</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div id="mainApp">
  <header>
    <span class="logo-icon">🗺️</span>
    <div class="hdr-title-wrap">
      <h1>ポイ捨てマップ</h1>
      <span class="sub">伊勢版 管理者専用</span>
    </div>
    <div class="header-actions">
      <div id="weather-badge" title="気象情報">
        <span class="wx-icon" id="wx-icon">⏳</span>
        <div class="wx-info">
          <span class="wx-main" id="wx-main">取得中…</span>
          <span class="wx-sub"  id="wx-sub"></span>
        </div>
      </div>
      <button class="btn-icon" onclick="openListModal()">📋 一覧</button>
      <button class="btn-icon" onclick="exportData()">📥 CSV</button>
      <button class="btn-icon lock" onclick="doLogout()">🔒</button>
    </div>
  </header>

  <div id="map-wrap">
    <div id="map"></div>

    <div id="filter-bar">
      <button class="filter-btn active" data-type="all" onclick="setFilter('all',this)">すべて</button>
      <button class="filter-btn" data-type="ペットボトル" onclick="setFilter('ペットボトル',this)">🍶 PET</button>
      <button class="filter-btn" data-type="缶・ビン" onclick="setFilter('缶・ビン',this)">🥫 缶・ビン</button>
      <button class="filter-btn" data-type="タバコ類" onclick="setFilter('タバコ類',this)">🚬 タバコ</button>
      <button class="filter-btn" data-type="プラスチック片" onclick="setFilter('プラスチック片',this)">🧴 プラ片</button>
      <button class="filter-btn" data-type="ビニール袋類" onclick="setFilter('ビニール袋類',this)">🛍️ ビニール</button>
      <button class="filter-btn" data-type="その他" onclick="setFilter('その他',this)">❓ その他</button>
    </div>

    <div id="view-toggle">
      <button class="view-btn active" id="btn-heat" onclick="setView('heat')">🌡️<br><span style="font-size:9px">熱</span></button>
      <button class="view-btn" id="btn-cluster" onclick="setView('cluster')">📍<br><span style="font-size:9px">点</span></button>
      <button class="view-btn" id="btn-both" onclick="setView('both')">🔀<br><span style="font-size:9px">両方</span></button>
    </div>

    <button id="fab" onclick="openForm()" title="ポイ捨てを記録">＋</button>

    <div id="stats-bar">
      <div class="stat-item">📍 <strong id="stat-total">0</strong> 件</div>
      <div class="stat-item">🔴 高密度 <strong id="stat-high">0</strong></div>
      <div class="stat-item">👁 表示中 <strong id="stat-showing">0</strong></div>
      <div class="stat-item" id="stat-updated-wrap" style="margin-left:auto;display:none">🕒 <strong id="stat-updated">—</strong></div>
    </div>
  </div>
</div>

<!-- RECORD DRAWER -->
<div class="overlay" id="form-overlay" onclick="closeFormOnBg(event)">
  <div class="drawer" id="form-drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-header">
      <span>🗑️</span>
      <h2>ポイ捨てを記録する</h2>
      <button class="drawer-close" onclick="closeForm()">×</button>
    </div>
    <div class="drawer-body">

      <!-- GPS -->
      <div class="form-group">
        <label>📍 GPS座標</label>
        <div class="gps-row">
          <input type="number" id="inp-lat" placeholder="緯度" step="0.000001">
          <input type="number" id="inp-lng" placeholder="経度" step="0.000001">
          <button class="btn-gps" onclick="getGPS()">現在地</button>
        </div>
        <div class="gps-status" id="gps-status">地図をタップして場所を選ぶか「現在地」ボタンで取得</div>
      </div>

      <!-- 写真 -->
      <div class="form-group">
        <label>📸 写真（任意）</label>
        <div class="photo-upload">
          <input type="file" id="inp-photo" accept="image/*" multiple onchange="previewPhotos()">
          <span class="up-icon">📷</span>
          <span class="up-text">タップして写真を選択</span>
        </div>
        <div id="photo-preview"></div>
      </div>

      <!-- ゴミ種類 -->
      <div class="form-group">
        <label>🗑️ ゴミの種類（複数選択可）</label>
        <div class="trash-grid" id="trash-grid">
          <div class="trash-chip" data-type="ペットボトル" onclick="toggleTrash(this)"><span class="tc-icon">🍶</span>PETボトル</div>
          <div class="trash-chip" data-type="缶・ビン" onclick="toggleTrash(this)"><span class="tc-icon">🥫</span>缶・ビン</div>
          <div class="trash-chip" data-type="タバコ類" onclick="toggleTrash(this)"><span class="tc-icon">🚬</span>タバコ類</div>
          <div class="trash-chip" data-type="プラスチック片" onclick="toggleTrash(this)"><span class="tc-icon">🧴</span>プラスチック片</div>
          <div class="trash-chip" data-type="ビニール袋類" onclick="toggleTrash(this)"><span class="tc-icon">🛍️</span>ビニール袋類</div>
          <div class="trash-chip" data-type="紙類" onclick="toggleTrash(this)"><span class="tc-icon">📦</span>紙類</div>
          <div class="trash-chip" data-type="衣類" onclick="toggleTrash(this)"><span class="tc-icon">👕</span>衣類</div>
          <div class="trash-chip" data-type="家電・家具" onclick="toggleTrash(this)"><span class="tc-icon">📺</span>家電・家具</div>
          <div class="trash-chip" data-type="その他" onclick="toggleTrash(this)"><span class="tc-icon">❓</span>その他</div>
        </div>
      </div>

      <!-- 個数 -->
      <div class="form-group">
        <label>🗑️ ゴミの個数（目視概算）</label>
        <div class="count-wrap">
          <div class="count-input-row">
            <div class="count-spinner">
              <button type="button" onclick="changeCount(-1)">−</button>
              <input type="number" id="inp-count" value="1" min="1" max="999" oninput="onCountInput()">
              <button type="button" onclick="changeCount(1)">＋</button>
            </div>
            <span id="sev-badge" class="sev-badge lv1">🟢 少量（1〜5個）</span>
          </div>
          <div class="count-scale" id="count-scale">
            <div class="scale-seg"></div><div class="scale-seg"></div><div class="scale-seg"></div>
            <div class="scale-seg"></div><div class="scale-seg"></div>
            <div class="scale-seg"></div><div class="scale-seg"></div><div class="scale-seg"></div>
            <div class="scale-seg"></div><div class="scale-seg"></div>
          </div>
        </div>
      </div>

      <!-- メモ -->
      <div class="form-group">
        <label>📝 メモ（任意）</label>
        <textarea id="inp-memo" placeholder="状況・特徴など自由記述"></textarea>
      </div>

      <button class="btn-submit" onclick="submitRecord()">📌 記録する</button>
    </div>
  </div>
</div>

<!-- LIST MODAL -->
<div id="list-overlay" onclick="closeListOnBg(event)">
  <div class="list-modal">
    <div class="list-header">
      <h3>📋 記録一覧</h3>
      <button class="list-close" onclick="closeListModal()">×</button>
    </div>
    <div class="list-body" id="list-body"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ===== VIEW MODE =====
// ?view=map で地図のみモード（ログイン不要・操作不可・読み取り専用）
const VIEW_MODE = new URLSearchParams(location.search).get('view');
const MAP_ONLY = VIEW_MODE === 'map';

// ===== AUTH =====
// パスワード: umiadmin2025 (admin.htmlと共通)
const ADMIN_PASS_HASH = 'f604b4c96d23319e76a29b1a3bc00b8f651603ec1ab25055c7c5ec4374e7d092';

function isLoggedIn() {
  return MAP_ONLY || sessionStorage.getItem('poisute_admin_ok') === '1';
}

(function init() {
  if (MAP_ONLY) {
    // 地図のみモード: ログイン画面を隠し、ヘッダー・FAB・フォームを非表示にして地図を表示
    document.getElementById('loginScreen').style.display = 'none';
    const app = document.getElementById('mainApp');
    app.style.display = 'flex';
    // ヘッダーを「閲覧モード」バナーに置き換える
    const hdr = app.querySelector('header');
    if (hdr) {
      hdr.innerHTML = '<span style="font-size:15px">🗺️</span><div style="font-size:12px;font-weight:700;color:var(--seafoam);">ポイ捨てマップ 伊勢版</div><div style="margin-left:auto;font-size:10px;color:var(--text-dim);background:rgba(47,184,172,.12);border:1px solid var(--border);border-radius:5px;padding:3px 8px;">📖 閲覧モード</div>';
    }
    initMap();
    fetchWeather();
    // FAB非表示
    setTimeout(() => {
      const fab = document.getElementById('fab');
      if (fab) fab.style.display = 'none';
    }, 100);
    return;
  }
  if (isLoggedIn()) {
    showApp();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
  }
})();

async function doLogin() {
  const pass = document.getElementById('loginPass').value;
  if (!pass) { showLoginErr('パスワードを入力してください'); return; }
  try {
    const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pass));
    const hash = [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
    if (hash === ADMIN_PASS_HASH) {
      sessionStorage.setItem('poisute_admin_ok', '1');
      showApp();
    } else {
      showLoginErr('パスワードが違います');
    }
  } catch(e) { showLoginErr('エラー: ' + e.message); }
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  const app = document.getElementById('mainApp');
  app.style.display = 'flex';
  initMap();
  fetchWeather();
}

function doLogout() {
  sessionStorage.removeItem('poisute_admin_ok');
  location.reload();
}

function showLoginErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg; el.style.display = 'block';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter' && !isLoggedIn()) doLogin(); });

// ===== DATA =====
const STORAGE_KEY = 'poisuteIse_v1';
let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

// ===== MAP =====
let mapObj = null;
let clusterGroup = null;
let heatLayer = null;
let currentView = 'heat';
let currentFilter = 'all';
let selectedPhotos = [];
let selectedTrash = [];
let selectedSeverity = 1;
let selectedCount = 1;

function initMap() {
  mapObj = L.map('map', { zoomControl: true }).setView([34.489, 136.706], 13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(mapObj);

  clusterGroup = L.markerClusterGroup({ maxClusterRadius: 60 });
  heatLayer = L.heatLayer([], { radius: 30, blur: 22, maxZoom: 17 });

  mapObj.on('click', function(e) {
    document.getElementById('inp-lat').value = e.latlng.lat.toFixed(6);
    document.getElementById('inp-lng').value = e.latlng.lng.toFixed(6);
    document.getElementById('gps-status').textContent = `📍 地図からピック: ${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`;
  });

  updateCountUI();
  renderMap();
}

// ===== VIEW =====
function setView(v) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + v).classList.add('active');
  renderMap();
}

// ===== FILTER =====
function setFilter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMap();
}

// ===== RENDER =====
function getFiltered() {
  if (currentFilter === 'all') return records;
  return records.filter(r => r.trash && r.trash.includes(currentFilter));
}

function renderMap() {
  if (!mapObj) return;
  mapObj.removeLayer(clusterGroup);
  mapObj.removeLayer(heatLayer);
  clusterGroup = L.markerClusterGroup({ maxClusterRadius: 60 });

  const filtered = getFiltered();
  const heatData = [];

  filtered.forEach(r => {
    if (!r.lat || !r.lng) return;
    const weight = r.severity || 1;
    heatData.push([r.lat, r.lng, weight]);

    const icon = L.divIcon({
      className: '',
      html: `<div style="
        background:${r.severity===3?'#e05c3a':r.severity===2?'#e8a030':'#2fb8ac'};
        width:${10+weight*4}px;height:${10+weight*4}px;
        border-radius:50%;border:2px solid #fff;
        box-shadow:0 2px 6px rgba(0,0,0,.4);
        display:flex;align-items:center;justify-content:center;
        font-size:${8+weight*2}px;
      ">${r.trash && r.trash[0] ? trashIcon(r.trash[0]) : '🗑️'}</div>`,
      iconSize: [22+weight*4, 22+weight*4],
      iconAnchor: [11+weight*2, 11+weight*2]
    });

    const marker = L.marker([r.lat, r.lng], { icon });
    marker.bindPopup(buildPopup(r));
    clusterGroup.addLayer(marker);
  });

  heatLayer = L.heatLayer(heatData, {
    radius: 32, blur: 24, maxZoom: 17, max: 3,
    gradient: { 0.2: '#1a7a8a', 0.5: '#e8d5a3', 0.8: '#e05c3a', 1.0: '#ff2200' }
  });

  if (currentView === 'heat' || currentView === 'both') heatLayer.addTo(mapObj);
  if (currentView === 'cluster' || currentView === 'both') clusterGroup.addTo(mapObj);

  document.getElementById('stat-total').textContent = records.length;
  document.getElementById('stat-high').textContent = records.filter(r=>r.severity===3).length;
  document.getElementById('stat-showing').textContent = filtered.length;

  const wrap = document.getElementById('stat-updated-wrap');
  if (records.length > 0) {
    const latest = Math.max(...records.map(r => r.ts));
    const d = new Date(latest);
    document.getElementById('stat-updated').textContent =
      `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    wrap.style.display = 'flex';
  } else {
    wrap.style.display = 'none';
  }
}

function trashIcon(t) {
  const m = { 'ペットボトル':'🍶','缶・ビン':'🥫','タバコ類':'🚬','プラスチック片':'🧴','ビニール袋類':'🛍️','紙類':'📦','衣類':'👕','家電・家具':'📺','その他':'❓' };
  return m[t] || '🗑️';
}

function buildPopup(r) {
  const date = new Date(r.ts).toLocaleDateString('ja-JP');
  const sevLabel = ['','🟢 少量','🟡 中程度','🔴 大量'][r.severity||1];
  const tags = (r.trash||[]).map(t=>`<span class="popup-tag">${trashIcon(t)} ${t}</span>`).join('');
  const photo = r.photo ? `<img src="${r.photo}" class="popup-photo">` : '';
  return `<div class="popup-content">
    ${photo}
    <strong>${r.lat.toFixed(5)}, ${r.lng.toFixed(5)}</strong>
    ${tags || '<span style="color:#666;font-size:11px">種別未設定</span>'}
    <div style="font-size:11px;color:#888;margin-top:4px">${sevLabel}${r.count ? ' ／ ' + r.count + '個' : ''} ／ ${date}</div>
    ${r.memo ? `<div style="margin-top:5px;font-size:11px;color:#aaa">${r.memo}</div>` : ''}
    <button class="popup-del" onclick="deleteRecord(${r.id})">🗑️ この記録を削除</button>
  </div>`;
}

// ===== DELETE SINGLE =====
function deleteRecord(id) {
  if (!confirm('この記録を削除してよろしいですか？')) return;
  records = records.filter(r => r.id !== id);
  save();
  renderMap();
  renderListBody();
  showToast('🗑️ 削除しました');
  mapObj.closePopup();
}

// ===== FORM =====
function openForm() {
  document.getElementById('form-overlay').classList.add('open');
  document.getElementById('inp-lat').value = '';
  document.getElementById('inp-lng').value = '';
  document.getElementById('inp-memo').value = '';
  document.getElementById('gps-status').textContent = '地図をタップして場所を選ぶか「現在地」ボタンで取得';
  document.getElementById('photo-preview').innerHTML = '';
  selectedPhotos = []; selectedTrash = []; selectedSeverity = 1; selectedCount = 1;
  document.querySelectorAll('.trash-chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('inp-count').value = 1;
  updateCountUI();
}
function closeForm() { document.getElementById('form-overlay').classList.remove('open'); }
function closeFormOnBg(e) { if (e.target === document.getElementById('form-overlay')) closeForm(); }

// ===== GPS =====
function getGPS() {
  const status = document.getElementById('gps-status');
  status.textContent = '📡 取得中...';
  if (!navigator.geolocation) { status.textContent = '⚠️ 位置情報非対応'; return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude, lng = pos.coords.longitude;
      document.getElementById('inp-lat').value = lat.toFixed(6);
      document.getElementById('inp-lng').value = lng.toFixed(6);
      status.textContent = `✅ 取得完了 (精度: ±${Math.round(pos.coords.accuracy)}m)`;
      if (mapObj) mapObj.setView([lat, lng], 16);
    },
    () => { status.textContent = '⚠️ 位置情報を取得できませんでした'; },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// ===== PHOTO =====
function previewPhotos() {
  const files = document.getElementById('inp-photo').files;
  const preview = document.getElementById('photo-preview');
  preview.innerHTML = ''; selectedPhotos = [];
  Array.from(files).slice(0, 4).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      selectedPhotos.push(e.target.result);
      const img = document.createElement('img'); img.src = e.target.result;
      preview.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
}

// ===== TRASH =====
function toggleTrash(el) {
  el.classList.toggle('selected');
  const t = el.dataset.type;
  if (selectedTrash.includes(t)) selectedTrash = selectedTrash.filter(x=>x!==t);
  else selectedTrash.push(t);
}

// ===== COUNT =====
function countToSeverity(n) { return n <= 5 ? 1 : n <= 10 ? 2 : 3; }
function updateCountUI() {
  const n = parseInt(document.getElementById('inp-count').value) || 1;
  const sev = countToSeverity(n);
  selectedSeverity = sev; selectedCount = n;
  const badge = document.getElementById('sev-badge');
  badge.className = 'sev-badge lv' + sev;
  badge.textContent = sev === 1 ? '🟢 少量（1〜5個）' : sev === 2 ? '🟡 中程度（6〜10個）' : '🔴 大量（11個以上）';
  const segs = document.querySelectorAll('#count-scale .scale-seg');
  const fillCount = Math.min(10, n <= 5 ? n : n <= 10 ? n : 10);
  segs.forEach((s, i) => {
    s.className = 'scale-seg';
    if (i < fillCount) s.classList.add(n <= 5 ? 'fill-lv1' : n <= 10 ? 'fill-lv2' : 'fill-lv3');
  });
}
function changeCount(delta) {
  const inp = document.getElementById('inp-count');
  inp.value = Math.max(1, Math.min(999, (parseInt(inp.value)||1) + delta));
  updateCountUI();
}
function onCountInput() { updateCountUI(); }

// ===== SUBMIT =====
function submitRecord() {
  const lat = parseFloat(document.getElementById('inp-lat').value);
  const lng = parseFloat(document.getElementById('inp-lng').value);
  if (isNaN(lat) || isNaN(lng)) { showToast('⚠️ GPS座標を入力してください'); return; }
  if (selectedTrash.length === 0) { showToast('⚠️ ゴミの種類を選択してください'); return; }

  const record = {
    id: Date.now(), ts: Date.now(),
    lat, lng,
    trash: [...selectedTrash],
    count: selectedCount,
    severity: selectedSeverity,
    memo: document.getElementById('inp-memo').value,
    photo: selectedPhotos[0] || null
  };

  records.push(record);
  save();
  renderMap();
  closeForm();
  showToast('✅ 記録しました！');
  if (mapObj) mapObj.flyTo([lat, lng], Math.max(mapObj.getZoom(), 15), { duration: 1 });
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  // 更新日時を共有キーに書き込む（index.htmlから参照可能）
  localStorage.setItem('poisuteIse_lastUpdated', new Date().toISOString());
}

// ===== LIST MODAL =====
function openListModal() {
  renderListBody();
  document.getElementById('list-overlay').classList.add('open');
}
function closeListModal() { document.getElementById('list-overlay').classList.remove('open'); }
function closeListOnBg(e) { if (e.target === document.getElementById('list-overlay')) closeListModal(); }

function renderListBody() {
  const body = document.getElementById('list-body');
  if (!records.length) {
    body.innerHTML = '<div class="list-empty">まだ記録がありません</div>';
    return;
  }
  const sorted = [...records].sort((a,b) => b.ts - a.ts);
  body.innerHTML = sorted.map(r => {
    const date = new Date(r.ts).toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const icon = r.trash && r.trash[0] ? trashIcon(r.trash[0]) : '🗑️';
    const types = (r.trash||[]).join('・') || '種別未設定';
    const thumb = r.photo ? `<img src="${r.photo}">` : icon;
    return `<div class="record-row">
      <div class="record-thumb">${r.photo ? `<img src="${r.photo}">` : icon}</div>
      <div class="record-info">
        <div class="record-type">${types}</div>
        <div class="record-coord">📍 ${r.lat.toFixed(5)}, ${r.lng.toFixed(5)}</div>
        <div class="record-meta">${date}　${r.count ? r.count+'個' : ''}　${r.memo ? r.memo.slice(0,20) : ''}</div>
      </div>
      <button class="record-fly" onclick="flyTo(${r.lat},${r.lng})">地図</button>
      <button class="record-del" onclick="deleteRecord(${r.id})">削除</button>
    </div>`;
  }).join('');
}

function flyTo(lat, lng) {
  closeListModal();
  if (mapObj) mapObj.flyTo([lat, lng], 17, { duration: 1.2 });
}

// ===== EXPORT =====
function exportData() {
  if (!records.length) { showToast('記録がありません'); return; }
  const lines = [['ID','日時','緯度','経度','ゴミ種類','個数','深刻度','メモ']];
  records.forEach(r => {
    lines.push([
      r.id,
      new Date(r.ts).toLocaleString('ja-JP'),
      r.lat, r.lng,
      (r.trash||[]).join('/'),
      r.count||'',
      r.severity||1,
      (r.memo||'').replace(/,/g,'、')
    ]);
  });
  const csv = lines.map(l => l.join(',')).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `poisute_ise_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  showToast('📥 CSVをエクスポートしました');
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== WEATHER =====
const WX_CODE = {
  0:['☀️','快晴'],1:['🌤️','ほぼ晴れ'],2:['⛅','曇り時々晴れ'],3:['☁️','曇り'],
  45:['🌫️','霧'],61:['🌧️','小雨'],63:['🌧️','雨'],65:['🌧️','大雨'],
  80:['🌦️','にわか雨'],95:['⛈️','雷雨']
};
async function fetchWeather() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(async pos => {
    try {
      const { latitude: lat, longitude: lon } = pos.coords;
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m&timezone=Asia%2FTokyo`;
      const d = await (await fetch(url)).json();
      const c = d.current;
      const [icon, label] = WX_CODE[c.weathercode] || ['🌡️','不明'];
      document.getElementById('wx-icon').textContent = icon;
      document.getElementById('wx-main').textContent = `${Math.round(c.temperature_2m)}°C ${label}`;
      document.getElementById('wx-sub').textContent = `風 ${Math.round(c.windspeed_10m)}km/h`;
    } catch(e) {}
  }, () => {}, { enableHighAccuracy: false, timeout: 8000 });
}
</script>
</body>
</html>
